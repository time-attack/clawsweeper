name: Setup ClawSweeper state
description: Checkout generated state and hydrate it into the ClawSweeper worktree.
inputs:
  token:
    description: GitHub token with contents read/write access to the state repo.
    required: true
  state-path:
    description: Checkout path for the generated state repository.
    required: false
    default: clawsweeper-state
  worktree-path:
    description: ClawSweeper checkout path to hydrate.
    required: false
    default: .
  node-version:
    description: Node.js version used to run the TypeScript hydrator.
    required: false
    default: "24"
  filter:
    description: Git partial clone filter for the generated state repository.
    required: false
    default: ""
  fetch-depth:
    description: Git fetch depth for the generated state repository. Publish retries fetch the remote tip before rebasing.
    required: false
    default: "1"
  sparse-checkout:
    description: Optional newline-separated state paths to hydrate.
    required: false
    default: ""
  hydrate-paths:
    description: Optional newline-separated approved generated roots to hydrate. Defaults to the standard roots; ledger must be selected explicitly.
    required: false
    default: ""
  persist-credentials:
    description: Persist the checkout token in local git config for later state publication.
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - uses: actions/checkout@v7
      with:
        repository: openclaw/clawsweeper-state
        ref: state
        path: ${{ inputs.state-path }}
        token: ${{ inputs.token }}
        filter: ${{ inputs.filter }}
        fetch-depth: ${{ inputs.fetch-depth }}
        sparse-checkout: ${{ inputs.sparse-checkout }}
        persist-credentials: ${{ inputs.persist-credentials }}

    - name: Export state root
      shell: bash
      run: echo "CLAWSWEEPER_STATE_DIR=$GITHUB_WORKSPACE/${{ inputs.state-path }}" >> "$GITHUB_ENV"

    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Hydrate generated state
      shell: bash
      env:
        CLAWSWEEPER_STATE_DIR: ${{ inputs.state-path }}
        CLAWSWEEPER_HYDRATE_PATHS: ${{ inputs.hydrate-paths }}
      run: node "${{ inputs.worktree-path }}/scripts/hydrate-state.ts" --state-dir "${{ inputs.state-path }}" --worktree "${{ inputs.worktree-path }}"
