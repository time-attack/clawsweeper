name: repair cluster worker

run-name: ${{ inputs.dispatch_key && format('{0} [{1}]', contains(inputs.job, '/inbox/issue-') && format('issue implementation {0}', inputs.job) || contains(inputs.job, '/inbox/automerge-') && format('automerge repair {0}', inputs.job) || format('repair cluster {0}', inputs.job), inputs.dispatch_key) || contains(inputs.job, '/inbox/issue-') && format('issue implementation {0}', inputs.job) || contains(inputs.job, '/inbox/automerge-') && format('automerge repair {0}', inputs.job) || format('repair cluster {0}', inputs.job) }}

on:
  workflow_dispatch:
    inputs:
      job:
        description: "Job markdown path, for example jobs/openclaw/inbox/cluster-001.md"
        required: true
        type: string
      dispatch_key:
        description: "Optional command-router idempotency key"
        required: false
        default: ""
        type: string
      mode:
        description: "Worker mode"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - execute
          - autonomous
      runner:
        description: "Runner label for cluster planning/review work"
        required: true
        default: blacksmith-4vcpu-ubuntu-2404
        type: string
      execution_runner:
        description: "Runner label for fix/apply execution work"
        required: true
        default: blacksmith-16vcpu-ubuntu-2404
        type: string
      planner_sandbox:
        description: "Codex planning sandbox; danger-full-access is for trusted ephemeral runner fallback only"
        required: true
        default: read-only
        type: choice
        options:
          - read-only
          - danger-full-access
      model:
        description: "Internal Codex model alias"
        required: true
        default: internal
        type: string
      dry_run:
        description: "Render prompt and write a dry result without invoking Codex"
        required: true
        default: false
        type: boolean
      requeue:
        description: "Run in a dedicated lane while replacing a stale-head worker"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLAWSWEEPER_APP_SLUG: openclaw-clawsweeper
  CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093
  CLAWSWEEPER_MODEL: internal

concurrency:
  group: ${{ inputs.requeue && format('clawsweeper-repair-requeue-{0}-{1}', inputs.job, github.run_id) || format('clawsweeper-repair-{0}', inputs.job) }}
  # Keep an active execute run alive so its temporary gate cleanup can finish;
  # GitHub still coalesces pending runs in this group to the newest dispatch.
  cancel-in-progress: false

jobs:
  receipt:
    name: Deduplicate command dispatch receipt
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      proceed: ${{ steps.receipt.outputs.proceed }}
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: scripts/dispatch-receipt-owner.sh
          sparse-checkout-cone-mode: false

      - id: receipt
        env:
          DISPATCH_KEY: ${{ inputs.dispatch_key }}
          JOB_PATH: ${{ inputs.job }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "$DISPATCH_KEY" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "$JOB_PATH" in
            */inbox/issue-*) title="issue implementation $JOB_PATH" ;;
            */inbox/automerge-*) title="automerge repair $JOB_PATH" ;;
            *) title="repair cluster $JOB_PATH" ;;
          esac
          expected_title="${title} [${DISPATCH_KEY}]"
          owner="$(bash scripts/dispatch-receipt-owner.sh \
            repair-cluster-worker.yml "$expected_title" "$GITHUB_RUN_ID" "Plan and review cluster")"
          if [ "$owner" = "owner" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "An older active or successfully executed command dispatch already exists; skipping duplicate repair."
            exit 0
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

  cluster:
    name: Plan and review cluster
    needs: receipt
    if: ${{ needs.receipt.outputs.proceed == 'true' }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 90
    outputs:
      allow_execute: ${{ steps.capture_gates.outputs.allow_execute }}
      allow_fix_pr: ${{ steps.capture_gates.outputs.allow_fix_pr }}
      allow_merge: ${{ steps.capture_gates.outputs.allow_merge }}
      job_exists: ${{ steps.check_job.outputs.job_exists }}
    env:
      CLAWSWEEPER_ALLOWED_OWNER: ${{ vars.CLAWSWEEPER_ALLOWED_OWNER || 'openclaw' }}
      CLAWSWEEPER_ALLOW_EXECUTE: ${{ (inputs.mode == 'execute' || inputs.mode == 'autonomous') && vars.CLAWSWEEPER_ALLOW_EXECUTE == '1' && '1' || '0' }}
      CLAWSWEEPER_ALLOW_FIX_PR: ${{ (inputs.mode == 'execute' || inputs.mode == 'autonomous') && vars.CLAWSWEEPER_ALLOW_FIX_PR == '1' && '1' || '0' }}
      CLAWSWEEPER_ALLOW_MERGE: ${{ (inputs.mode == 'execute' || inputs.mode == 'autonomous') && (vars.CLAWSWEEPER_ALLOW_MERGE || '0') || '0' }}
      CLAWSWEEPER_HYDRATE_CLUSTER_REFS: ${{ vars.CLAWSWEEPER_HYDRATE_CLUSTER_REFS || '1' }}
      CLAWSWEEPER_HYDRATE_COMMENTS: ${{ vars.CLAWSWEEPER_HYDRATE_COMMENTS || '1' }}
      CLAWSWEEPER_MAX_COMMENTS_PER_ITEM: ${{ vars.CLAWSWEEPER_MAX_COMMENTS_PER_ITEM || '30' }}
      CLAWSWEEPER_MAX_LINKED_REFS: ${{ vars.CLAWSWEEPER_MAX_LINKED_REFS || '20' }}
      CLAWSWEEPER_MAX_REVIEW_COMMENTS_PER_PR: ${{ vars.CLAWSWEEPER_MAX_REVIEW_COMMENTS_PER_PR || '50' }}
      CLAWSWEEPER_CODEX_TIMEOUT_MS: ${{ vars.CLAWSWEEPER_CODEX_TIMEOUT_MS || '1800000' }}
      CLAWSWEEPER_CODEX_REASONING_EFFORT: ${{ vars.CLAWSWEEPER_CODEX_REASONING_EFFORT || 'high' }}
      CLAWSWEEPER_CODEX_PLANNER_SANDBOX: ${{ inputs.planner_sandbox }}
      CLAWSWEEPER_STEERABLE_CODEX: ${{ vars.CLAWSWEEPER_STEERABLE_CODEX || '0' }}
      CLAWSWEEPER_CRABFLEET_URL: ${{ vars.CLAWSWEEPER_CRABFLEET_URL || 'https://crabfleet.openclaw.ai' }}
      OPENCLAW_LOCAL_CHECK: "0"
    steps:
      - uses: actions/checkout@v7
        with:
          filter: blob:none

      - name: Resolve target owner
        id: target
        env:
          JOB_PATH: ${{ inputs.job }}
        run: |
          set -euo pipefail
          case "$JOB_PATH" in
            jobs/*/*) ;;
            *)
              echo "Invalid job path: $JOB_PATH" >&2
              exit 1
              ;;
          esac
          owner="${JOB_PATH#jobs/}"
          owner="${owner%%/*}"
          if ! printf '%s' "$owner" | grep -Eq '^[A-Za-z0-9_.-]+$'; then
            echo "Invalid target owner: $owner" >&2
            exit 1
          fi
          echo "target_owner=$owner" >> "$GITHUB_OUTPUT"

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ steps.target.outputs.target_owner }}
          permission-contents: read
          permission-issues: read
          permission-pull-requests: read

      - name: Create state token
        id: state-token
        uses: ./.github/actions/create-state-token
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}

      - uses: ./.github/actions/setup-state
        with:
          token: ${{ steps.state-token.outputs.token }}
          fetch-depth: 1
          sparse-checkout: jobs
          persist-credentials: "false"

      - name: Check job file
        id: check_job
        env:
          JOB_PATH: ${{ inputs.job }}
        run: scripts/restore-repair-job.sh "$JOB_PATH" "this worker"

      - name: Capture execution gates
        id: capture_gates
        run: |
          {
            echo "allow_execute=${CLAWSWEEPER_ALLOW_EXECUTE}"
            echo "allow_fix_pr=${CLAWSWEEPER_ALLOW_FIX_PR}"
            echo "allow_merge=${CLAWSWEEPER_ALLOW_MERGE}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve Codex session cache
        id: codex_session
        if: ${{ steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_STEERABLE_CODEX == '1' }}
        env:
          JOB_PATH: ${{ inputs.job }}
        run: |
          set -euo pipefail
          key="$(printf '%s' "$JOB_PATH" | sha256sum | cut -d' ' -f1)"
          codex_home="$HOME/.clawsweeper-repair/codex-home/work-$key"
          echo "key=$key" >> "$GITHUB_OUTPUT"
          echo "codex_home=$codex_home" >> "$GITHUB_OUTPUT"
          echo "CLAWSWEEPER_CODEX_THREAD_STATE=$codex_home/clawsweeper-thread-state.json" >> "$GITHUB_ENV"

      - uses: ./.github/actions/setup-pnpm
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        with:
          build-script: build:repair

      - name: Publish execution-disabled terminal status
        if: ${{ steps.check_job.outputs.job_exists == '1' && (inputs.mode == 'execute' || inputs.mode == 'autonomous') && env.CLAWSWEEPER_ALLOW_EXECUTE != '1' }}
        continue-on-error: true
        env:
          GH_TOKEN: ""
          GITHUB_TOKEN: ""
          CLAWSWEEPER_STATUS_INGEST_TOKEN: ${{ secrets.CLAWSWEEPER_STATUS_INGEST_TOKEN }}
        run: |
          pnpm run repair:issue-implementation-status -- \
            --job "${{ inputs.job }}" \
            --dashboard-only \
            --state "Blocked" \
            --detail "Automatic execution is disabled by the trusted CLAWSWEEPER_ALLOW_EXECUTE gate." \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - uses: ./.github/actions/setup-codex
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAWSWEEPER_INTERNAL_MODEL: ${{ secrets.CLAWSWEEPER_MODEL }}
        with:
          codex-home: ${{ steps.codex_session.outputs.codex_home }}

      - name: Restore Codex session
        id: restore_codex_session
        if: ${{ steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_STEERABLE_CODEX == '1' }}
        uses: actions/cache/restore@v6
        with:
          path: |
            ${{ steps.codex_session.outputs.codex_home }}/sessions
            ${{ steps.codex_session.outputs.codex_home }}/clawsweeper-thread-state.json
          key: ${{ runner.os }}-clawsweeper-codex-thread-${{ steps.codex_session.outputs.key }}-${{ github.run_id }}-${{ github.run_attempt }}-cluster
          restore-keys: |
            ${{ runner.os }}-clawsweeper-codex-thread-${{ steps.codex_session.outputs.key }}-

      - name: Register steerable Action session
        id: crabfleet_session
        if: ${{ steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_STEERABLE_CODEX == '1' && !inputs.dry_run }}
        env:
          CLAWSWEEPER_CRABFLEET_SERVICE_TOKEN: ${{ secrets.CLAWSWEEPER_CRABFLEET_SERVICE_TOKEN }}
          CLAWSWEEPER_CRABFLEET_OWNER: ${{ vars.CLAWSWEEPER_CRABFLEET_OWNER }}
        run: pnpm run repair:action-session -- register "${{ inputs.job }}"

      - name: Verify GitHub read token
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "GitHub App token is required"
            exit 1
          fi
          gh auth status

      - name: Validate job
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
        run: pnpm run repair:validate-job -- "${{ inputs.job }}"

      - name: Verify self-heal head
        id: self_heal_head
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
        run: pnpm run repair:conflict-self-heal -- --verify-job-head "${{ inputs.job }}"

      - name: Run worker
        if: ${{ steps.check_job.outputs.job_exists == '1' && steps.self_heal_head.outputs.matched != 'false' }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
        run: |
          worker_mode="${{ inputs.mode }}"
          if [ "$worker_mode" != "plan" ] && [ "${CLAWSWEEPER_ALLOW_EXECUTE}" != "1" ]; then
            echo "CLAWSWEEPER_ALLOW_EXECUTE is not explicitly 1; rendering plan-only output for requested $worker_mode run"
            worker_mode="plan"
          fi
          args=("${{ inputs.job }}" --mode "$worker_mode")
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          fi
          pnpm run repair:worker -- "${args[@]}"

      - name: Review worker result
        if: always()
        run: |
          if find .clawsweeper-repair/runs -name result.json -print -quit | grep -q .; then
            pnpm run repair:review-results -- .clawsweeper-repair/runs
          fi

      - name: Collect Codex debug logs
        if: ${{ always() && steps.check_job.outputs.job_exists == '1' }}
        env:
          CLAWSWEEPER_CODEX_DEBUG_SINCE_MINUTES: ${{ vars.CLAWSWEEPER_CODEX_DEBUG_SINCE_MINUTES || '240' }}
        run: |
          if [ -f dist/repair/collect-codex-debug.js ]; then
            node dist/repair/collect-codex-debug.js \
              --out .clawsweeper-repair/codex-debug/cluster \
              --label cluster \
              --since-minutes "${CLAWSWEEPER_CODEX_DEBUG_SINCE_MINUTES}"
          else
            echo "::notice title=No Codex debug collector::dist/repair/collect-codex-debug.js is missing."
          fi

      - name: Upload Codex debug logs
        if: ${{ always() && steps.check_job.outputs.job_exists == '1' }}
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-codex-debug-cluster-${{ github.run_id }}-${{ github.run_attempt }}
          path: .clawsweeper-repair/codex-debug/cluster/**
          if-no-files-found: warn
          retention-days: 7

      - name: Upload worker transfer artifacts
        if: ${{ always() && (inputs.mode == 'execute' || inputs.mode == 'autonomous') && !inputs.dry_run }}
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-repair-worker-${{ github.run_id }}-${{ github.run_attempt }}
          path: .clawsweeper-repair/runs
          if-no-files-found: warn

      - name: Upload final worker artifacts
        if: ${{ always() && (!((inputs.mode == 'execute' || inputs.mode == 'autonomous') && !inputs.dry_run) || failure() || cancelled()) }}
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-repair-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .clawsweeper-repair/runs/**
          if-no-files-found: warn

      - name: Save Codex session
        if: ${{ always() && steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_STEERABLE_CODEX == '1' }}
        uses: actions/cache/save@v6
        with:
          path: |
            ${{ steps.codex_session.outputs.codex_home }}/sessions
            ${{ steps.codex_session.outputs.codex_home }}/clawsweeper-thread-state.json
          key: ${{ runner.os }}-clawsweeper-codex-thread-${{ steps.codex_session.outputs.key }}-${{ github.run_id }}-${{ github.run_attempt }}-cluster

      - name: Record planning completion
        if: ${{ success() && steps.crabfleet_session.outcome == 'success' }}
        run: |
          if [[ "${{ inputs.mode }}" == "plan" || "${{ inputs.dry_run }}" == "true" ]]; then
            pnpm run repair:action-session -- update \
              --state completed \
              --phase "done" \
              --summary "Planning and deterministic review completed" \
              --completion-reason plan_complete
          else
            pnpm run repair:action-session -- update \
              --state running \
              --phase planned \
              --summary "Planning completed; execution runner starting"
          fi

      - name: Record planning failure
        if: ${{ failure() && steps.crabfleet_session.outcome == 'success' }}
        continue-on-error: true
        run: pnpm run repair:action-session -- update --state blocked --phase planning_failed --summary "Planning Action failed" --completion-reason action_failed

  authorize:
    name: Bind immutable execution handoff
    needs: cluster
    if: ${{ needs.cluster.result == 'success' && needs.cluster.outputs.job_exists == '1' && (inputs.mode == 'execute' || inputs.mode == 'autonomous') && !inputs.dry_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      authorization_sha256: ${{ steps.authorize.outputs.authorization_sha256 }}
      job_path: ${{ steps.authorize.outputs.job_path }}
      result_path: ${{ steps.authorize.outputs.result_path }}
      run_dir: ${{ steps.authorize.outputs.run_dir }}
      execution_intent_path: ${{ steps.authorize.outputs.execution_intent_path }}
      source_job_path: ${{ steps.authorize.outputs.source_job_path }}
      target_repo: ${{ steps.authorize.outputs.target_repo }}
      target_owner: ${{ steps.authorize.outputs.target_owner }}
      target_name: ${{ steps.authorize.outputs.target_name }}
      artifact_digest: ${{ steps.upload.outputs.artifact-digest }}
    env:
      CLAWSWEEPER_ALLOWED_OWNER: ${{ vars.CLAWSWEEPER_ALLOWED_OWNER || 'openclaw' }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          filter: blob:none
          persist-credentials: false

      - name: Create state token
        id: state-token
        uses: ./.github/actions/create-state-token
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}

      - uses: ./.github/actions/setup-state
        with:
          token: ${{ steps.state-token.outputs.token }}
          fetch-depth: 1
          sparse-checkout: jobs
          persist-credentials: "false"

      - name: Restore immutable job
        env:
          JOB_PATH: ${{ inputs.job }}
        run: scripts/restore-repair-job.sh "$JOB_PATH" "execution authorization"

      - name: Resolve exact target repository
        id: target
        env:
          JOB_PATH: ${{ inputs.job }}
        run: |
          set -euo pipefail
          repo="$(sed -n 's/^repo:[[:space:]]*//p' "$JOB_PATH" | head -n 1 | tr -d '"')"
          case "$repo" in
            "$CLAWSWEEPER_ALLOWED_OWNER"/*) ;;
            *)
              echo "Invalid target repository in immutable job: $repo" >&2
              exit 1
              ;;
          esac
          name="${repo#*/}"
          if ! printf '%s' "$name" | grep -Eq '^[A-Za-z0-9_.-]+$'; then
            echo "Invalid target repository name: $name" >&2
            exit 1
          fi
          {
            echo "owner=${CLAWSWEEPER_ALLOWED_OWNER}"
            echo "name=$name"
          } >> "$GITHUB_OUTPUT"

      - name: Create exact-repository authorization token
        id: target_read_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ steps.target.outputs.owner }}
          repositories: ${{ steps.target.outputs.name }}
          permission-contents: read
          permission-issues: read
          permission-pull-requests: read

      - uses: ./.github/actions/setup-pnpm
        with:
          build-script: build:repair

      - name: Download worker artifact
        uses: actions/download-artifact@v8
        with:
          name: clawsweeper-repair-worker-${{ github.run_id }}-${{ github.run_attempt }}
          path: .clawsweeper-repair/incoming

      - name: Authorize exact job and run
        id: authorize
        env:
          GH_TOKEN: ${{ steps.target_read_token.outputs.token }}
        run: |
          pnpm run repair:execution-handoff -- authorize \
            --job "${{ inputs.job }}" \
            --runs .clawsweeper-repair/incoming \
            --out .clawsweeper-repair/authorized \
            --run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --workflow-repository "${{ github.repository }}" \
            --workflow-sha "${{ github.sha }}" \
            --allowed-owner "${CLAWSWEEPER_ALLOWED_OWNER}" \
            --close-superseded "${{ vars.CLAWSWEEPER_CLOSE_SUPERSEDED_SOURCE_PRS || '1' }}"

      - name: Upload immutable execution handoff
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-repair-authorized-${{ github.run_id }}-${{ github.run_attempt }}
          path: .clawsweeper-repair/authorized
          if-no-files-found: error
          retention-days: 7

  execute:
    name: Prepare repair artifact without credentials
    needs:
      - cluster
      - authorize
    if: ${{ needs.authorize.result == 'success' }}
    runs-on: ${{ inputs.execution_runner }}
    timeout-minutes: 75
    outputs:
      job_exists: ${{ steps.check_job.outputs.job_exists }}
      execute_fix_outcome: ${{ steps.execute_fix.outcome }}
      mutation_ready: ${{ steps.seal.outputs.mutation_ready }}
      execution_manifest_sha256: ${{ steps.seal.outputs.execution_manifest_sha256 }}
      artifact_digest: ${{ steps.upload_execution.outputs.artifact-digest }}
    env:
      CLAWSWEEPER_ALLOWED_OWNER: ${{ needs.authorize.outputs.target_owner }}
      CLAWSWEEPER_ALLOW_EXECUTE: ${{ needs.cluster.outputs.allow_execute == '1' && '1' || '0' }}
      CLAWSWEEPER_ALLOW_FIX_PR: ${{ needs.cluster.outputs.allow_fix_pr == '1' && '1' || '0' }}
      CLAWSWEEPER_ALLOW_MERGE: ${{ needs.cluster.outputs.allow_merge || '0' }}
      CLAWSWEEPER_CODEX_REASONING_EFFORT: ${{ vars.CLAWSWEEPER_CODEX_REASONING_EFFORT || 'high' }}
      CLAWSWEEPER_CODEX_REVIEW_ATTEMPTS: ${{ vars.CLAWSWEEPER_CODEX_REVIEW_ATTEMPTS || '4' }}
      CLAWSWEEPER_FIX_CODEX_TIMEOUT_MS: ${{ vars.CLAWSWEEPER_FIX_CODEX_TIMEOUT_MS || '1800000' }}
      CLAWSWEEPER_FIX_STEP_TIMEOUT_MS: ${{ vars.CLAWSWEEPER_FIX_STEP_TIMEOUT_MS || '4200000' }}
      CLAWSWEEPER_FIX_TIMEOUT_RESERVE_MS: ${{ vars.CLAWSWEEPER_FIX_TIMEOUT_RESERVE_MS || '1800000' }}
      CLAWSWEEPER_FIX_PREFLIGHT_TIMEOUT_MS: ${{ vars.CLAWSWEEPER_FIX_PREFLIGHT_TIMEOUT_MS || '120000' }}
      CLAWSWEEPER_RESOLVE_REVIEW_THREADS: ${{ vars.CLAWSWEEPER_RESOLVE_REVIEW_THREADS || '1' }}
      CLAWSWEEPER_TARGET_VALIDATION_MODE: ${{ vars.CLAWSWEEPER_TARGET_VALIDATION_MODE || 'changed-only' }}
      CLAWSWEEPER_POST_FLIGHT_IGNORE_CHECKS: ${{ vars.CLAWSWEEPER_POST_FLIGHT_IGNORE_CHECKS || 'auto-response,Labeler,Stale' }}
      CLAWSWEEPER_MAX_ACTIVE_PRS_PER_AREA: ${{ vars.CLAWSWEEPER_MAX_ACTIVE_PRS_PER_AREA || '50' }}
      CLAWSWEEPER_CLOSE_SUPERSEDED_SOURCE_PRS: ${{ vars.CLAWSWEEPER_CLOSE_SUPERSEDED_SOURCE_PRS || '1' }}
      CLAWSWEEPER_GIT_USER_NAME: ${{ vars.CLAWSWEEPER_GIT_USER_NAME || 'clawsweeper[bot]' }}
      CLAWSWEEPER_GIT_USER_EMAIL: ${{ vars.CLAWSWEEPER_GIT_USER_EMAIL || '274271284+clawsweeper[bot]@users.noreply.github.com' }}
      CLAWSWEEPER_STEERABLE_CODEX: ${{ vars.CLAWSWEEPER_STEERABLE_CODEX || '0' }}
      CLAWSWEEPER_CRABFLEET_URL: ${{ vars.CLAWSWEEPER_CRABFLEET_URL || 'https://crabfleet.openclaw.ai' }}
      OPENCLAW_LOCAL_CHECK: "0"
    steps:
      - uses: actions/checkout@v7
        with:
          filter: blob:none
          persist-credentials: false

      - uses: ./.github/actions/setup-pnpm
        with:
          build-script: build:repair

      - name: Download immutable execution handoff
        uses: actions/download-artifact@v8
        with:
          name: clawsweeper-repair-authorized-${{ github.run_id }}-${{ github.run_attempt }}
          path: .clawsweeper-repair/authorized

      - name: Verify immutable execution handoff
        id: check_job
        run: |
          pnpm run repair:execution-handoff -- verify \
            --root .clawsweeper-repair/authorized \
            --authorization-sha256 "${{ needs.authorize.outputs.authorization_sha256 }}"

      - name: Resolve Codex session cache
        id: codex_session
        if: ${{ steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_STEERABLE_CODEX == '1' }}
        env:
          JOB_PATH: ${{ inputs.job }}
        run: |
          set -euo pipefail
          key="$(printf '%s' "$JOB_PATH" | sha256sum | cut -d' ' -f1)"
          codex_home="$HOME/.clawsweeper-repair/codex-home/work-$key"
          echo "key=$key" >> "$GITHUB_OUTPUT"
          echo "codex_home=$codex_home" >> "$GITHUB_OUTPUT"
          echo "CLAWSWEEPER_CODEX_THREAD_STATE=$codex_home/clawsweeper-thread-state.json" >> "$GITHUB_ENV"

      - name: Setup pinned Bun for target validation
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - uses: ./.github/actions/setup-codex
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAWSWEEPER_INTERNAL_MODEL: ${{ secrets.CLAWSWEEPER_MODEL }}
        with:
          cache-suffix: target-pnpm
          codex-home: ${{ steps.codex_session.outputs.codex_home }}

      - name: Restore Codex session
        if: ${{ steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_STEERABLE_CODEX == '1' }}
        uses: actions/cache/restore@v6
        with:
          path: |
            ${{ steps.codex_session.outputs.codex_home }}/sessions
            ${{ steps.codex_session.outputs.codex_home }}/clawsweeper-thread-state.json
          key: ${{ runner.os }}-clawsweeper-codex-thread-${{ steps.codex_session.outputs.key }}-${{ github.run_id }}-${{ github.run_attempt }}-cluster
          restore-keys: |
            ${{ runner.os }}-clawsweeper-codex-thread-${{ steps.codex_session.outputs.key }}-

      - name: Validate job
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          CLAWSWEEPER_ALLOWED_OWNER: ${{ needs.authorize.outputs.target_owner }}
        run: pnpm run repair:validate-job -- "${{ needs.authorize.outputs.job_path }}"

      - name: Execute credited fix artifact
        id: execute_fix
        if: ${{ steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_ALLOW_EXECUTE == '1' && env.CLAWSWEEPER_ALLOW_FIX_PR == '1' }}
        timeout-minutes: 70
        env:
          GH_TOKEN: ""
          GITHUB_TOKEN: ""
          CLAWSWEEPER_ALLOWED_OWNER: ${{ needs.authorize.outputs.target_owner }}
        run: |
          pnpm run repair:execute-fix -- \
            "${{ needs.authorize.outputs.job_path }}" \
            "${{ needs.authorize.outputs.result_path }}" \
            --prepare-publication \
            --execution-intent "${{ needs.authorize.outputs.execution_intent_path }}" \
            --authorization-sha256 "${{ needs.authorize.outputs.authorization_sha256 }}"

      - name: Seal execution handoff
        id: seal
        if: ${{ always() && steps.check_job.outputs.job_exists == '1' }}
        run: |
          pnpm run repair:execution-handoff -- seal \
            --root .clawsweeper-repair/authorized \
            --authorization-sha256 "${{ needs.authorize.outputs.authorization_sha256 }}" \
            --execute-outcome "${{ steps.execute_fix.outcome }}"

      - name: Upload sealed execution handoff
        id: upload_execution
        if: ${{ always() && steps.seal.outcome == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-repair-execution-${{ github.run_id }}-${{ github.run_attempt }}
          path: .clawsweeper-repair/authorized
          if-no-files-found: error
          retention-days: 7

      - name: Collect Codex debug logs
        if: ${{ always() && steps.check_job.outputs.job_exists == '1' }}
        env:
          CLAWSWEEPER_CODEX_DEBUG_SINCE_MINUTES: ${{ vars.CLAWSWEEPER_CODEX_DEBUG_SINCE_MINUTES || '240' }}
        run: |
          if [ -f dist/repair/collect-codex-debug.js ]; then
            node dist/repair/collect-codex-debug.js \
              --out .clawsweeper-repair/codex-debug/execute \
              --label execute \
              --since-minutes "${CLAWSWEEPER_CODEX_DEBUG_SINCE_MINUTES}"
          else
            echo "::notice title=No Codex debug collector::dist/repair/collect-codex-debug.js is missing."
          fi

      - name: Upload Codex debug logs
        if: ${{ always() && steps.check_job.outputs.job_exists == '1' }}
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-codex-debug-execute-${{ github.run_id }}-${{ github.run_attempt }}
          path: .clawsweeper-repair/codex-debug/execute/**
          if-no-files-found: warn
          retention-days: 7

      - name: Save Codex session
        if: ${{ always() && steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_STEERABLE_CODEX == '1' }}
        uses: actions/cache/save@v6
        with:
          path: |
            ${{ steps.codex_session.outputs.codex_home }}/sessions
            ${{ steps.codex_session.outputs.codex_home }}/clawsweeper-thread-state.json
          key: ${{ runner.os }}-clawsweeper-codex-thread-${{ steps.codex_session.outputs.key }}-${{ github.run_id }}-${{ github.run_attempt }}-execute

  validate:
    name: Replay repair proof without credentials
    needs:
      - authorize
      - execute
    if: ${{ needs.execute.result == 'success' && needs.execute.outputs.execute_fix_outcome == 'success' && needs.execute.outputs.mutation_ready == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    outputs:
      receipt_sha256: ${{ steps.validate.outputs.receipt_sha256 }}
      artifact_digest: ${{ steps.upload.outputs.artifact-digest }}
    env:
      OPENCLAW_LOCAL_CHECK: "0"
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          filter: blob:none
          persist-credentials: false

      - uses: ./.github/actions/setup-pnpm
        env:
          npm_config_ignore_scripts: "true"
        with:
          build-script: build:repair

      - name: Setup pinned Bun for target validation
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Download sealed execution handoff
        uses: actions/download-artifact@v8
        with:
          name: clawsweeper-repair-execution-${{ github.run_id }}-${{ github.run_attempt }}
          path: .clawsweeper-repair/execution

      - name: Independently replay exact repair proof
        id: validate
        env:
          GH_TOKEN: ""
          GITHUB_TOKEN: ""
        run: |
          pnpm run repair:execution-handoff -- validate \
            --root .clawsweeper-repair/execution \
            --authorization-sha256 "${{ needs.authorize.outputs.authorization_sha256 }}" \
            --receipt .clawsweeper-repair/validation/receipt.json

      - name: Upload validation receipt
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-repair-validation-${{ github.run_id }}-${{ github.run_attempt }}
          path: .clawsweeper-repair/validation/receipt.json
          if-no-files-found: error
          retention-days: 7

  report:
    name: Report and requeue without target credentials
    needs:
      - cluster
      - authorize
      - execute
      - validate
    if: ${{ always() && needs.authorize.result == 'success' && needs.execute.result != 'skipped' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLAWSWEEPER_ALLOWED_OWNER: ${{ needs.authorize.outputs.target_owner }}
      CLAWSWEEPER_ALLOW_EXECUTE: ${{ needs.cluster.outputs.allow_execute == '1' && '1' || '0' }}
      OPENCLAW_LOCAL_CHECK: "0"
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          filter: blob:none
          persist-credentials: false

      - uses: ./.github/actions/setup-pnpm
        with:
          build-script: build:repair

      - name: Download sealed execution handoff
        uses: actions/download-artifact@v8
        with:
          name: clawsweeper-repair-execution-${{ github.run_id }}-${{ github.run_attempt }}
          path: .clawsweeper-repair/execution

      - name: Verify report-only handoff
        run: |
          pnpm run repair:execution-handoff -- verify-execution \
            --root .clawsweeper-repair/execution \
            --authorization-sha256 "${{ needs.authorize.outputs.authorization_sha256 }}"

      - name: Detect repair requeue requests
        id: repair_requeue
        run: |
          set -euo pipefail
          count="$(pnpm run --silent workflow -- count-requeue-required --dir .clawsweeper-repair/execution/run)"
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Create central requeue token
        id: requeue_token
        if: ${{ steps.repair_requeue.outputs.count != '' && steps.repair_requeue.outputs.count != '0' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: clawsweeper
          permission-actions: write
          permission-contents: write

      - name: Requeue retryable report-only outcomes
        if: ${{ steps.repair_requeue.outputs.count != '' && steps.repair_requeue.outputs.count != '0' }}
        env:
          GH_TOKEN: ${{ steps.requeue_token.outputs.token }}
          CLAWSWEEPER_MUTATION_TOKEN_SOURCE: clawsweeper-app
        run: |
          pnpm run repair:requeue -- "${{ needs.authorize.outputs.source_job_path }}" \
            --mode "${{ inputs.mode }}" \
            --execute \
            --open-execute-window \
            --wait-for-capacity \
            --runner "${{ inputs.runner }}" \
            --execution-runner "${{ inputs.execution_runner }}" \
            --model "${{ inputs.model }}"

      - name: Publish terminal report-only status
        if: ${{ needs.execute.result != 'success' || needs.execute.outputs.execute_fix_outcome != 'success' || needs.execute.outputs.mutation_ready != 'true' || needs.validate.result != 'success' }}
        continue-on-error: true
        env:
          GH_TOKEN: ""
          GITHUB_TOKEN: ""
          CLAWSWEEPER_STATUS_INGEST_TOKEN: ${{ secrets.CLAWSWEEPER_STATUS_INGEST_TOKEN }}
        run: |
          pnpm run repair:issue-implementation-status -- \
            --job .clawsweeper-repair/execution/job.md \
            --dashboard-only \
            --state "Blocked" \
            --detail "The automatic implementation worker stopped before all deterministic gates completed. Open the workflow run for the exact blocker." \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  mutate:
    name: Token-only post-flight mutation
    needs:
      - cluster
      - authorize
      - execute
      - validate
      - report
    if: ${{ needs.execute.result == 'success' && needs.execute.outputs.execute_fix_outcome == 'success' && needs.execute.outputs.mutation_ready == 'true' && needs.validate.result == 'success' && needs.report.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CLAWSWEEPER_ALLOWED_OWNER: ${{ needs.authorize.outputs.target_owner }}
      CLAWSWEEPER_ALLOW_EXECUTE: ${{ needs.cluster.outputs.allow_execute == '1' && '1' || '0' }}
      CLAWSWEEPER_ALLOW_FIX_PR: ${{ needs.cluster.outputs.allow_fix_pr == '1' && '1' || '0' }}
      CLAWSWEEPER_ALLOW_MERGE: ${{ needs.cluster.outputs.allow_merge || '0' }}
      CLAWSWEEPER_POST_FLIGHT_IGNORE_CHECKS: ${{ vars.CLAWSWEEPER_POST_FLIGHT_IGNORE_CHECKS || 'auto-response,Labeler,Stale' }}
      CLAWSWEEPER_MAX_ACTIVE_PRS_PER_AREA: ${{ vars.CLAWSWEEPER_MAX_ACTIVE_PRS_PER_AREA || '50' }}
      CLAWSWEEPER_CLOSE_SUPERSEDED_SOURCE_PRS: ${{ vars.CLAWSWEEPER_CLOSE_SUPERSEDED_SOURCE_PRS || '1' }}
      CLAWSWEEPER_STEERABLE_CODEX: ${{ vars.CLAWSWEEPER_STEERABLE_CODEX || '0' }}
      CLAWSWEEPER_CRABFLEET_URL: ${{ vars.CLAWSWEEPER_CRABFLEET_URL || 'https://crabfleet.openclaw.ai' }}
      OPENCLAW_LOCAL_CHECK: "0"
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          filter: blob:none
          persist-credentials: false

      - uses: ./.github/actions/setup-pnpm
        env:
          npm_config_ignore_scripts: "true"
        with:
          build-script: build:repair

      - name: Download sealed execution handoff
        uses: actions/download-artifact@v8
        with:
          name: clawsweeper-repair-execution-${{ github.run_id }}-${{ github.run_attempt }}
          path: .clawsweeper-repair/execution

      - name: Download independent validation receipt
        uses: actions/download-artifact@v8
        with:
          name: clawsweeper-repair-validation-${{ github.run_id }}-${{ github.run_attempt }}
          path: .clawsweeper-repair/validation

      - name: Verify immutable mutation authorization
        id: receipt
        run: |
          pnpm run repair:execution-handoff -- verify-receipt \
            --root .clawsweeper-repair/execution \
            --authorization-sha256 "${{ needs.authorize.outputs.authorization_sha256 }}" \
            --receipt .clawsweeper-repair/validation/receipt.json \
            --receipt-sha256 "${{ needs.validate.outputs.receipt_sha256 }}"

      - name: Mark authorized job present
        id: check_job
        run: echo "job_exists=1" >> "$GITHUB_OUTPUT"

      - name: Resume steerable Action session
        id: crabfleet_session
        if: ${{ steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_STEERABLE_CODEX == '1' }}
        env:
          CLAWSWEEPER_CRABFLEET_SERVICE_TOKEN: ${{ secrets.CLAWSWEEPER_CRABFLEET_SERVICE_TOKEN }}
          CLAWSWEEPER_CRABFLEET_OWNER: ${{ vars.CLAWSWEEPER_CRABFLEET_OWNER }}
        run: pnpm run repair:action-session -- register .clawsweeper-repair/execution/job.md

      - name: Create exact-repository mutation token
        id: target_post_flight_token
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ needs.authorize.outputs.target_owner }}
          repositories: ${{ needs.authorize.outputs.target_name }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-workflows: write

      - name: Create exact-repository ruleset verifier token
        id: ruleset-verifier-token
        if: ${{ steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_ALLOW_MERGE == '1' }}
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ needs.authorize.outputs.target_owner }}
          repositories: ${{ needs.authorize.outputs.target_name }}
          permission-administration: write

      - name: Bind authenticated mutation App identity
        id: mutation_app
        if: ${{ steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_ALLOW_MERGE == '1' }}
        env:
          GH_TOKEN: ${{ steps.target_post_flight_token.outputs.token }}
          APP_SLUG: ${{ steps.target_post_flight_token.outputs.app-slug }}
        run: |
          set -euo pipefail
          test -n "$APP_SLUG"
          app_id="$(gh api "apps/$APP_SLUG" --jq '.id')"
          test "$app_id" -gt 0
          echo "app_id=$app_id" >> "$GITHUB_OUTPUT"

      - name: Bind authenticated ruleset App identity
        id: ruleset_app
        if: ${{ env.CLAWSWEEPER_ALLOW_MERGE == '1' && steps.ruleset-verifier-token.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ steps.ruleset-verifier-token.outputs.token }}
          APP_SLUG: ${{ steps.ruleset-verifier-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          test -n "$APP_SLUG"
          app_id="$(gh api "apps/$APP_SLUG" --jq '.id')"
          test "$app_id" -gt 0
          echo "app_id=$app_id" >> "$GITHUB_OUTPUT"

      - name: Record deterministic validation phase
        if: ${{ success() && needs.execute.outputs.execute_fix_outcome == 'success' && steps.crabfleet_session.outcome == 'success' }}
        run: pnpm run repair:action-session -- update --state running --phase post_flight --summary "Codex changes validated; applying GitHub post-flight gates"

      - name: Publish exact independently validated repair
        id: publish
        env:
          GH_TOKEN: ${{ steps.target_post_flight_token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.target_post_flight_token.outputs.token }}
        run: |
          pnpm run repair:execution-handoff -- publish \
            --root .clawsweeper-repair/execution \
            --authorization-sha256 "${{ needs.authorize.outputs.authorization_sha256 }}" \
            --validation-receipt .clawsweeper-repair/validation/receipt.json \
            --validation-receipt-sha256 "${{ needs.validate.outputs.receipt_sha256 }}" \
            --publication-receipt .clawsweeper-repair/publication/receipt.json

      - name: Verify publication receipt
        run: |
          pnpm run repair:execution-handoff -- verify-publication \
            --root .clawsweeper-repair/execution \
            --authorization-sha256 "${{ needs.authorize.outputs.authorization_sha256 }}" \
            --validation-receipt .clawsweeper-repair/validation/receipt.json \
            --validation-receipt-sha256 "${{ needs.validate.outputs.receipt_sha256 }}" \
            --publication-receipt .clawsweeper-repair/publication/receipt.json \
            --publication-receipt-sha256 "${{ steps.publish.outputs.publication_receipt_sha256 }}"

      - name: Upload durable publication checkpoint
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-repair-publication-${{ github.run_id }}-${{ github.run_attempt }}
          path: .clawsweeper-repair/publication/receipt.json
          if-no-files-found: error
          retention-days: 7

      - name: Close superseded sources from publication checkpoint
        env:
          GH_TOKEN: ${{ steps.target_post_flight_token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.target_post_flight_token.outputs.token }}
        run: |
          pnpm run repair:execution-handoff -- close-sources \
            --root .clawsweeper-repair/execution \
            --authorization-sha256 "${{ needs.authorize.outputs.authorization_sha256 }}" \
            --validation-receipt .clawsweeper-repair/validation/receipt.json \
            --validation-receipt-sha256 "${{ needs.validate.outputs.receipt_sha256 }}" \
            --publication-receipt .clawsweeper-repair/publication/receipt.json \
            --publication-receipt-sha256 "${{ steps.publish.outputs.publication_receipt_sha256 }}"

      - name: Post-flight finalize fix PRs
        id: post_flight
        if: ${{ success() && steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_ALLOW_EXECUTE == '1' && env.CLAWSWEEPER_ALLOW_FIX_PR == '1' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.target_post_flight_token.outputs.token }}
          CLAWSWEEPER_AUTHENTICATED_APP_ID: ${{ steps.mutation_app.outputs.app_id }}
          CLAWSWEEPER_AUTHENTICATED_APP_SLUG: ${{ steps.target_post_flight_token.outputs.app-slug }}
          CLAWSWEEPER_AUTHENTICATED_INSTALLATION_ID: ${{ steps.target_post_flight_token.outputs.installation-id }}
          CLAWSWEEPER_RULESET_APP_ID: ${{ steps.ruleset_app.outputs.app_id }}
          CLAWSWEEPER_RULESET_APP_SLUG: ${{ steps.ruleset-verifier-token.outputs.app-slug }}
          CLAWSWEEPER_RULESET_INSTALLATION_ID: ${{ steps.ruleset-verifier-token.outputs.installation-id }}
          CLAWSWEEPER_RULESET_GH_TOKEN: ${{ steps.ruleset-verifier-token.outputs.token }}
          CLAWSWEEPER_ALLOWED_OWNER: ${{ needs.authorize.outputs.target_owner }}
        run: |
          pnpm run repair:post-flight -- \
            .clawsweeper-repair/execution/job.md \
            .clawsweeper-repair/execution/run/result.json \
            --handoff-root .clawsweeper-repair/execution \
            --authorization-sha256 "${{ needs.authorize.outputs.authorization_sha256 }}" \
            --validation-receipt .clawsweeper-repair/validation/receipt.json \
            --validation-receipt-sha256 "${{ needs.validate.outputs.receipt_sha256 }}" \
            --publication-receipt .clawsweeper-repair/publication/receipt.json \
            --publication-receipt-sha256 "${{ steps.publish.outputs.publication_receipt_sha256 }}"

      - name: Publish automatic implementation completion status
        if: ${{ always() && steps.check_job.outputs.job_exists == '1' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.target_post_flight_token.outputs.token }}
          CLAWSWEEPER_STATUS_INGEST_TOKEN: ${{ secrets.CLAWSWEEPER_STATUS_INGEST_TOKEN }}
          EXECUTE_OUTCOME: ${{ needs.execute.outputs.execute_fix_outcome }}
          POST_FLIGHT_OUTCOME: ${{ steps.post_flight.outputs.report_outcome }}
          POST_FLIGHT_DETAIL: ${{ steps.post_flight.outputs.report_detail }}
          TRUSTED_PR_URL: ${{ steps.publish.outputs.target_pr_url }}
        run: |
          set -euo pipefail
          state="Blocked"
          detail="The automatic implementation worker stopped before all deterministic gates completed. Open the workflow run for the exact blocker."
          case "$POST_FLIGHT_OUTCOME" in
            success)
              if [ "$EXECUTE_OUTCOME" = "success" ] && [ -n "$TRUSTED_PR_URL" ]; then
                state="PR Opened"
                detail="The exact independently validated repair was published at $TRUSTED_PR_URL and passed all post-flight gates."
              fi
              ;;
            requeue)
              detail="Post-flight requested a retry: ${POST_FLIGHT_DETAIL:-retryable publication state}."
              ;;
            blocked)
              detail="Post-flight blocked publication completion: ${POST_FLIGHT_DETAIL:-terminal policy gate}."
              ;;
          esac
          pnpm run repair:issue-implementation-status -- \
            --job .clawsweeper-repair/execution/job.md \
            --state "$state" \
            --detail "$detail" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --pr-url "$TRUSTED_PR_URL"

      - name: Record work completion
        if: ${{ success() && steps.post_flight.outputs.report_outcome == 'success' && steps.crabfleet_session.outcome == 'success' }}
        run: pnpm run repair:action-session -- update --state completed --phase "done" --summary "Repair, validation, review, push, and post-flight gates completed" --completion-reason gates_passed

      - name: Upload final worker artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-repair-${{ github.run_id }}-${{ github.run_attempt }}
          path: .clawsweeper-repair/execution/run/**
          if-no-files-found: warn

      - name: Record work failure
        if: ${{ always() && (failure() || steps.post_flight.outcome == 'failure' || steps.post_flight.outputs.report_outcome == 'blocked' || steps.post_flight.outputs.report_outcome == 'requeue') && steps.crabfleet_session.outcome == 'success' }}
        continue-on-error: true
        run: pnpm run repair:action-session -- update --state blocked --phase action_failed --summary "Repair Action failed before all completion gates passed" --completion-reason action_failed

      - name: Fail incomplete post-flight result
        if: ${{ always() && (steps.post_flight.outcome == 'failure' || steps.post_flight.outputs.report_outcome != 'success') }}
        env:
          POST_FLIGHT_OUTCOME: ${{ steps.post_flight.outputs.report_outcome }}
          POST_FLIGHT_DETAIL: ${{ steps.post_flight.outputs.report_detail }}
        run: |
          echo "post-flight did not complete: ${POST_FLIGHT_OUTCOME:-missing}: ${POST_FLIGHT_DETAIL:-no report detail}" >&2
          exit 1
