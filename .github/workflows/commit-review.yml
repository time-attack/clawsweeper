name: ClawSweeper Commit Review

run-name: ${{ (github.event.inputs.continuation_key || github.event.client_payload.continuation_key) && format('Commit review {0}@{1} [{2}]', github.event.inputs.target_repo || github.event.client_payload.target_repo || 'openclaw/openclaw', github.event.inputs.commit_sha || github.event.client_payload.after_sha || github.event.client_payload.commit_sha || '?', github.event.inputs.continuation_key || github.event.client_payload.continuation_key) || format('Commit review {0}@{1}', github.event.inputs.target_repo || github.event.client_payload.target_repo || 'openclaw/openclaw', github.event.inputs.commit_sha || github.event.client_payload.after_sha || github.event.client_payload.commit_sha || '?') }}

on:
  workflow_dispatch:
    inputs:
      enabled:
        description: "Run commit review"
        required: false
        default: "true"
      target_repo:
        description: "Repository containing the main commit"
        required: false
        default: "openclaw/openclaw"
      commit_sha:
        description: "Specific commit SHA to review"
        required: true
      before_sha:
        description: "Optional base SHA; defaults to the commit's first parent"
        required: false
        default: ""
      commit_offset:
        description: "Internal offset for continuation runs"
        required: false
        default: "0"
      continuation_key:
        description: "Stable commit review continuation idempotency key"
        required: false
        default: ""
      create_checks:
        description: "Create/update GitHub Checks on reviewed commits"
        required: false
        default: ""
      additional_prompt:
        description: "Optional extra review instruction appended to the prompt"
        required: false
        default: ""

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093
  CLAWSWEEPER_MODEL: internal

concurrency:
  group: commit-review-${{ github.event.inputs.target_repo || github.event.client_payload.target_repo || 'openclaw/openclaw' }}-${{ github.event.inputs.commit_sha || github.event.client_payload.after_sha || github.event.client_payload.commit_sha || github.run_id }}
  cancel-in-progress: false

jobs:
  receipt:
    name: Deduplicate commit review continuation receipt
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      proceed: ${{ steps.receipt.outputs.proceed }}
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: scripts/dispatch-receipt-owner.sh
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - id: receipt
        env:
          CONTINUATION_KEY: ${{ github.event.inputs.continuation_key || github.event.client_payload.continuation_key || '' }}
          TARGET_REPO: ${{ github.event.inputs.target_repo || github.event.client_payload.target_repo || 'openclaw/openclaw' }}
          COMMIT_SHA: ${{ github.event.inputs.commit_sha || github.event.client_payload.after_sha || github.event.client_payload.commit_sha || '?' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "$CONTINUATION_KEY" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          expected_title="Commit review ${TARGET_REPO}@${COMMIT_SHA} [${CONTINUATION_KEY}]"
          owner="$(bash scripts/dispatch-receipt-owner.sh \
            commit-review.yml "$expected_title" "$GITHUB_RUN_ID" \
            "Commit reports" "Complete commit review continuation receipt")"
          if [ "$owner" = "owner" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "An older active or durably published continuation already exists; skipping duplicate review."
            exit 0
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

  disabled-target:
    name: Skip disabled target commit review
    needs: receipt
    if: ${{ needs.receipt.outputs.proceed == 'true' && github.event_name == 'repository_dispatch' && github.event.client_payload.target_repo == 'openclaw/clawhub' && vars.CLAWSWEEPER_ENABLE_CLAWHUB != '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Explain skipped commit review
        run: |
          echo "Skipping commit review for ${{ github.event.client_payload.target_repo }}."
          echo "Set CLAWSWEEPER_ENABLE_CLAWHUB=1 after installing the ClawSweeper GitHub App on openclaw/clawhub."

  plan:
    name: Plan commits
    needs: receipt
    if: ${{ needs.receipt.outputs.proceed == 'true' && !(github.event_name == 'repository_dispatch' && github.event.client_payload.target_repo == 'openclaw/clawhub' && vars.CLAWSWEEPER_ENABLE_CLAWHUB != '1') }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    outputs:
      create_checks: ${{ steps.mode.outputs.create_checks }}
      enabled: ${{ steps.mode.outputs.enabled }}
      has_more: ${{ steps.select.outputs.has_more }}
      matrix: ${{ steps.select.outputs.matrix }}
      next_offset: ${{ steps.select.outputs.next_offset }}
      planned_count: ${{ steps.select.outputs.planned_count }}
      skipped_count: ${{ steps.select.outputs.skipped_count }}
      target_checkout_dir: ${{ steps.target.outputs.target_checkout_dir }}
      target_repo: ${{ steps.target.outputs.target_repo }}
      target_repo_name: ${{ steps.target.outputs.target_repo_name }}
      target_repo_owner: ${{ steps.target.outputs.target_repo_owner }}
    steps:
      - uses: actions/checkout@v7
        with:
          path: clawsweeper
          filter: blob:none
          fetch-depth: 1

      - name: Resolve mode
        id: mode
        run: |
          enabled="${{ github.event.inputs.enabled || github.event.client_payload.enabled || 'true' }}"
          create_checks="${{ github.event.inputs.create_checks || github.event.client_payload.create_checks || vars.CLAWSWEEPER_COMMIT_REVIEW_CREATE_CHECKS || 'false' }}"
          case "$enabled" in
            false|FALSE|0|no|NO|off|OFF)
              echo "Commit review disabled by input/payload."
              echo "enabled=false" >> "$GITHUB_OUTPUT"
              echo "create_checks=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac
          case "$create_checks" in
            true|TRUE|1|yes|YES|on|ON) create_checks=true ;;
            *) create_checks=false ;;
          esac
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "create_checks=$create_checks" >> "$GITHUB_OUTPUT"

      - name: Resolve target repository
        id: target
        run: |
          target_repo="${{ github.event.inputs.target_repo || github.event.client_payload.target_repo || 'openclaw/openclaw' }}"
          if ! printf '%s' "$target_repo" | grep -Eq '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$'; then
            echo "Invalid target_repo: $target_repo" >&2
            exit 1
          fi
          target_owner="${target_repo%%/*}"
          target_name="${target_repo#*/}"
          {
            echo "target_repo=$target_repo"
            echo "target_repo_owner=$target_owner"
            echo "target_repo_name=$target_name"
            echo "target_checkout_dir=target-$target_name"
          } >> "$GITHUB_OUTPUT"

      - name: Create target read token
        id: target-read-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ steps.target.outputs.target_repo_owner }}
          repositories: ${{ steps.target.outputs.target_repo_name }}
          permission-actions: read
          permission-contents: read
          permission-issues: read
          permission-pull-requests: read

      - name: Create state token
        id: state-token
        uses: ./clawsweeper/.github/actions/create-state-token
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}

      - uses: ./clawsweeper/.github/actions/setup-state
        with:
          token: ${{ steps.state-token.outputs.token }}
          worktree-path: clawsweeper
          fetch-depth: 1

      - uses: ./clawsweeper/.github/actions/setup-pnpm
        with:
          working-directory: clawsweeper
          build-script: build:all

      - name: Select commits
        id: select
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_REPO: ${{ steps.target.outputs.target_repo }}
          TARGET_NAME: ${{ steps.target.outputs.target_checkout_dir }}
          TARGET_TOKEN: ${{ steps.target-read-token.outputs.token }}
          COMMIT_SHA: ${{ github.event.inputs.commit_sha || github.event.client_payload.after_sha || github.event.client_payload.commit_sha || '' }}
          BEFORE_SHA: ${{ github.event.inputs.before_sha || github.event.client_payload.before_sha || '' }}
          COMMIT_OFFSET: ${{ github.event.inputs.commit_offset || github.event.client_payload.commit_offset || '0' }}
          ENABLED: ${{ steps.mode.outputs.enabled }}
          SOURCE_REF: ${{ github.event.client_payload.ref || 'refs/heads/main' }}
          SETTLE_SECONDS: ${{ vars.CLAWSWEEPER_COMMIT_REVIEW_SETTLE_SECONDS || '60' }}
          PAGE_SIZE: ${{ vars.CLAWSWEEPER_COMMIT_REVIEW_PAGE_SIZE || '' }}
        run: |
          set -euo pipefail
          active_runs_json() {
            {
              for run_status in in_progress pending queued waiting requested; do
                gh api "repos/${{ github.repository }}/actions/runs?per_page=100&status=${run_status}" \
                  --paginate \
                  --jq '.workflow_runs[] | {databaseId:.id, workflowPath:.path, displayTitle:.display_title, status:.status, createdAt:.created_at, updatedAt:.updated_at}' 2>/dev/null \
                  || true
              done
            } | jq -s 'unique_by(.databaseId)'
          }
          ACTIVE_RUNS_JSON="$(active_runs_json)"
          STALE_QUEUED_CUTOFF="$(date -u -d '6 hours ago' '+%Y-%m-%dT%H:%M:%SZ')"
          active_run_count() {
            printf '%s' "$ACTIVE_RUNS_JSON" \
              | WORKFLOW_PATH="$1" STALE_QUEUED_CUTOFF="$STALE_QUEUED_CUTOFF" jq '[.[] | select(.workflowPath == env.WORKFLOW_PATH) | select(.status == "in_progress" or ((.status == "pending" or .status == "queued" or .status == "waiting" or .status == "requested") and ((.updatedAt // .createdAt // "") >= env.STALE_QUEUED_CUTOFF)))] | length' 2>/dev/null \
              || printf '0'
          }
          active_sweep_background_workers() {
            local runs total id title status jobs_json active_shards total_shards
            local reserved_shards hard_cap requested_shards item_numbers commas item_count
            total=0
            hard_cap="$(pnpm --dir clawsweeper run --silent workflow -- limit review_shards.hard_cap)"
            runs="$(printf '%s' "$ACTIVE_RUNS_JSON" \
              | STALE_QUEUED_CUTOFF="$STALE_QUEUED_CUTOFF" jq -r '.[] | select(.workflowPath == ".github/workflows/sweep.yml") | select(.status == "in_progress" or ((.status == "pending" or .status == "queued" or .status == "waiting" or .status == "requested") and ((.updatedAt // .createdAt // "") >= env.STALE_QUEUED_CUTOFF))) | select(.displayTitle == "Review ClawSweeper items" or .displayTitle == "Review hot ClawSweeper items" or (.displayTitle | startswith("Review event items "))) | [.databaseId, .displayTitle, .status] | @tsv' 2>/dev/null || true)"
            while IFS=$'\t' read -r id title status; do
              if [ -z "$id" ]; then
                continue
              fi
              active_shards=0
              total_shards=0
              if [ "$status" = "in_progress" ]; then
                jobs_json="$(gh run view "$id" --repo "${{ github.repository }}" --json jobs 2>/dev/null || printf '{"jobs":[]}')"
                active_shards="$(printf '%s' "$jobs_json" \
                  | jq '[.jobs[]? | select(.name | startswith("Review shard ")) | select(.status == "in_progress" or .status == "pending" or .status == "queued" or .status == "waiting" or .status == "requested")] | length' 2>/dev/null \
                  || printf '0')"
                total_shards="$(printf '%s' "$jobs_json" \
                  | jq '[.jobs[]? | select(.name | startswith("Review shard "))] | length' 2>/dev/null \
                  || printf '0')"
              fi
              if ! [[ "$active_shards" =~ ^[0-9]+$ ]]; then
                active_shards=0
              fi
              if ! [[ "$total_shards" =~ ^[0-9]+$ ]]; then
                total_shards=0
              fi
              # Planning, queued, and not-yet-expanded matrix runs reserve their lane
              # size. Completed matrices are publishing and consume no Codex slots.
              if [ "$active_shards" -lt 1 ] && [ "$total_shards" -lt 1 ]; then
                if [ "$title" = "Review hot ClawSweeper items" ]; then
                  active_shards="$(pnpm --dir clawsweeper run --silent workflow -- limit review_shards.hot_intake_default)"
                elif [[ "$title" == Review\ event\ items\ * ]]; then
                  reserved_shards="$hard_cap"
                  if [[ "$title" =~ \[shards=([0-9]+)\]$ ]]; then
                    requested_shards="${BASH_REMATCH[1]}"
                    item_numbers="${title#*#}"
                    item_numbers="${item_numbers%% *}"
                    if [[ "$item_numbers" =~ ^[0-9]+(,[0-9]+)*$ ]]; then
                      if [ "$requested_shards" -lt 1 ]; then
                        requested_shards=1
                      fi
                      commas="${item_numbers//[^,]/}"
                      item_count=$((${#commas} + 1))
                      reserved_shards="$requested_shards"
                      if [ "$reserved_shards" -gt "$item_count" ]; then
                        reserved_shards="$item_count"
                      fi
                      if [ "$reserved_shards" -gt "$hard_cap" ]; then
                        reserved_shards="$hard_cap"
                      fi
                    fi
                  fi
                  active_shards="$reserved_shards"
                else
                  active_shards="$(pnpm --dir clawsweeper run --silent workflow -- limit review_shards.normal_default)"
                fi
              fi
              total=$((total + active_shards))
            done <<< "$runs"
            printf '%s' "$total"
          }
          active_sweep_exact_count() {
            printf '%s' "$ACTIVE_RUNS_JSON" \
              | STALE_QUEUED_CUTOFF="$STALE_QUEUED_CUTOFF" jq '[.[] | select(.workflowPath == ".github/workflows/sweep.yml") | select((.status == "in_progress" or ((.status == "pending" or .status == "queued" or .status == "waiting" or .status == "requested") and ((.updatedAt // .createdAt // "") >= env.STALE_QUEUED_CUTOFF))) and (.displayTitle | startswith("Review event item ")))] | length' 2>/dev/null \
              || printf '0'
          }
          if [ -z "$PAGE_SIZE" ]; then
            active_critical_workers="$(( $(active_run_count ".github/workflows/repair-cluster-worker.yml") + $(active_sweep_exact_count) ))"
            active_background_workers="$(active_sweep_background_workers)"
            PAGE_SIZE="$(pnpm --dir clawsweeper run --silent workflow -- worker-limit commit_review --active-critical "$active_critical_workers" --active-background "$active_background_workers")"
          fi
          page_size_hard_cap="$(pnpm --dir clawsweeper run --silent workflow -- limit commit_review.page_size_hard_cap)"
          if [ "$ENABLED" = "false" ]; then
            {
              echo "matrix=[]"
              echo "has_more=false"
              echo "next_offset=0"
              echo "planned_count=0"
              echo "skipped_count=0"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! printf '%s' "$COMMIT_OFFSET" | grep -Eq '^[0-9]+$'; then
            echo "Invalid commit offset: $COMMIT_OFFSET" >&2
            exit 1
          fi
          if [ "$SOURCE_REF" != "refs/heads/main" ]; then
            echo "Commit review only accepts main branch pushes; got $SOURCE_REF" >&2
            exit 1
          fi
          if [ -z "$COMMIT_SHA" ]; then
            echo "Missing commit SHA." >&2
            exit 1
          fi
          if ! printf '%s' "$COMMIT_SHA" | grep -Eq '^[0-9a-fA-F]{40}$'; then
            echo "Invalid commit SHA: $COMMIT_SHA" >&2
            exit 1
          fi
          if [ -n "$BEFORE_SHA" ] && ! printf '%s' "$BEFORE_SHA" | grep -Eq '^(0{40}|[0-9a-fA-F]{40})$'; then
            echo "Invalid before SHA: $BEFORE_SHA" >&2
            exit 1
          fi
          if ! printf '%s' "$SETTLE_SECONDS" | grep -Eq '^[0-9]+$'; then
            echo "Invalid settle wait: $SETTLE_SECONDS" >&2
            exit 1
          fi
          if ! printf '%s' "$PAGE_SIZE" | grep -Eq '^[0-9]+$'; then
            echo "Invalid commit review page size: $PAGE_SIZE" >&2
            exit 1
          fi
          if [ "$PAGE_SIZE" -lt 1 ]; then
            PAGE_SIZE=1
          fi
          if [ "$PAGE_SIZE" -gt "$page_size_hard_cap" ]; then
            PAGE_SIZE="$page_size_hard_cap"
          fi
          if [ "$SETTLE_SECONDS" -gt 0 ]; then
            echo "Waiting ${SETTLE_SECONDS}s for target main to settle before selecting commits."
            sleep "$SETTLE_SECONDS"
          fi
          url="https://x-access-token:${TARGET_TOKEN}@github.com/${TARGET_REPO}.git"
          git clone --filter=blob:none --no-checkout "$url" "$TARGET_NAME"
          git -C "$TARGET_NAME" fetch --no-tags origin main --depth=1000
          git -C "$TARGET_NAME" fetch --no-tags origin "$COMMIT_SHA" --depth=200
          if ! git -C "$TARGET_NAME" merge-base --is-ancestor "$COMMIT_SHA" refs/remotes/origin/main; then
            echo "Commit $COMMIT_SHA is not reachable from origin/main in the fetched history." >&2
            exit 1
          fi
          if [ -n "$BEFORE_SHA" ] && ! printf '%s' "$BEFORE_SHA" | grep -Eq '^0{40}$'; then
            git -C "$TARGET_NAME" fetch --no-tags origin "$BEFORE_SHA" --depth=200 || true
            commits="$(git -C "$TARGET_NAME" rev-list --reverse "$BEFORE_SHA..$COMMIT_SHA" || true)"
          else
            commits="$COMMIT_SHA"
          fi
          if [ -z "$commits" ]; then
            commits="$COMMIT_SHA"
          fi
          total_count="$(printf '%s\n' "$commits" | sed '/^$/d' | wc -l | tr -d ' ')"
          page_size="$PAGE_SIZE"
          start_line=$((COMMIT_OFFSET + 1))
          end_line=$((COMMIT_OFFSET + page_size))
          selected_commits="$(printf '%s\n' "$commits" | sed -n "${start_line},${end_line}p")"
          selected_count="$(printf '%s\n' "$selected_commits" | sed '/^$/d' | wc -l | tr -d ' ')"
          next_offset=$((COMMIT_OFFSET + selected_count))
          has_more=false
          if [ "$next_offset" -lt "$total_count" ]; then
            has_more=true
          fi
          node clawsweeper/dist/commit-sweeper.js classify \
            --target-repo "$TARGET_REPO" \
            --target-dir "$TARGET_NAME" \
            --commit-shas "$selected_commits" \
            --artifact-dir skipped-commit-artifacts > classify.json
          cat classify.json
          node clawsweeper/dist/repair/workflow-utils.js classify-output \
            --classify classify.json \
            --has-more "$has_more" \
            --next-offset "$next_offset" >> "$GITHUB_OUTPUT"
          echo "Selected $selected_count/$total_count commits at offset $COMMIT_OFFSET"
          printf 'Selected commits:\n%s\n' "$selected_commits"

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: skipped-commit-reports-${{ github.run_id }}-${{ github.run_attempt }}
          path: skipped-commit-artifacts
          if-no-files-found: ignore

  review:
    name: Review commit ${{ matrix.sha }}
    needs: plan
    if: ${{ needs.plan.outputs.planned_count != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
    env:
      CLAWSWEEPER_ACTION_LEDGER_INVOCATION: commit-${{ matrix.sha }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7
        with:
          path: clawsweeper
          filter: blob:none
          fetch-depth: 1
          persist-credentials: false

      - name: Create target read token
        id: target-read-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ needs.plan.outputs.target_repo_owner }}
          repositories: ${{ needs.plan.outputs.target_repo_name }}
          permission-actions: read
          permission-contents: read
          permission-issues: read
          permission-pull-requests: read

      - uses: ./clawsweeper/.github/actions/setup-pnpm
        id: review-setup-pnpm
        with:
          working-directory: clawsweeper
          build-script: build

      - uses: ./clawsweeper/.github/actions/setup-codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAWSWEEPER_INTERNAL_MODEL: ${{ secrets.CLAWSWEEPER_MODEL }}
        with:
          login-status: "true"

      - name: Check out target main
        env:
          TARGET_REPO: ${{ needs.plan.outputs.target_repo }}
          TARGET_NAME: ${{ needs.plan.outputs.target_checkout_dir }}
          TARGET_TOKEN: ${{ steps.target-read-token.outputs.token }}
          COMMIT_SHA: ${{ matrix.sha }}
        run: |
          set -euo pipefail
          url="https://x-access-token:${TARGET_TOKEN}@github.com/${TARGET_REPO}.git"
          git clone --filter=blob:none --no-checkout "$url" "$TARGET_NAME"
          git -C "$TARGET_NAME" fetch --no-tags origin main --depth=1000
          git -C "$TARGET_NAME" checkout -B main refs/remotes/origin/main
          git -C "$TARGET_NAME" fetch --no-tags origin "$COMMIT_SHA" --depth=200
          if ! git -C "$TARGET_NAME" merge-base --is-ancestor "$COMMIT_SHA" HEAD; then
            echo "Commit $COMMIT_SHA is not reachable from the checked-out origin/main history." >&2
            exit 1
          fi
          if ! git -C "$TARGET_NAME" rev-parse --verify "$COMMIT_SHA^" >/dev/null 2>&1; then
            git -C "$TARGET_NAME" fetch --deepen=500 origin main || true
          fi
          git -C "$TARGET_NAME" diff --no-ext-diff --binary "$COMMIT_SHA^" "$COMMIT_SHA" >/dev/null
          git -C "$TARGET_NAME" remote set-url origin "https://github.com/${TARGET_REPO}.git"
          echo "Target main head: $(git -C "$TARGET_NAME" rev-parse --short HEAD)"
          echo "Commit under review: $(git -C "$TARGET_NAME" rev-parse --short "$COMMIT_SHA")"

      - uses: ./clawsweeper/.github/actions/setup-action-ledger
        id: review-action-ledger

      - name: Hydrate commit identities
        id: commit-identities
        env:
          GH_TOKEN: ${{ steps.target-read-token.outputs.token }}
          TARGET_REPO: ${{ needs.plan.outputs.target_repo }}
          COMMIT_SHA: ${{ matrix.sha }}
        run: |
          set -euo pipefail
          commit_json="$(gh api "repos/$TARGET_REPO/commits/$COMMIT_SHA" 2>/dev/null || printf '{}')"
          github_author="$(jq -r '.author.login // ""' <<< "$commit_json")"
          github_committer="$(jq -r '.committer.login // ""' <<< "$commit_json")"
          for login in "$github_author" "$github_committer"; do
            if [ "${#login}" -gt 100 ] || { [ -n "$login" ] && ! printf '%s' "$login" | grep -Eq '^[A-Za-z0-9-]+(\[bot\])?$'; }; then
              echo "GitHub returned an invalid commit identity." >&2
              exit 1
            fi
          done
          {
            echo "github_author=$github_author"
            echo "github_committer=$github_committer"
          } >> "$GITHUB_OUTPUT"

      - name: Review commit
        id: review-commit
        working-directory: clawsweeper
        env:
          COMMIT_SWEEPER_ADDITIONAL_PROMPT: ${{ github.event.inputs.additional_prompt || github.event.client_payload.additional_prompt || '' }}
        run: |
          node dist/commit-sweeper.js review \
            --target-repo "${{ needs.plan.outputs.target_repo }}" \
            --target-dir "../${{ needs.plan.outputs.target_checkout_dir }}" \
            --commit-sha "${{ matrix.sha }}" \
            --report-dir ../commit-artifacts \
            --artifact-mode \
            --work-dir ../commit-work \
            --codex-model internal \
            --codex-reasoning-effort high \
            --codex-sandbox read-only \
            --codex-timeout-ms 1800000 \
            --require-publishable-report \
            --prehydrated-github-metadata \
            --github-author "${{ steps.commit-identities.outputs.github_author }}" \
            --github-committer "${{ steps.commit-identities.outputs.github_committer }}"

      - name: Upload commit review diagnostic
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: commit-review-diagnostic-${{ matrix.sha }}-${{ github.run_attempt }}
          path: commit-work/${{ matrix.sha }}.diagnostic.json
          if-no-files-found: warn
          retention-days: 30

      - name: Finalize commit review action ledger
        id: finalize-review-action-ledger
        if: ${{ always() && steps.review-action-ledger.outcome == 'success' && steps.review-setup-pnpm.outcome == 'success' }}
        working-directory: clawsweeper
        run: |
          set -euo pipefail
          output_root="${CLAWSWEEPER_ACTION_LEDGER_OUTPUT_ROOT:?setup-action-ledger output root is required}"
          pnpm run --silent repair:action-ledger -- finalize \
            --repair-lane "commit-review-${{ matrix.sha }}" \
            > "$output_root/repair-action-ledger-manifest.json"

      - name: Prepare commit review receipt bundle
        id: prepare-review-bundle
        if: ${{ always() && steps.finalize-review-action-ledger.outcome == 'success' }}
        working-directory: clawsweeper
        run: |
          set -euo pipefail
          output_root="${CLAWSWEEPER_ACTION_LEDGER_OUTPUT_ROOT:?setup-action-ledger output root is required}"
          bundle_root="../commit-review-bundle"
          rm -rf "$bundle_root"
          mkdir -p "$bundle_root/report" "$bundle_root/ledger"
          if [ -d ../commit-artifacts ]; then
            cp -R ../commit-artifacts/. "$bundle_root/report/"
          fi
          cp -R "$output_root"/. "$bundle_root/ledger/"

      - uses: actions/upload-artifact@v7
        if: ${{ always() && steps.prepare-review-bundle.outcome == 'success' }}
        with:
          name: commit-review-${{ matrix.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: commit-review-bundle
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 90

  publish:
    name: Commit reports
    needs: [plan, review]
    if: ${{ always() && needs.plan.result == 'success' && (needs.plan.outputs.planned_count != '0' || needs.plan.outputs.skipped_count != '0') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          filter: blob:none
          fetch-depth: 0

      - name: Create state token
        id: state-token
        uses: ./.github/actions/create-state-token
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}

      - uses: ./.github/actions/setup-state
        with:
          token: ${{ steps.state-token.outputs.token }}

      - uses: ./.github/actions/setup-action-ledger

      - uses: ./.github/actions/setup-pnpm
        id: publish-setup-pnpm
        with:
          build-script: build:all

      - uses: actions/download-artifact@v8
        if: ${{ needs.plan.outputs.planned_count != '0' }}
        with:
          pattern: commit-review-*-${{ github.run_id }}-${{ github.run_attempt }}
          path: .clawsweeper-repair/commit-review-download
          merge-multiple: false
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.run_id }}

      - name: Verify current-attempt commit review bundles
        if: ${{ needs.plan.outputs.planned_count != '0' }}
        env:
          EXPECTED_COMMIT_MATRIX: ${{ needs.plan.outputs.matrix }}
          EXPECTED_TARGET_REPO: ${{ needs.plan.outputs.target_repo }}
          PLANNED_COUNT: ${{ needs.plan.outputs.planned_count }}
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          expected_shas_file=".artifacts/expected-commit-review-shas.txt"
          actual_shas_file=".artifacts/actual-commit-review-shas.txt"
          causality_file=".artifacts/commit-review-action-ledger-causality.json"
          jq -er 'map(.sha) | if all(.[]; test("^[a-f0-9]{40}$")) then .[] else error("invalid commit review SHA") end' \
            <<< "$EXPECTED_COMMIT_MATRIX" | sort -u > "$expected_shas_file"
          if [ "$(wc -l < "$expected_shas_file" | tr -d ' ')" != "$PLANNED_COUNT" ]; then
            echo "Commit review matrix count does not match planned_count." >&2
            exit 1
          fi
          rm -rf commit-artifacts
          mkdir -p commit-artifacts
          : > "$actual_shas_file"
          printf '[]\n' > "$causality_file"
          while IFS= read -r commit_sha; do
            artifact_name="commit-review-${commit_sha}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            bundle_root=".clawsweeper-repair/commit-review-download/$artifact_name"
            report_root="$bundle_root/report"
            ledger_root="$bundle_root/ledger"
            manifest_file="$ledger_root/repair-action-ledger-manifest.json"
            test -d "$report_root"
            test -d "$ledger_root"
            mapfile -d '' report_files < <(find "$report_root" -type f -name '*.md' -print0)
            if [ "${#report_files[@]}" -ne 1 ] ||
               [ "$(basename "${report_files[0]:-}" .md)" != "$commit_sha" ]; then
              echo "Commit review bundle is incomplete for $commit_sha." >&2
              exit 1
            fi
            pnpm run --silent repair:action-ledger -- verify \
              --repair-lane "commit-review-$commit_sha" \
              --manifest "$manifest_file" \
              --expected-job review \
              --expected-run-attempt "$GITHUB_RUN_ATTEMPT" \
              --commit-report "${report_files[0]}" \
              --expected-commit-repository "$EXPECTED_TARGET_REPO" \
              --expected-commit-sha "$commit_sha" \
              --source-root "$ledger_root" >/dev/null
            source_root="$(cd "$ledger_root" && pwd -P)"
            context_entry="$(
              jq -c \
                --arg source_root "$source_root" \
                --arg subject_repository "$EXPECTED_TARGET_REPO" \
                --arg subject_sha "$commit_sha" \
                '{
                  source_root: $source_root,
                  event_paths: .event_paths,
                  producer: {
                    repository: .repository,
                    sha: .sha,
                    workflow: .workflow,
                    job: .job,
                    run_id: .run_id,
                    run_attempt: .run_attempt
                  },
                  subject: {
                    repository: $subject_repository,
                    sha: $subject_sha
                  }
                }' \
                "$manifest_file"
            )"
            jq --argjson entry "$context_entry" '. + [$entry]' "$causality_file" \
              > "${causality_file}.tmp"
            mv "${causality_file}.tmp" "$causality_file"
            cp -R "$report_root"/. commit-artifacts/
            echo "$commit_sha" >> "$actual_shas_file"
          done < "$expected_shas_file"
          sort -u -o "$actual_shas_file" "$actual_shas_file"
          if ! cmp -s "$expected_shas_file" "$actual_shas_file"; then
            echo "Commit review bundles do not match the planned matrix." >&2
            diff -u "$expected_shas_file" "$actual_shas_file" >&2 || true
            exit 1
          fi
          echo "CLAWSWEEPER_COMMIT_ACTION_LEDGER_PRIOR_CONTEXT=$(pwd -P)/$causality_file" \
            >> "$GITHUB_ENV"

      - name: Attest current-attempt commit review reports
        if: ${{ needs.plan.outputs.planned_count != '0' }}
        env:
          EXPECTED_TARGET_REPO: ${{ needs.plan.outputs.target_repo }}
        run: |
          set -euo pipefail
          while IFS= read -r commit_sha; do
            report_path="$(find commit-artifacts -type f -name "${commit_sha}.md" -print -quit)"
            test -n "$report_path"
            node dist/commit-sweeper.js attest-review \
              --target-repo "$EXPECTED_TARGET_REPO" \
              --commit-sha "$commit_sha" \
              --report-path "$report_path"
          done < .artifacts/expected-commit-review-shas.txt

      - uses: actions/download-artifact@v8
        if: ${{ needs.plan.outputs.skipped_count != '0' }}
        with:
          name: skipped-commit-reports-${{ github.run_id }}-${{ github.run_attempt }}
          path: commit-artifacts
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.run_id }}

      - name: Commit reports
        id: publish-reports
        run: |
          set -euo pipefail
          git pull --rebase --autostash
          node dist/commit-sweeper.js copy-artifacts --artifact-dir commit-artifacts --records-dir records
          pnpm run repair:publish-main -- \
            --message "chore: update commit review reports" \
            --path records \
            --receipt-kind commit_review_state \
            --rebase-strategy theirs
          state_revision="$(git -C "$CLAWSWEEPER_STATE_DIR" rev-parse HEAD)"
          if ! printf '%s' "$state_revision" | grep -Eq '^[a-f0-9]{40}$'; then
            echo "Invalid published state revision: $state_revision" >&2
            exit 1
          fi
          echo "state_revision=$state_revision" >> "$GITHUB_OUTPUT"

      - name: Create repair dispatch token
        id: clawsweeper-token
        if: ${{ vars.CLAWSWEEPER_COMMIT_FINDINGS_ENABLED != 'false' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: clawsweeper
          permission-actions: write
          permission-contents: write

      - name: Dispatch commit findings to repair lane
        id: dispatch-findings
        if: ${{ vars.CLAWSWEEPER_COMMIT_FINDINGS_ENABLED != 'false' }}
        env:
          GH_TOKEN: ${{ steps.clawsweeper-token.outputs.token }}
          ENABLED: ${{ vars.CLAWSWEEPER_COMMIT_FINDINGS_ENABLED || 'true' }}
        run: |
          set -euo pipefail
          node dist/commit-sweeper.js dispatch-findings \
            --artifact-dir commit-artifacts \
            --repair-repo openclaw/clawsweeper \
            --repair-workflow repair-commit-finding-intake.yml \
            --dispatch-mode workflow_dispatch \
            --report-repo openclaw/clawsweeper-state \
            --report-revision "${{ steps.publish-reports.outputs.state_revision }}" \
            --enabled "$ENABLED"

      - name: Create target checks token
        id: target-checks-token
        if: ${{ needs.plan.outputs.create_checks == 'true' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ needs.plan.outputs.target_repo_owner }}
          repositories: ${{ needs.plan.outputs.target_repo_name }}
          permission-checks: write

      - name: Publish commit checks
        if: ${{ needs.plan.outputs.create_checks == 'true' }}
        env:
          GH_TOKEN: ${{ steps.target-checks-token.outputs.token }}
        run: |
          set -euo pipefail
          test -n "$GH_TOKEN"
          find commit-artifacts -name '*.md' -print0 | while IFS= read -r -d '' report_path; do
            sha="$(basename "$report_path" .md)"
            relative_path="records/${report_path#commit-artifacts/}"
            node dist/commit-sweeper.js publish-check \
              --target-repo "${{ needs.plan.outputs.target_repo }}" \
              --commit-sha "$sha" \
              --report-path "$report_path" \
              --report-relative-path "$relative_path" \
              --report-repo openclaw/clawsweeper-state \
              --report-revision "${{ steps.publish-reports.outputs.state_revision }}"
          done

      - name: Finalize commit reviews without checks
        if: ${{ needs.plan.outputs.planned_count != '0' && needs.plan.outputs.create_checks != 'true' }}
        run: |
          set -euo pipefail
          find commit-artifacts -name '*.md' -print0 | while IFS= read -r -d '' report_path; do
            sha="$(basename "$report_path" .md)"
            node dist/commit-sweeper.js finish-review \
              --target-repo "${{ needs.plan.outputs.target_repo }}" \
              --commit-sha "$sha" \
              --report-path "$report_path" \
              --review-outcome success \
              --check-outcome skipped \
              --checks-requested false \
              --start-workflow
          done

      - name: Continue commit review range
        if: ${{ success() && needs.plan.outputs.has_more == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_REPO: ${{ needs.plan.outputs.target_repo }}
          BEFORE_SHA: ${{ github.event.inputs.before_sha || github.event.client_payload.before_sha || '' }}
          AFTER_SHA: ${{ github.event.inputs.commit_sha || github.event.client_payload.after_sha || github.event.client_payload.commit_sha || '' }}
          NEXT_OFFSET: ${{ needs.plan.outputs.next_offset }}
          CREATE_CHECKS: ${{ needs.plan.outputs.create_checks }}
          ADDITIONAL_PROMPT: ${{ github.event.inputs.additional_prompt || github.event.client_payload.additional_prompt || '' }}
        run: |
          set -euo pipefail
          node dist/commit-sweeper.js dispatch-continuation \
            --repository "${{ github.repository }}" \
            --workflow commit-review.yml \
            --target-repo "$TARGET_REPO" \
            --after-sha "$AFTER_SHA" \
            --before-sha "$BEFORE_SHA" \
            --commit-offset "$NEXT_OFFSET" \
            --create-checks "$CREATE_CHECKS" \
            --additional-prompt "$ADDITIONAL_PROMPT"

      - name: Finalize commit publication action ledger
        id: finalize-publication-action-ledger
        if: ${{ always() && steps.publish-setup-pnpm.outcome == 'success' }}
        env:
          CHECKS_REQUESTED: ${{ needs.plan.outputs.create_checks }}
          CONTINUATION_REQUESTED: ${{ needs.plan.outputs.has_more }}
          DISPATCH_COUNT: ${{ steps.dispatch-findings.outputs.dispatch_count || '0' }}
          DISPATCH_OUTCOME: ${{ steps.dispatch-findings.outcome }}
        run: |
          set -euo pipefail
          : "${CLAWSWEEPER_ACTION_LEDGER_OUTPUT_ROOT:?setup-action-ledger output root is required}"
          mkdir -p .artifacts
          allow_empty_args=()
          allow_empty=false
          if [ "$DISPATCH_OUTCOME" != "failure" ] &&
             [ "$DISPATCH_COUNT" = "0" ] &&
             [ "$CHECKS_REQUESTED" != "true" ] &&
             [ "$CONTINUATION_REQUESTED" != "true" ]; then
            allow_empty=true
            allow_empty_args+=(--allow-empty)
          fi
          pnpm run --silent repair:action-ledger -- finalize \
            --repair-lane commit-publication \
            "${allow_empty_args[@]}" \
            > .artifacts/commit-publication-action-ledger-manifest.json
          echo "allow_empty=$allow_empty" >> "$GITHUB_OUTPUT"

      - name: Publish immutable current-attempt commit review action ledger
        if: ${{ always() && steps.publish-setup-pnpm.outcome == 'success' }}
        env:
          ALLOW_EMPTY: ${{ steps.finalize-publication-action-ledger.outputs.allow_empty }}
          EXPECTED_COMMIT_MATRIX: ${{ needs.plan.outputs.matrix }}
          PLANNED_COUNT: ${{ needs.plan.outputs.planned_count }}
        run: |
          set -euo pipefail
          test -n "${CLAWSWEEPER_STATE_DIR:-}"
          source_root="${CLAWSWEEPER_ACTION_LEDGER_OUTPUT_ROOT:?setup-action-ledger output root is required}"
          event_paths_file=".artifacts/commit-review-action-ledger-paths.txt"
          expected_shas_file=".artifacts/expected-commit-review-shas.txt"
          : > "$event_paths_file"
          if [ "$PLANNED_COUNT" != "0" ]; then
            test -s "$expected_shas_file"
            while IFS= read -r commit_sha; do
              artifact_name="commit-review-${commit_sha}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
              review_root=".clawsweeper-repair/commit-review-download/$artifact_name/ledger"
              manifest_file="$review_root/repair-action-ledger-manifest.json"
              import_result_file=".artifacts/commit-review-$commit_sha-action-ledger-import.json"
              pnpm run --silent repair:action-ledger -- publish \
                --repair-lane "commit-review-$commit_sha" \
                --manifest "$manifest_file" \
                --expected-job review \
                --expected-run-attempt "$GITHUB_RUN_ATTEMPT" \
                --source-root "$review_root" \
                --state-root "$CLAWSWEEPER_STATE_DIR" > "$import_result_file"
              jq -e --slurpfile manifest "$manifest_file" \
                '.eventPaths == $manifest[0].event_paths' \
                "$import_result_file" >/dev/null
              jq -r '.paths[]?' "$import_result_file" >> "$event_paths_file"
            done < "$expected_shas_file"
          fi
          manifest_file=".artifacts/commit-publication-action-ledger-manifest.json"
          import_result_file=".artifacts/commit-publication-action-ledger-import.json"
          allow_empty_args=()
          if [ "$ALLOW_EMPTY" = "true" ]; then
            allow_empty_args+=(--allow-empty)
          fi
          pnpm run --silent repair:action-ledger -- publish \
            --repair-lane commit-publication \
            --manifest "$manifest_file" \
            "${allow_empty_args[@]}" \
            --source-root "$source_root" \
            --state-root "$CLAWSWEEPER_STATE_DIR" > "$import_result_file"
          jq -e --slurpfile manifest "$manifest_file" \
            '.eventPaths == $manifest[0].event_paths' \
            "$import_result_file" >/dev/null
          jq -r '.paths[]?' "$import_result_file" >> "$event_paths_file"
          sort -u -o "$event_paths_file" "$event_paths_file"
          if [ ! -s "$event_paths_file" ]; then
            if [ "$ALLOW_EMPTY" = "true" ]; then
              exit 0
            fi
            echo "Commit review action event shards existed but no paths were imported." >&2
            exit 1
          fi
          action_ledger_args=()
          while IFS= read -r event_path; do
            durable_event_path="$CLAWSWEEPER_STATE_DIR/$event_path"
            test -f "$durable_event_path"
            mkdir -p "$(dirname "$event_path")"
            cp "$durable_event_path" "$event_path"
            action_ledger_args+=(--path "$event_path")
          done < "$event_paths_file"
          pnpm run repair:publish-main -- \
            --message "chore: append commit review action ledger" \
            "${action_ledger_args[@]}"

      - name: Complete commit review continuation receipt
        if: ${{ success() && (github.event.inputs.continuation_key || github.event.client_payload.continuation_key) }}
        run: echo "Commit review continuation is durably published."
