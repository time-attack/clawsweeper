name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "apply-report.json"
      - "repair-apply-report.json"
      - "jobs/**"
      - "records/**"
      - "results/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: pnpm check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: |
            .github
            config
            dashboard
            docs
            instructions
            prompts
            schema
            scripts
            src
            test
            .oxfmtrc.json
            AGENTS.md
            README.md
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            tsconfig.dashboard.json
            tsconfig.json
            tsconfig.repair.json
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/setup-pnpm

      - name: Run check
        run: pnpm run check

  windows-codex-launch:
    name: Windows Codex launcher
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-pnpm

      - name: Build process workers
        run: |
          pnpm run build
          pnpm run build:repair

      - name: Verify native Windows launcher
        run: >
          node --test --test-name-pattern
          "escaped Windows launchers|extensionless Windows node shebang shims|CODEX_BIN and preserves argv|timeout errors|app-server mode"
          test/codex-process.test.ts
