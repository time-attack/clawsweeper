name: replay github activity dispatch receipts

on:
  workflow_run:
    workflows:
      - github activity to openclaw
    types:
      - completed
  workflow_dispatch:
    inputs:
      source_run_id:
        description: Stable workflow run ID that produced the dispatch receipt bundle
        required: true
        type: string
      source_run_attempt:
        description: Highest producer attempt eligible for replay
        required: true
        type: string

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093

concurrency:
  group: github-activity-receipt-replay-${{ github.event.workflow_run.id || inputs.source_run_id }}
  cancel-in-progress: false

jobs:
  replay-dispatch-receipts:
    name: Replay GitHub activity dispatch receipts
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        contains(fromJSON('["failure","cancelled"]'), github.event.workflow_run.conclusion)
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          filter: blob:none
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup-pnpm
        with:
          build-script: build:repair

      - name: Select GitHub activity dispatch receipt bundle
        id: select-activity-dispatch-ledger
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || inputs.source_run_id }}
          SOURCE_RUN_ATTEMPT: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.run_attempt || inputs.source_run_attempt }}
        run: |
          set -euo pipefail
          if [[ ! "$SOURCE_RUN_ID" =~ ^[1-9][0-9]*$ ]] ||
             [[ ! "$SOURCE_RUN_ATTEMPT" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::Source run ID and attempt must be positive integers."
            exit 1
          fi

          source_run="$RUNNER_TEMP/github-activity-source-run.json"
          gh api \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${SOURCE_RUN_ID}/attempts/${SOURCE_RUN_ATTEMPT}" \
            > "$source_run"
          if ! source_sha="$(
            jq -er \
              --arg source_run_id "$SOURCE_RUN_ID" \
              --argjson source_attempt "$SOURCE_RUN_ATTEMPT" '
                select((.id | tostring) == $source_run_id)
                | select(.path == ".github/workflows/github-activity.yml")
                | select(.status == "completed")
                | select((.run_attempt | type) == "number")
                | select(.run_attempt == $source_attempt)
                | .head_sha
                | select(type == "string" and test("^[a-f0-9]{40}$"))
              ' "$source_run"
          )"; then
            echo "::error::Source run is not a completed GitHub activity workflow at the requested attempt."
            exit 1
          fi

          artifact_list="$RUNNER_TEMP/github-activity-dispatch-artifacts.json"
          gh api --paginate --slurp \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${SOURCE_RUN_ID}/artifacts?per_page=100" \
            > "$artifact_list"
          if ! selection="$(
            jq -er \
              --arg prefix "github-activity-dispatch-receipts-${SOURCE_RUN_ID}-" \
              --argjson source_attempt "$SOURCE_RUN_ATTEMPT" '
                [
                  .[]?.artifacts[]?
                  | select(.expired == false)
                  | select(.name | type == "string")
                  | select(.name | startswith($prefix))
                  | (.name | ltrimstr($prefix)) as $attempt_text
                  | select($attempt_text | test("^[1-9][0-9]*$"))
                  | ($attempt_text | tonumber) as $attempt
                  | select($attempt <= $source_attempt)
                  | select(.id | type == "number")
                  | select(.id == (.id | floor) and .id > 0)
                  | {
                      artifact_id: .id,
                      artifact_name: .name,
                      producer_attempt: $attempt
                    }
                ]
                | sort_by(.producer_attempt, .artifact_id)
                | last
                | select(. != null)
                | [.artifact_id, .artifact_name, .producer_attempt]
                | @tsv
              ' "$artifact_list"
          )"; then
            echo "::error::No eligible GitHub activity dispatch receipt bundle was found."
            exit 1
          fi
          IFS=$'\t' read -r artifact_id artifact_name producer_attempt <<< "$selection"
          {
            printf 'artifact_id=%s\n' "$artifact_id"
            printf 'artifact_name=%s\n' "$artifact_name"
            printf 'producer_attempt=%s\n' "$producer_attempt"
            printf 'source_run_id=%s\n' "$SOURCE_RUN_ID"
            printf 'source_sha=%s\n' "$source_sha"
          } >> "$GITHUB_OUTPUT"
          printf 'Selected receipt bundle %s from attempt %s of run %s.\n' \
            "$artifact_name" "$producer_attempt" "$SOURCE_RUN_ID"

      - name: Download GitHub activity dispatch receipt bundle
        id: download-activity-dispatch-ledger
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ steps.select-activity-dispatch-ledger.outputs.artifact_id }}
          github-token: ${{ github.token }}
          run-id: ${{ steps.select-activity-dispatch-ledger.outputs.source_run_id }}
          path: artifacts/github-activity-dispatch-receipts

      - name: Validate GitHub activity dispatch receipt provenance
        env:
          PRODUCER_ATTEMPT: ${{ steps.select-activity-dispatch-ledger.outputs.producer_attempt }}
          SOURCE_RUN_ID: ${{ steps.select-activity-dispatch-ledger.outputs.source_run_id }}
          SOURCE_SHA: ${{ steps.select-activity-dispatch-ledger.outputs.source_sha }}
        run: |
          set -euo pipefail
          manifest_file="artifacts/github-activity-dispatch-receipts/manifest.json"
          jq -e \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg sha "$SOURCE_SHA" \
            --arg run_id "$SOURCE_RUN_ID" \
            --argjson run_attempt "$PRODUCER_ATTEMPT" '
              .repository == $repository and
              .sha == $sha and
              .workflow == "github activity to openclaw" and
              .job == "notify" and
              .run_id == $run_id and
              .run_attempt == $run_attempt
            ' "$manifest_file" >/dev/null

      - name: Create replay state token
        id: replay-state-token
        uses: ./.github/actions/create-state-token
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}

      - uses: ./.github/actions/setup-state
        id: setup-replay-state
        with:
          token: ${{ steps.replay-state-token.outputs.token }}
          persist-credentials: "false"

      - name: Replay GitHub activity dispatch action ledger
        env:
          PUBLISH_TOKEN: ${{ steps.replay-state-token.outputs.token }}
        run: |
          set -euo pipefail
          test -n "${CLAWSWEEPER_STATE_DIR:-}"
          bundle_root="artifacts/github-activity-dispatch-receipts"
          source_root="$bundle_root/source"
          manifest_file="$bundle_root/manifest.json"
          event_paths_file=".artifacts/github-activity-dispatch-replay-paths.txt"
          import_result_file=".artifacts/github-activity-dispatch-replay-import.json"
          mkdir -p .artifacts
          node dist/repair/dispatch-action-ledger-cli.js replay \
            --lane github-activity-dispatch \
            --manifest "$manifest_file" \
            --source-root "$source_root" \
            --state-root "$CLAWSWEEPER_STATE_DIR" > "$import_result_file"
          if ! jq -e --slurpfile manifest "$manifest_file" \
            '.eventPaths == $manifest[0].event_paths' \
            "$import_result_file" >/dev/null; then
            echo "Replayed GitHub activity dispatch paths do not match the finalized manifest." >&2
            exit 1
          fi
          jq -r '.paths[]?' "$import_result_file" |
            sort -u > "$event_paths_file"
          if [ ! -s "$event_paths_file" ]; then
            echo "GitHub activity dispatch replay imported no paths." >&2
            exit 1
          fi
          action_ledger_args=()
          while IFS= read -r event_path; do
            durable_event_path="$CLAWSWEEPER_STATE_DIR/$event_path"
            test -f "$durable_event_path"
            mkdir -p "$(dirname "$event_path")"
            cp "$durable_event_path" "$event_path"
            action_ledger_args+=(--path "$event_path")
          done < "$event_paths_file"
          auth_header="$(printf 'x-access-token:%s' "$PUBLISH_TOKEN" | base64 | tr -d '\n')"
          export GIT_CONFIG_COUNT=1
          export GIT_CONFIG_KEY_0=http.https://github.com/.extraheader
          export GIT_CONFIG_VALUE_0="AUTHORIZATION: basic $auth_header"
          pnpm run repair:publish-main -- \
            --message "chore: replay GitHub activity dispatch action ledger" \
            "${action_ledger_args[@]}" \
            --rebase-strategy normal
