name: Crabbox PR lease

on:
  repository_dispatch:
    types: [clawsweeper_crabbox_pr_lease]
  workflow_dispatch:
    inputs:
      target_repo:
        description: Target repository.
        required: true
        default: openclaw/openclaw
        type: string
      item_number:
        description: Pull request number.
        required: true
        type: string
      action:
        description: lease, status, stop, or reset-vnc.
        required: true
        default: lease
        type: choice
        options: [lease, status, stop, reset-vnc]
      platform:
        description: linux, mac, or windows.
        required: true
        default: linux
        type: choice
        options: [linux, mac, windows]
      ttl_minutes:
        description: Lease TTL in minutes.
        required: true
        default: "90"
        type: string
      head_sha:
        description: Expected PR head SHA.
        required: false
        default: ""
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093

concurrency:
  group: ${{ format('crabbox-pr-lease-{0}-{1}-{2}', github.event.inputs.target_repo || github.event.client_payload.target_repo || 'openclaw/openclaw', github.event.inputs.item_number || github.event.client_payload.item_number || github.run_id, github.event.inputs.platform || github.event.client_payload.platform || 'linux') }}
  cancel-in-progress: false

jobs:
  crabbox-pr-lease:
    runs-on: ${{ vars.CLAWSWEEPER_CRABBOX_RUNNER || 'blacksmith-16vcpu-ubuntu-2404' }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          filter: blob:none
          fetch-depth: 0
          sparse-checkout: |
            .github
            src/repair
            package.json
            pnpm-lock.yaml
            tsconfig.repair.json
          sparse-checkout-cone-mode: false

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ vars.CLAWSWEEPER_ALLOWED_OWNER || github.repository_owner }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Create target repository token
        id: target_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: openclaw
          permission-issues: write
          permission-pull-requests: write

      - uses: ./.github/actions/setup-pnpm

      - name: Build repair tools
        uses: ./.github/actions/setup-pnpm
        with:
          build-script: build:repair

      - name: Configure Crabbox token
        env:
          CRABBOX_TOKEN: ${{ secrets.CRABBOX_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CRABBOX_TOKEN:-}" ]; then
            echo "CRABBOX_TOKEN is not configured; continuing with existing Crabbox auth if present."
            exit 0
          fi
          printf '%s' "$CRABBOX_TOKEN" | crabbox login --token-stdin

      - name: Run Crabbox PR lease command
        env:
          GH_TOKEN: ${{ steps.target_token.outputs.token }}
          CRABBOX_COORDINATOR: ${{ vars.CRABBOX_COORDINATOR || 'https://crabbox.openclaw.ai' }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            event_path="$(mktemp)"
            jq -n \
              --arg target_repo "${{ inputs.target_repo }}" \
              --arg item_number "${{ inputs.item_number }}" \
              --arg action "${{ inputs.action }}" \
              --arg platform "${{ inputs.platform }}" \
              --arg ttl_minutes "${{ inputs.ttl_minutes }}" \
              --arg head_sha "${{ inputs.head_sha }}" \
              '{client_payload:{target_repo:$target_repo,item_number:$item_number,action:$action,platform:$platform,ttl_minutes:$ttl_minutes,head_sha:$head_sha}}' > "$event_path"
            export GITHUB_EVENT_PATH="$event_path"
          fi
          pnpm run repair:crabbox-pr-lease

      - name: Publish Crabbox lease state
        if: always()
        run: |
          pnpm run repair:publish-main -- \
            --message "chore: record Crabbox PR lease state" \
            --path results/crabbox-leases \
            --rebase-strategy theirs
