name: spam comment intake

on:
  repository_dispatch:
    types: [github_activity]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093

jobs:
  intake:
    if: >-
      ${{
        (contains(fromJSON('["issue_comment","pull_request_review_comment"]'), github.event.client_payload.activity.type) || contains(fromJSON('["issue_comment","pull_request_review_comment"]'), github.event.client_payload.event_name)) &&
        (github.event.client_payload.activity.action == 'created' || github.event.client_payload.activity.action == 'edited' || github.event.client_payload.action == 'created' || github.event.client_payload.action == 'edited')
      }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          filter: blob:none
          persist-credentials: false
          sparse-checkout: |
            .github/actions
            config/automation-limits.json
            src/repair
            package.json
            pnpm-lock.yaml
            tsconfig.repair.json
          sparse-checkout-cone-mode: false

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write

      - uses: ./.github/actions/setup-pnpm
        with:
          build-script: build:repair

      - name: Dispatch exact spam scan
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: pnpm run repair:spam-comment-intake -- --write-report
