name: Deploy crawl-remote production

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type "deploy crawl-remote production" to confirm
        required: true
        type: string
      main_sha:
        description: Exact current 40-character SHA of crawl-remote main
        required: true
        type: string
      observation_order_state:
        description: Expected Gitcrawl observation-order rollout state
        required: true
        default: dormant
        type: choice
        options:
          - dormant
          - active
      snapshot_provenance_state:
        description: Expected Gitcrawl snapshot-provenance rollout state
        required: true
        default: dormant
        type: choice
        options:
          - dormant
          - active

permissions: {}

concurrency:
  group: deploy-crawl-remote-production
  cancel-in-progress: false

jobs:
  preflight:
    name: Build immutable crawl-remote release artifact
    if: >-
      ${{
        github.actor == 'vincentkoc' &&
        github.actor_id == '25068' &&
        github.triggering_actor == 'vincentkoc' &&
        github.run_attempt == 1 &&
        github.ref == 'refs/heads/main' &&
        inputs.confirmation == 'deploy crawl-remote production'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      artifact_name: ${{ steps.authorize.outputs.artifact_name }}
      deploy_sha: ${{ steps.authorize.outputs.deploy_sha }}
      observation_order_state: ${{ steps.authorize.outputs.observation_order_state }}
      receipt_name: ${{ steps.authorize.outputs.receipt_name }}
      snapshot_provenance_state: ${{ steps.authorize.outputs.snapshot_provenance_state }}
    env:
      CI: "true"
      CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093
      TARGET_REPOSITORY: openclaw/crawl-remote
    steps:
      - name: Create exact-repository read token
        id: target-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: crawl-remote
          permission-contents: read

      - name: Authorize immutable main release
        id: authorize
        env:
          GH_TOKEN: ${{ steps.target-token.outputs.token }}
          OBSERVATION_ORDER_STATE: ${{ inputs.observation_order_state }}
          REQUESTED_SHA: ${{ inputs.main_sha }}
          SNAPSHOT_PROVENANCE_STATE: ${{ inputs.snapshot_provenance_state }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$REQUESTED_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::main_sha must be a full lowercase 40-character commit SHA."
            exit 1
          fi
          if [[ "$OBSERVATION_ORDER_STATE" != "dormant" && "$OBSERVATION_ORDER_STATE" != "active" ]]; then
            echo "::error::observation_order_state must be dormant or active."
            exit 1
          fi
          if [[ "$SNAPSHOT_PROVENANCE_STATE" != "dormant" && "$SNAPSHOT_PROVENANCE_STATE" != "active" ]]; then
            echo "::error::snapshot_provenance_state must be dormant or active."
            exit 1
          fi

          current_main_sha="$(
            gh api "repos/$TARGET_REPOSITORY/commits/main" --jq '.sha'
          )"
          if [[ ! "$current_main_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::crawl-remote main did not resolve to a full lowercase commit SHA."
            exit 1
          fi
          if [[ "$REQUESTED_SHA" != "$current_main_sha" ]]; then
            echo "::error::main_sha must exactly match the current crawl-remote main tip."
            exit 1
          fi

          artifact_name="crawl-remote-release-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${REQUESTED_SHA}-${OBSERVATION_ORDER_STATE}-${SNAPSHOT_PROVENANCE_STATE}"
          receipt_name="crawl-remote-release-receipt-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${REQUESTED_SHA}-${OBSERVATION_ORDER_STATE}-${SNAPSHOT_PROVENANCE_STATE}.json"
          {
            echo "artifact_name=$artifact_name"
            echo "deploy_sha=$REQUESTED_SHA"
            echo "observation_order_state=$OBSERVATION_ORDER_STATE"
            echo "receipt_name=$receipt_name"
            echo "snapshot_provenance_state=$SNAPSHOT_PROVENANCE_STATE"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout approved crawl-remote release
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: openclaw/crawl-remote
          ref: ${{ steps.authorize.outputs.deploy_sha }}
          token: ${{ steps.target-token.outputs.token }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify checked-out release SHA
        env:
          DEPLOY_SHA: ${{ steps.authorize.outputs.deploy_sha }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$DEPLOY_SHA"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build deploy bundle
        env:
          BUNDLE_DIR: ${{ runner.temp }}/crawl-remote-bundle
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$BUNDLE_DIR"
          npm run deploy -- --dry-run --outdir "$BUNDLE_DIR"

      - name: Package bounded release artifact
        env:
          ARTIFACT_NAME: ${{ steps.authorize.outputs.artifact_name }}
          ARTIFACT_ROOT: ${{ runner.temp }}/${{ steps.authorize.outputs.artifact_name }}
          BUNDLE_DIR: ${{ runner.temp }}/crawl-remote-bundle
          DEPLOY_SHA: ${{ steps.authorize.outputs.deploy_sha }}
          OBSERVATION_ORDER_STATE: ${{ steps.authorize.outputs.observation_order_state }}
          RECEIPT_NAME: ${{ steps.authorize.outputs.receipt_name }}
          SNAPSHOT_PROVENANCE_STATE: ${{ steps.authorize.outputs.snapshot_provenance_state }}
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { createHash } from 'node:crypto';
          import {
            copyFileSync,
            lstatSync,
            mkdirSync,
            readFileSync,
            readdirSync,
            rmSync,
            writeFileSync,
          } from 'node:fs';
          import { basename, join } from 'node:path';

          const {
            ARTIFACT_NAME: artifactName,
            ARTIFACT_ROOT: artifactRoot,
            BUNDLE_DIR: bundleDir,
            DEPLOY_SHA: targetSha,
            GITHUB_RUN_ATTEMPT: runAttemptText,
            GITHUB_RUN_ID: runId,
            OBSERVATION_ORDER_STATE: observationOrderState,
            RECEIPT_NAME: receiptName,
            SNAPSHOT_PROVENANCE_STATE: snapshotProvenanceState,
          } = process.env;
          const runAttempt = Number(runAttemptText);
          if (
            !artifactName ||
            !artifactRoot ||
            !bundleDir ||
            !/^[0-9a-f]{40}$/.test(targetSha ?? '') ||
            !/^[0-9]+$/.test(runId ?? '') ||
            !Number.isSafeInteger(runAttempt) ||
            runAttempt < 1 ||
            !['dormant', 'active'].includes(observationOrderState ?? '') ||
            !['dormant', 'active'].includes(snapshotProvenanceState ?? '') ||
            !receiptName
          ) {
            throw new Error('invalid release artifact identity');
          }

          const expectedArtifactName =
            `crawl-remote-release-${runId}-${runAttempt}-${targetSha}-${observationOrderState}-${snapshotProvenanceState}`;
          const expectedReceiptName =
            `crawl-remote-release-receipt-${runId}-${runAttempt}-${targetSha}-${observationOrderState}-${snapshotProvenanceState}.json`;
          if (artifactName !== expectedArtifactName || receiptName !== expectedReceiptName) {
            throw new Error('release artifact identity is not bound to this run and SHA');
          }

          function assertRegularFile(path, label) {
            const stat = lstatSync(path);
            if (!stat.isFile() || stat.isSymbolicLink()) {
              throw new Error(`${label} must be one regular file`);
            }
            return stat;
          }

          function assertExactKeys(value, keys, label) {
            if (!value || typeof value !== 'object' || Array.isArray(value)) {
              throw new Error(`${label} must be an object`);
            }
            const actual = Object.keys(value).sort();
            const expected = [...keys].sort();
            if (JSON.stringify(actual) !== JSON.stringify(expected)) {
              throw new Error(`${label} has unexpected fields`);
            }
          }

          const sourceConfigPath = 'wrangler.jsonc';
          assertRegularFile(sourceConfigPath, sourceConfigPath);
          const sourceConfig = JSON.parse(readFileSync(sourceConfigPath, 'utf8'));
          assertExactKeys(
            sourceConfig,
            [
              '$schema',
              'compatibility_date',
              'd1_databases',
              'main',
              'name',
              'observability',
              'r2_buckets',
              'routes',
              'vars',
              'workers_dev',
            ],
            'source Wrangler config',
          );
          if (
            sourceConfig.name !== 'crawl-remote' ||
            sourceConfig.main !== 'src/index.ts' ||
            sourceConfig.workers_dev !== true ||
            sourceConfig.vars?.CRAWL_REMOTE_RELEASE_SHA !== undefined
          ) {
            throw new Error('source Wrangler config has an unexpected deployment identity');
          }
          if (
            JSON.stringify(sourceConfig.routes) !==
              JSON.stringify([
                {
                  pattern: 'reports.openclaw.ai/crawl-remote/*',
                  zone_name: 'openclaw.ai',
                },
              ]) ||
            JSON.stringify(sourceConfig.d1_databases) !==
              JSON.stringify([
                {
                  binding: 'DB',
                  database_name: 'crawl-remote',
                  database_id: '42baacd3-c917-400f-a12f-e0fada21e11f',
                },
              ]) ||
            JSON.stringify(sourceConfig.r2_buckets) !==
              JSON.stringify([
                {
                  binding: 'ARCHIVES',
                  bucket_name: 'crawl-remote-archives',
                },
              ])
          ) {
            throw new Error('source Wrangler config targets unexpected production resources');
          }

          const deploymentConfig = {
            name: sourceConfig.name,
            compatibility_date: sourceConfig.compatibility_date,
            workers_dev: sourceConfig.workers_dev,
            observability: sourceConfig.observability,
            vars: sourceConfig.vars,
            routes: sourceConfig.routes,
            d1_databases: sourceConfig.d1_databases,
            r2_buckets: sourceConfig.r2_buckets,
          };

          rmSync(artifactRoot, { recursive: true, force: true });
          mkdirSync(join(artifactRoot, 'bundle'), { recursive: true });
          mkdirSync(join(artifactRoot, 'migrations'), { recursive: true });

          const bundleEntries = readdirSync(bundleDir, { withFileTypes: true });
          const allowedBundleEntries = new Set(['README.md', 'index.js', 'index.js.map']);
          if (
            !bundleEntries.some((entry) => entry.name === 'index.js') ||
            bundleEntries.some(
              (entry) =>
                !allowedBundleEntries.has(entry.name) ||
                !entry.isFile() ||
                entry.isSymbolicLink(),
            )
          ) {
            throw new Error(
              'Wrangler dry-run output must contain index.js and only known metadata files',
            );
          }
          const bundleSource = join(bundleDir, 'index.js');
          const bundleStat = assertRegularFile(bundleSource, 'deploy bundle');
          if (bundleStat.size < 1 || bundleStat.size > 5 * 1024 * 1024) {
            throw new Error('deploy bundle is empty or exceeds 5 MiB');
          }
          copyFileSync(bundleSource, join(artifactRoot, 'bundle', 'index.js'));
          writeFileSync(
            join(artifactRoot, 'wrangler.json'),
            `${JSON.stringify(deploymentConfig, null, 2)}\n`,
          );

          const approvedMigrations = [
            {
              name: '0001_remote_archives.sql',
              sha256: 'bfb2ee56d01c7547a644f48b5c493cb9d971646ce331acc10c6bfd78d9b7d066',
            },
            {
              name: '0002_gitcrawl_enrichment_snapshots.sql',
              sha256: 'f984199bef0406ce91724e9ac83a97f41928b1560a51974deb841596f1e403e2',
            },
            {
              name: '0003_gitcrawl_snapshot_hardening.sql',
              sha256: '5daa6e14364f7bd4eba3cc5f61ec266b0559962e7345a65080cc9ef26b084e46',
            },
            {
              name: '0004_gitcrawl_snapshot_cutover.sql',
              sha256: 'e6c4a8edb300ebbf93a2e2449d180408f23be7eac1ef05733045b6ed496eb396',
            },
            {
              name: '0005_discrawl_cursor_state.sql',
              sha256: '5964adcb0807448d937fed38ac9588a1063bf4f490a82b54f15f0e700374ae0c',
            },
            {
              name: '0006_gitcrawl_observation_order.sql',
              sha256: 'a0ebfbb5c40c85df5eaba6772a01a68910fa5f1327d4701d25c5dfde16f77d1a',
            },
            {
              name: '0007_gitcrawl_snapshot_provenance.sql',
              sha256: '5c1e92dbf4d51ef62d317e212a0ec8e39df104983656c6416d0c58ef3503744d',
            },
            {
              name: '0008_gitcrawl_publish_candidates.sql',
              sha256: '3d5afadb62b4343cc88c54a18702aee13b61d1d5a74312a191996833155ab462',
            },
          ];
          const migrationEntries = readdirSync('migrations', { withFileTypes: true })
            .sort((a, b) => a.name.localeCompare(b.name));
          if (migrationEntries.length !== approvedMigrations.length) {
            throw new Error('release artifact migrations do not match the reviewed migration set');
          }
          for (const [index, entry] of migrationEntries.entries()) {
            if (!entry.isFile() || !/^[0-9]{4}_[a-z0-9_]+\.sql$/.test(entry.name)) {
              throw new Error(`invalid migration artifact entry: ${entry.name}`);
            }
            const approved = approvedMigrations[index];
            if (!approved || entry.name !== approved.name) {
              throw new Error(`migration ${entry.name} is not in the reviewed migration sequence`);
            }
            const source = join('migrations', entry.name);
            const stat = assertRegularFile(source, `migration ${entry.name}`);
            if (stat.size < 1 || stat.size > 1024 * 1024) {
              throw new Error(`migration ${entry.name} is empty or exceeds 1 MiB`);
            }
            const migrationSHA256 = createHash('sha256')
              .update(readFileSync(source))
              .digest('hex');
            if (migrationSHA256 !== approved.sha256) {
              throw new Error(`migration ${entry.name} differs from its reviewed content`);
            }
            copyFileSync(source, join(artifactRoot, 'migrations', basename(entry.name)));
          }

          const payloadPaths = [
            'bundle/index.js',
            'wrangler.json',
            ...migrationEntries.map((entry) => `migrations/${entry.name}`),
          ].sort();
          const files = payloadPaths.map((path) => {
            const content = readFileSync(join(artifactRoot, path));
            return {
              path,
              sha256: createHash('sha256').update(content).digest('hex'),
              bytes: content.byteLength,
            };
          });
          const manifest = {
            schema_version: 1,
            target_repository: 'openclaw/crawl-remote',
            target_sha: targetSha,
            run_id: runId,
            run_attempt: runAttempt,
            artifact_name: artifactName,
            observation_order_state: observationOrderState,
            receipt_name: receiptName,
            snapshot_provenance_state: snapshotProvenanceState,
            files,
          };
          writeFileSync(
            join(artifactRoot, 'manifest.json'),
            `${JSON.stringify(manifest, null, 2)}\n`,
          );
          NODE

      - name: Upload immutable release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.authorize.outputs.artifact_name }}
          path: ${{ runner.temp }}/${{ steps.authorize.outputs.artifact_name }}
          if-no-files-found: error
          include-hidden-files: false
          compression-level: 0
          overwrite: false
          retention-days: 31 # Covers GitHub's 30-day environment approval window.

  deploy:
    name: Migrate and deploy verified crawl-remote release
    needs: preflight
    permissions:
      contents: read
    if: >-
      ${{
        needs.preflight.result == 'success' &&
        github.actor == 'vincentkoc' &&
        github.actor_id == '25068' &&
        github.triggering_actor == 'vincentkoc' &&
        github.run_attempt == 1 &&
        github.ref == 'refs/heads/main' &&
        inputs.confirmation == 'deploy crawl-remote production'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment:
      name: crawl-remote-production
      url: https://crawl-remote.services-91b.workers.dev
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    env:
      ARTIFACT_NAME: ${{ needs.preflight.outputs.artifact_name }}
      BASH_ENV: ""
      CI: "true"
      CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093
      CLOUDFLARE_ACCOUNT_ID: 91b59577e757131d68d55a471fe32aca
      D1_MUTATION_MIN_REMAINING_SECONDS: "1440"
      DEPLOYMENT_RECOVERY_TIMEOUT_SECONDS: "120"
      DEPLOYMENT_STATUS_ATTEMPTS: "60"
      DEPLOYMENT_STATUS_DELAY_SECONDS: "5"
      DEPLOYMENT_STATUS_TIMEOUT_SECONDS: "120"
      DEPLOY_MESSAGE: clawsweeper run ${{ github.run_id }}/${{ github.run_attempt }} main ${{ needs.preflight.outputs.deploy_sha }}
      DEPLOY_SHA: ${{ needs.preflight.outputs.deploy_sha }}
      ENV: ""
      NODE_OPTIONS: ""
      NPM_CONFIG_IGNORE_SCRIPTS: "true"
      NPM_CONFIG_USERCONFIG: /dev/null
      OBSERVATION_ORDER_STATE: ${{ needs.preflight.outputs.observation_order_state }}
      PRODUCTION_ROUTE_URL: https://reports.openclaw.ai/crawl-remote
      PRODUCTION_ENVIRONMENT: crawl-remote-production
      RECEIPT_NAME: ${{ needs.preflight.outputs.receipt_name }}
      SNAPSHOT_PROVENANCE_STATE: ${{ needs.preflight.outputs.snapshot_provenance_state }}
      SOURCE_REPOSITORY: ${{ github.repository }}
      TARGET_REPOSITORY: openclaw/crawl-remote
      TOOLCHAIN_ROOT: ${{ github.workspace }}/.github/deploy/crawl-remote-toolchain
      WORKFLOW_SHA: ${{ github.sha }}
      WORKER_MUTATION_MIN_REMAINING_SECONDS: "1020"
      WORKERS_DEV_URL: https://crawl-remote.services-91b.workers.dev
      WRANGLER_DEPLOY_TIMEOUT_SECONDS: "180"
      WRANGLER_READ_TIMEOUT_SECONDS: "30"
      WRANGLER_ROLLBACK_TIMEOUT_SECONDS: "180"
      WRANGLER_VERSION: 4.107.1
    steps:
      - name: Record protected deployment deadline
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          started_at="$(date +%s)"
          if [[ ! "$started_at" =~ ^[0-9]+$ ]]; then
            echo "::error::could not resolve the protected deployment start time."
            exit 1
          fi
          deadline="$((started_at + 35 * 60))"
          printf 'DEPLOY_JOB_DEADLINE_EPOCH=%s\n' "$deadline" >> "$GITHUB_ENV"

      - name: Create protected-environment audit token
        id: source-admin-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: clawsweeper
          # GitHub classifies deployment-branch-policy reads under Actions.
          permission-actions: read
          # Environment metadata, variables, and secret names use Environments.
          permission-environments: read

      - name: Audit protected production environment
        env:
          BRANCH_POLICIES_RESPONSE: ${{ runner.temp }}/crawl-remote-environment-branch-policies.json
          ENVIRONMENT_RESPONSE: ${{ runner.temp }}/crawl-remote-environment.json
          ENVIRONMENT_SECRETS_RESPONSE: ${{ runner.temp }}/crawl-remote-environment-secrets.json
          ENVIRONMENT_VARIABLES_RESPONSE: ${{ runner.temp }}/crawl-remote-environment-variables.json
          GH_TOKEN: ${{ steps.source-admin-token.outputs.token }}
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          gh api \
            "repos/$SOURCE_REPOSITORY/environments/$PRODUCTION_ENVIRONMENT" \
            > "$ENVIRONMENT_RESPONSE"
          gh api --paginate --slurp \
            "repos/$SOURCE_REPOSITORY/environments/$PRODUCTION_ENVIRONMENT/variables?per_page=100" \
            > "$ENVIRONMENT_VARIABLES_RESPONSE"
          gh api --paginate --slurp \
            "repos/$SOURCE_REPOSITORY/environments/$PRODUCTION_ENVIRONMENT/secrets?per_page=100" \
            > "$ENVIRONMENT_SECRETS_RESPONSE"
          gh api --paginate --slurp \
            "repos/$SOURCE_REPOSITORY/environments/$PRODUCTION_ENVIRONMENT/deployment-branch-policies?per_page=100" \
            > "$BRANCH_POLICIES_RESPONSE"

          node --input-type=module <<'ENVIRONMENT_AUDIT_NODE'
          import { readFileSync } from 'node:fs';

          function readPaged(path, key, label) {
            const pages = JSON.parse(readFileSync(path, 'utf8'));
            if (!Array.isArray(pages) || pages.length === 0) {
              throw new Error(`${label} response is invalid`);
            }
            const totals = new Set();
            const entries = [];
            for (const page of pages) {
              if (
                !page ||
                typeof page !== 'object' ||
                Array.isArray(page) ||
                !Number.isSafeInteger(page.total_count) ||
                page.total_count < 0 ||
                !Array.isArray(page[key]) ||
                page.total_count < page[key].length
              ) {
                throw new Error(`${label} response is invalid`);
              }
              totals.add(page.total_count);
              entries.push(...page[key]);
            }
            if (totals.size !== 1 || [...totals][0] !== entries.length) {
              throw new Error(`${label} response is truncated`);
            }
            return entries;
          }

          const environment = JSON.parse(
            readFileSync(process.env.ENVIRONMENT_RESPONSE, 'utf8'),
          );
          const protectionRules = Array.isArray(environment?.protection_rules)
            ? environment.protection_rules
            : [];
          const reviewerRules = protectionRules.filter(
            (rule) => rule?.type === 'required_reviewers',
          );
          const reviewerRule = reviewerRules[0];
          const reviewers = Array.isArray(reviewerRule?.reviewers)
            ? reviewerRule.reviewers
            : [];
          if (
            environment?.name !== process.env.PRODUCTION_ENVIRONMENT ||
            reviewerRules.length !== 1 ||
            reviewerRule?.prevent_self_review !== true ||
            reviewers.length !== 1 ||
            reviewers[0]?.type !== 'Team' ||
            reviewers[0]?.reviewer?.id !== 15789116 ||
            reviewers[0]?.reviewer?.slug !== 'maintainer' ||
            environment?.deployment_branch_policy?.protected_branches !== false ||
            environment?.deployment_branch_policy?.custom_branch_policies !== true
          ) {
            throw new Error(
              'crawl-remote production environment protection is not the reviewed shape',
            );
          }

          const variables = readPaged(
            process.env.ENVIRONMENT_VARIABLES_RESPONSE,
            'variables',
            'environment variables',
          );
          const secrets = readPaged(
            process.env.ENVIRONMENT_SECRETS_RESPONSE,
            'secrets',
            'environment secrets',
          );
          const branchPolicies = readPaged(
            process.env.BRANCH_POLICIES_RESPONSE,
            'branch_policies',
            'environment branch policies',
          );
          const variableNames = new Set(variables.map((entry) => entry?.name));
          const secretNames = new Set(secrets.map((entry) => entry?.name));
          for (const name of [
            'CRAWL_REMOTE_DEPLOY_AUTHORITY',
            'CRAWL_REMOTE_CLOUDFLARE_TOKEN_SHA256',
            'CRAWL_REMOTE_CUSTOM_ROUTE_PROOF',
          ]) {
            if (!variableNames.has(name)) {
              throw new Error(`production environment is missing variable ${name}`);
            }
          }
          for (const name of [
            'CRAWL_REMOTE_PRODUCTION_CLOUDFLARE_API_TOKEN',
            'CRAWL_REMOTE_ACCESS_CLIENT_ID',
            'CRAWL_REMOTE_ACCESS_CLIENT_SECRET',
          ]) {
            if (!secretNames.has(name)) {
              throw new Error(`production environment is missing secret ${name}`);
            }
          }
          if (
            branchPolicies.length !== 1 ||
            branchPolicies[0]?.name !== 'main' ||
            branchPolicies[0]?.type !== 'branch'
          ) {
            throw new Error(
              'crawl-remote production environment must allow only the main branch',
            );
          }
          ENVIRONMENT_AUDIT_NODE

      - name: Reauthorize current ClawSweeper workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          current_main_sha="$(
            gh api "repos/$SOURCE_REPOSITORY/commits/main" --jq '.sha'
          )"
          if [[ ! "$current_main_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::ClawSweeper main did not resolve to a full lowercase commit SHA."
            exit 1
          fi
          if [[ "$WORKFLOW_SHA" != "$current_main_sha" ]]; then
            echo "::error::approved ClawSweeper workflow is no longer the current main tip."
            exit 1
          fi

      - name: Verify central deployment authority
        env:
          CUSTOM_ROUTE_PROOF: ${{ vars.CRAWL_REMOTE_CUSTOM_ROUTE_PROOF }}
          DEPLOY_AUTHORITY: ${{ vars.CRAWL_REMOTE_DEPLOY_AUTHORITY }}
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          if [[ "$DEPLOY_AUTHORITY" != "clawsweeper-v1" ]]; then
            echo "::error::crawl-remote production authority is not assigned to ClawSweeper."
            exit 1
          fi
          if [[ "$CUSTOM_ROUTE_PROOF" != "access-service-token" ]]; then
            echo "::error::CRAWL_REMOTE_CUSTOM_ROUTE_PROOF must be access-service-token."
            exit 1
          fi

      - name: Validate protected production proof credentials
        env:
          ACCESS_PREFLIGHT_CONTRACT_RESPONSE: ${{ runner.temp }}/crawl-remote-access-preflight-contract.json
          ACCESS_PREFLIGHT_HEALTH_RESPONSE: ${{ runner.temp }}/crawl-remote-access-preflight-health.json
          CF_ACCESS_CLIENT_ID: ${{ secrets.CRAWL_REMOTE_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CRAWL_REMOTE_ACCESS_CLIENT_SECRET }}
          CUSTOM_ROUTE_PROOF: ${{ vars.CRAWL_REMOTE_CUSTOM_ROUTE_PROOF }}
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          if [[ "$CUSTOM_ROUTE_PROOF" != "access-service-token" ]]; then
            echo "::error::CRAWL_REMOTE_CUSTOM_ROUTE_PROOF must be access-service-token."
            exit 1
          fi
          if [[ -z "$CF_ACCESS_CLIENT_ID" ]]; then
            echo "::error::access-service-token proof requires CRAWL_REMOTE_ACCESS_CLIENT_ID."
            exit 1
          fi
          if [[ -z "$CF_ACCESS_CLIENT_SECRET" ]]; then
            echo "::error::access-service-token proof requires CRAWL_REMOTE_ACCESS_CLIENT_SECRET."
            exit 1
          fi

          rm -f \
            "$ACCESS_PREFLIGHT_HEALTH_RESPONSE" \
            "$ACCESS_PREFLIGHT_CONTRACT_RESPONSE"
          curl --fail-with-body --silent --show-error \
            --connect-timeout 10 \
            --max-time 20 \
            --max-filesize 1048576 \
            --header "accept: application/json" \
            --header "cache-control: no-cache" \
            --header "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            --header "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            --output "$ACCESS_PREFLIGHT_HEALTH_RESPONSE" \
            "$PRODUCTION_ROUTE_URL/health?access_preflight=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          curl --fail-with-body --silent --show-error \
            --connect-timeout 10 \
            --max-time 20 \
            --max-filesize 1048576 \
            --header "accept: application/json" \
            --header "cache-control: no-cache" \
            --header "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            --header "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            --output "$ACCESS_PREFLIGHT_CONTRACT_RESPONSE" \
            "$PRODUCTION_ROUTE_URL/v1/contract?access_preflight=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          node --input-type=module <<'ACCESS_PREFLIGHT_NODE'
          import { readFileSync } from 'node:fs';

          const health = JSON.parse(
            readFileSync(process.env.ACCESS_PREFLIGHT_HEALTH_RESPONSE, 'utf8'),
          );
          const contract = JSON.parse(
            readFileSync(process.env.ACCESS_PREFLIGHT_CONTRACT_RESPONSE, 'utf8'),
          );
          const releaseSha = health?.release_sha;
          if (
            health?.ok !== true ||
            typeof releaseSha !== 'string' ||
            !/^[0-9a-f]{40}$/.test(releaseSha) ||
            contract?.service !== 'crawl-remote' ||
            contract?.protocol_version !== 'v1' ||
            contract?.release_sha !== releaseSha
          ) {
            throw new Error(
              'Cloudflare Access service-token preflight did not reach the current crawl-remote release',
            );
          }

          const routes = Array.isArray(contract.routes) ? contract.routes : [];
          for (const path of ['/health', '/v1/contract']) {
            if (
              !routes.some(
                (route) =>
                  route?.method === 'GET' &&
                  route?.path === path,
              )
            ) {
              throw new Error(
                `Cloudflare Access service-token preflight is missing GET ${path}`,
              );
            }
          }
          console.log('Cloudflare Access service-token proof credentials are valid.');
          ACCESS_PREFLIGHT_NODE

      - name: Create exact-repository reauthorization token
        id: target-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: crawl-remote
          permission-actions: read
          permission-contents: read

      - name: Verify canonical crawl-remote mutator is retired
        env:
          CANONICAL_WORKFLOW_PATH: .github/workflows/deploy.yml
          GH_TOKEN: ${{ steps.target-token.outputs.token }}
          WORKFLOW_CONTENTS_RESPONSE: ${{ runner.temp }}/crawl-remote-workflow-contents.json
          WORKFLOW_ID_PATH: ${{ runner.temp }}/crawl-remote-workflow-id.txt
          WORKFLOW_REGISTRY_RESPONSE: ${{ runner.temp }}/crawl-remote-workflow-registry.json
          WORKFLOW_RUNS_ROOT: ${{ runner.temp }}/crawl-remote-workflow-runs
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          gh api \
            "repos/$TARGET_REPOSITORY/contents/.github/workflows?ref=$DEPLOY_SHA" \
            > "$WORKFLOW_CONTENTS_RESPONSE"
          gh api --paginate --slurp \
            "repos/$TARGET_REPOSITORY/actions/workflows?per_page=100" \
            > "$WORKFLOW_REGISTRY_RESPONSE"

          node --input-type=module <<'CANONICAL_WORKFLOW_NODE'
          import { readFileSync, writeFileSync } from 'node:fs';

          const canonicalPath = process.env.CANONICAL_WORKFLOW_PATH;
          const contents = JSON.parse(
            readFileSync(process.env.WORKFLOW_CONTENTS_RESPONSE, 'utf8'),
          );
          const registryPages = JSON.parse(
            readFileSync(process.env.WORKFLOW_REGISTRY_RESPONSE, 'utf8'),
          );
          if (
            canonicalPath !== '.github/workflows/deploy.yml' ||
            !Array.isArray(contents) ||
            !Array.isArray(registryPages) ||
            registryPages.length === 0
          ) {
            throw new Error('crawl-remote workflow authority response is invalid');
          }
          const registryTotals = new Set();
          const registryWorkflows = [];
          for (const page of registryPages) {
            if (
              !page ||
              typeof page !== 'object' ||
              Array.isArray(page) ||
              !Number.isSafeInteger(page.total_count) ||
              page.total_count < 0 ||
              !Array.isArray(page.workflows) ||
              page.total_count < page.workflows.length
            ) {
              throw new Error('crawl-remote workflow authority response is invalid');
            }
            registryTotals.add(page.total_count);
            registryWorkflows.push(...page.workflows);
          }
          if (
            registryTotals.size !== 1 ||
            [...registryTotals][0] !== registryWorkflows.length
          ) {
            throw new Error('crawl-remote workflow authority response is truncated');
          }

          const contentMatches = contents.filter(
            (entry) => entry?.path === canonicalPath,
          );
          const registryMatches = registryWorkflows.filter(
            (entry) => entry?.path === canonicalPath,
          );
          if (contentMatches.length > 1 || registryMatches.length > 1) {
            throw new Error('canonical crawl-remote workflow identity is ambiguous');
          }

          const contentEntry = contentMatches[0];
          const workflowEntry = registryMatches[0];
          if (
            contentEntry &&
            (
              contentEntry.name !== 'deploy.yml' ||
              contentEntry.type !== 'file' ||
              typeof contentEntry.sha !== 'string' ||
              !/^[0-9a-f]{40}$/.test(contentEntry.sha)
            )
          ) {
            throw new Error('canonical crawl-remote workflow content identity is invalid');
          }
          if (
            workflowEntry &&
            (
              workflowEntry.name !== 'deploy production' ||
              !Number.isSafeInteger(workflowEntry.id) ||
              workflowEntry.id <= 0 ||
              typeof workflowEntry.state !== 'string'
            )
          ) {
            throw new Error('canonical crawl-remote workflow registry identity is invalid');
          }

          if (contentEntry) {
            throw new Error(
              'canonical crawl-remote production workflow must be deleted before central deployment is enabled',
            );
          }
          if (workflowEntry && workflowEntry.state !== 'deleted') {
            throw new Error(
              'removed crawl-remote production workflow still has a reactivatable registry state',
            );
          }
          console.log('Canonical crawl-remote production workflow is permanently retired.');
          writeFileSync(
            process.env.WORKFLOW_ID_PATH,
            workflowEntry ? `${workflowEntry.id}\n` : '',
            { flag: 'wx', mode: 0o600 },
          );
          CANONICAL_WORKFLOW_NODE

          workflow_id="$(tr -d '\r\n' < "$WORKFLOW_ID_PATH")"
          if [[ -n "$workflow_id" ]]; then
            if [[ ! "$workflow_id" =~ ^[1-9][0-9]*$ ]]; then
              echo "::error::canonical crawl-remote workflow ID is invalid."
              exit 1
            fi
            mkdir -m 700 "$WORKFLOW_RUNS_ROOT"
            for status in action_required in_progress pending queued requested waiting; do
              gh api --paginate --slurp \
                "repos/$TARGET_REPOSITORY/actions/workflows/$workflow_id/runs?per_page=100&status=$status" \
                > "$WORKFLOW_RUNS_ROOT/$status.json"
            done

          node --input-type=module <<'CANONICAL_WORKFLOW_RUNS_NODE'
          import { readFileSync } from 'node:fs';
          import { join } from 'node:path';

          const statuses = [
            'action_required',
            'in_progress',
            'pending',
            'queued',
            'requested',
            'waiting',
          ];
          for (const status of statuses) {
            const pages = JSON.parse(
              readFileSync(join(process.env.WORKFLOW_RUNS_ROOT, `${status}.json`), 'utf8'),
            );
            if (!Array.isArray(pages) || pages.length === 0) {
              throw new Error(`crawl-remote ${status} workflow-run response is invalid`);
            }
            const runs = [];
            const totals = new Set();
            for (const page of pages) {
              if (
                !page ||
                typeof page !== 'object' ||
                Array.isArray(page) ||
                !Number.isSafeInteger(page.total_count) ||
                page.total_count < 0 ||
                !Array.isArray(page.workflow_runs) ||
                page.total_count < page.workflow_runs.length
              ) {
                throw new Error(`crawl-remote ${status} workflow-run response is invalid`);
              }
              totals.add(page.total_count);
              runs.push(...page.workflow_runs);
            }
            if (totals.size !== 1 || [...totals][0] !== runs.length) {
              throw new Error(`crawl-remote ${status} workflow-run response is truncated`);
            }
            if (runs.length !== 0) {
              throw new Error(
                `canonical crawl-remote production workflow still has ${status} runs`,
              );
            }
          }
          CANONICAL_WORKFLOW_RUNS_NODE
          fi

      - name: Checkout trusted deployment toolchain
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: openclaw/clawsweeper
          ref: ${{ github.sha }}
          sparse-checkout: .github/deploy/crawl-remote-toolchain
          sparse-checkout-cone-mode: false
          fetch-depth: 1
          persist-credentials: false

      - name: Setup trusted Node runtime
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.18.0

      - name: Install exact trusted Wrangler
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          test -f "$TOOLCHAIN_ROOT/package.json"
          test -f "$TOOLCHAIN_ROOT/package-lock.json"
          (
            cd "$TOOLCHAIN_ROOT" || exit 1
            npm ci --ignore-scripts --no-audit --no-fund
            actual_version="$(./node_modules/.bin/wrangler --version)"
            test "$actual_version" = "$WRANGLER_VERSION"
          )

      - name: Download immutable release artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ needs.preflight.outputs.artifact_name }}
          path: ${{ runner.temp }}/crawl-remote-release

      - name: Verify bounded release artifact
        env:
          RECEIPT_PATH: ${{ runner.temp }}/${{ needs.preflight.outputs.receipt_name }}
          RELEASE_ROOT: ${{ runner.temp }}/crawl-remote-release
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          node --input-type=module <<'NODE'
          import { createHash } from 'node:crypto';
          import {
            lstatSync,
            readFileSync,
            readdirSync,
            writeFileSync,
          } from 'node:fs';
          import { join, relative, sep } from 'node:path';

          const {
            ARTIFACT_NAME: artifactName,
            DEPLOY_SHA: targetSha,
            GITHUB_RUN_ATTEMPT: runAttemptText,
            GITHUB_RUN_ID: runId,
            OBSERVATION_ORDER_STATE: observationOrderState,
            RECEIPT_NAME: receiptName,
            RECEIPT_PATH: receiptPath,
            RELEASE_ROOT: releaseRoot,
            SNAPSHOT_PROVENANCE_STATE: snapshotProvenanceState,
          } = process.env;
          const runAttempt = Number(runAttemptText);
          const expectedArtifactName =
            `crawl-remote-release-${runId}-${runAttempt}-${targetSha}-${observationOrderState}-${snapshotProvenanceState}`;
          const expectedReceiptName =
            `crawl-remote-release-receipt-${runId}-${runAttempt}-${targetSha}-${observationOrderState}-${snapshotProvenanceState}.json`;
          if (
            !releaseRoot ||
            !receiptPath ||
            artifactName !== expectedArtifactName ||
            receiptName !== expectedReceiptName ||
            !/^[0-9a-f]{40}$/.test(targetSha ?? '') ||
            !/^[0-9]+$/.test(runId ?? '') ||
            !Number.isSafeInteger(runAttempt) ||
            runAttempt < 1 ||
            !['dormant', 'active'].includes(observationOrderState ?? '') ||
            !['dormant', 'active'].includes(snapshotProvenanceState ?? '')
          ) {
            throw new Error('downloaded artifact identity is not bound to this run and SHA');
          }

          function assertExactKeys(value, keys, label) {
            if (!value || typeof value !== 'object' || Array.isArray(value)) {
              throw new Error(`${label} must be an object`);
            }
            const actual = Object.keys(value).sort();
            const expected = [...keys].sort();
            if (JSON.stringify(actual) !== JSON.stringify(expected)) {
              throw new Error(`${label} has unexpected fields`);
            }
          }

          function walk(root, directory = root) {
            const files = [];
            for (const entry of readdirSync(directory, { withFileTypes: true })) {
              const absolute = join(directory, entry.name);
              const stat = lstatSync(absolute);
              if (stat.isSymbolicLink()) {
                throw new Error(`artifact contains symlink: ${relative(root, absolute)}`);
              }
              if (stat.isDirectory()) {
                files.push(...walk(root, absolute));
              } else if (stat.isFile()) {
                files.push(relative(root, absolute).split(sep).join('/'));
              } else {
                throw new Error(`artifact contains non-file entry: ${relative(root, absolute)}`);
              }
            }
            return files;
          }

          const manifestPath = join(releaseRoot, 'manifest.json');
          const rawManifest = readFileSync(manifestPath, 'utf8');
          if (Buffer.byteLength(rawManifest) > 128 * 1024) {
            throw new Error('release manifest exceeds 128 KiB');
          }
          const manifest = JSON.parse(rawManifest);
          assertExactKeys(
            manifest,
            [
              'artifact_name',
              'files',
              'observation_order_state',
              'receipt_name',
              'run_attempt',
              'run_id',
              'schema_version',
              'snapshot_provenance_state',
              'target_repository',
              'target_sha',
            ],
            'release manifest',
          );
          if (
            manifest.schema_version !== 1 ||
            manifest.target_repository !== 'openclaw/crawl-remote' ||
            manifest.target_sha !== targetSha ||
            manifest.run_id !== runId ||
            manifest.run_attempt !== runAttempt ||
            manifest.artifact_name !== artifactName ||
            manifest.observation_order_state !== observationOrderState ||
            manifest.receipt_name !== receiptName ||
            manifest.snapshot_provenance_state !== snapshotProvenanceState ||
            !Array.isArray(manifest.files) ||
            manifest.files.length < 3
          ) {
            throw new Error('release manifest identity is invalid');
          }

          const canonicalFiles = [];
          const declaredPaths = new Set();
          for (const file of manifest.files) {
            assertExactKeys(file, ['bytes', 'path', 'sha256'], 'release manifest file');
            if (
              typeof file.path !== 'string' ||
              (
                file.path !== 'bundle/index.js' &&
                file.path !== 'wrangler.json' &&
                !/^migrations\/[0-9]{4}_[a-z0-9_]+\.sql$/.test(file.path)
              ) ||
              !/^[0-9a-f]{64}$/.test(file.sha256) ||
              !Number.isSafeInteger(file.bytes) ||
              file.bytes < 1 ||
              declaredPaths.has(file.path)
            ) {
              throw new Error(`invalid release manifest path: ${String(file.path)}`);
            }
            const maxBytes = file.path === 'bundle/index.js'
              ? 5 * 1024 * 1024
              : file.path === 'wrangler.json'
                ? 128 * 1024
                : 1024 * 1024;
            if (file.bytes > maxBytes) {
              throw new Error(`release artifact file exceeds its size limit: ${file.path}`);
            }
            declaredPaths.add(file.path);
            canonicalFiles.push({
              path: file.path,
              sha256: file.sha256,
              bytes: file.bytes,
            });
          }
          canonicalFiles.sort((a, b) => a.path.localeCompare(b.path));
          if (
            canonicalFiles[0]?.path !== 'bundle/index.js' ||
            !declaredPaths.has('wrangler.json') ||
            !canonicalFiles.some((file) => file.path.startsWith('migrations/'))
          ) {
            throw new Error('release manifest is missing required payload files');
          }

          const canonicalManifest = {
            schema_version: 1,
            target_repository: 'openclaw/crawl-remote',
            target_sha: targetSha,
            run_id: runId,
            run_attempt: runAttempt,
            artifact_name: artifactName,
            observation_order_state: observationOrderState,
            receipt_name: receiptName,
            snapshot_provenance_state: snapshotProvenanceState,
            files: canonicalFiles,
          };
          if (rawManifest !== `${JSON.stringify(canonicalManifest, null, 2)}\n`) {
            throw new Error('release manifest is not canonical');
          }

          const actualPaths = walk(releaseRoot).sort();
          const expectedPaths = ['manifest.json', ...canonicalFiles.map((file) => file.path)].sort();
          if (JSON.stringify(actualPaths) !== JSON.stringify(expectedPaths)) {
            throw new Error('release artifact contains files outside the manifest allowlist');
          }

          let totalBytes = 0;
          for (const file of canonicalFiles) {
            const absolute = join(releaseRoot, file.path);
            const stat = lstatSync(absolute);
            if (!stat.isFile() || stat.isSymbolicLink() || stat.size !== file.bytes) {
              throw new Error(`release artifact size mismatch: ${file.path}`);
            }
            const content = readFileSync(absolute);
            const actualHash = createHash('sha256').update(content).digest('hex');
            if (actualHash !== file.sha256) {
              throw new Error(`release artifact hash mismatch: ${file.path}`);
            }
            totalBytes += file.bytes;
          }
          if (totalBytes > 10 * 1024 * 1024) {
            throw new Error('release artifact exceeds 10 MiB');
          }

          const configRaw = readFileSync(join(releaseRoot, 'wrangler.json'), 'utf8');
          const config = JSON.parse(configRaw);
          assertExactKeys(
            config,
            [
              'compatibility_date',
              'd1_databases',
              'name',
              'observability',
              'r2_buckets',
              'routes',
              'vars',
              'workers_dev',
            ],
            'deployment Wrangler config',
          );
          if (
            config.name !== 'crawl-remote' ||
            config.workers_dev !== true ||
            config.vars?.CRAWL_REMOTE_RELEASE_SHA !== undefined ||
            Object.hasOwn(config, 'main') ||
            Object.hasOwn(config, 'build')
          ) {
            throw new Error('deployment Wrangler config has unsafe execution fields');
          }
          if (
            JSON.stringify(config.routes) !==
              JSON.stringify([
                {
                  pattern: 'reports.openclaw.ai/crawl-remote/*',
                  zone_name: 'openclaw.ai',
                },
              ]) ||
            JSON.stringify(config.d1_databases) !==
              JSON.stringify([
                {
                  binding: 'DB',
                  database_name: 'crawl-remote',
                  database_id: '42baacd3-c917-400f-a12f-e0fada21e11f',
                },
              ]) ||
            JSON.stringify(config.r2_buckets) !==
              JSON.stringify([
                {
                  binding: 'ARCHIVES',
                  bucket_name: 'crawl-remote-archives',
                },
              ])
          ) {
            throw new Error('deployment Wrangler config targets unexpected resources');
          }

          const manifestSha256 = createHash('sha256').update(rawManifest).digest('hex');
          const receipt = {
            schema_version: 1,
            target_sha: targetSha,
            run_id: runId,
            run_attempt: runAttempt,
            artifact_name: artifactName,
            observation_order_state: observationOrderState,
            receipt_name: receiptName,
            snapshot_provenance_state: snapshotProvenanceState,
            manifest_sha256: manifestSha256,
          };
          try {
            lstatSync(receiptPath);
            throw new Error('release receipt already exists');
          } catch (error) {
            if (error?.code !== 'ENOENT') throw error;
          }
          writeFileSync(receiptPath, `${JSON.stringify(receipt, null, 2)}\n`, {
            flag: 'wx',
            mode: 0o600,
          });
          NODE

      - name: Capture previous Worker D1 contract baseline
        env:
          PREVIOUS_RELEASE_SHA_PATH: ${{ runner.temp }}/crawl-remote-previous-release-sha.txt
          PREVIOUS_WORKER_CONTRACT_BASELINE: ${{ runner.temp }}/crawl-remote-previous-contract-before-migration.json
          PREVIOUS_WORKER_HEALTH_BASELINE: ${{ runner.temp }}/crawl-remote-previous-health-before-migration.json
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          curl --fail-with-body --silent --show-error \
            --connect-timeout 10 \
            --max-time 20 \
            --max-filesize 1048576 \
            --header "cache-control: no-cache" \
            --output "$PREVIOUS_WORKER_HEALTH_BASELINE" \
            "$WORKERS_DEV_URL/health?migration_probe=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-before"
          curl --fail-with-body --silent --show-error \
            --connect-timeout 10 \
            --max-time 20 \
            --max-filesize 1048576 \
            --header "cache-control: no-cache" \
            --output "$PREVIOUS_WORKER_CONTRACT_BASELINE" \
            "$WORKERS_DEV_URL/v1/contract?migration_probe=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-before"

          node --input-type=module <<'PREVIOUS_WORKER_BASELINE_NODE'
          import { readFileSync, writeFileSync } from 'node:fs';

          const health = JSON.parse(
            readFileSync(process.env.PREVIOUS_WORKER_HEALTH_BASELINE, 'utf8'),
          );
          const contract = JSON.parse(
            readFileSync(process.env.PREVIOUS_WORKER_CONTRACT_BASELINE, 'utf8'),
          );
          const releaseSHA = health?.release_sha;
          if (
            JSON.stringify(Object.keys(health ?? {}).sort()) !==
              JSON.stringify(['ok', 'release_sha']) ||
            health.ok !== true ||
            typeof releaseSHA !== 'string' ||
            !/^[0-9a-f]{40}$/.test(releaseSHA) ||
            contract?.service !== 'crawl-remote' ||
            contract?.protocol_version !== 'v1' ||
            contract?.release_sha !== releaseSHA
          ) {
            throw new Error('previous Worker public identity is invalid before D1 migration');
          }

          const routes = Array.isArray(contract.routes) ? contract.routes : [];
          for (const path of ['/health', '/v1/contract']) {
            if (
              !routes.some(
                (route) =>
                  route?.method === 'GET' &&
                  route?.path === path &&
                  route?.auth === 'public',
              )
            ) {
              throw new Error(`previous Worker contract is missing public GET ${path}`);
            }
          }
          const apps = Array.isArray(contract.apps) ? contract.apps : [];
          const gitcrawl = apps.find((app) => app?.app === 'gitcrawl');
          if (!gitcrawl || !Array.isArray(gitcrawl.capabilities)) {
            throw new Error('previous Worker D1-backed Gitcrawl contract is invalid');
          }

          writeFileSync(process.env.PREVIOUS_RELEASE_SHA_PATH, `${releaseSHA}\n`, {
            mode: 0o600,
          });
          PREVIOUS_WORKER_BASELINE_NODE

      - name: Reauthorize current main before D1 mutation
        env:
          GH_TOKEN: ${{ steps.target-token.outputs.token }}
          RECEIPT_PATH: ${{ runner.temp }}/${{ needs.preflight.outputs.receipt_name }}
          SOURCE_GH_TOKEN: ${{ github.token }}
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          test -f "$RECEIPT_PATH"
          current_source_main_sha="$(
            GH_TOKEN="$SOURCE_GH_TOKEN" \
              timeout --foreground --signal=TERM --kill-after=5s \
              "${WRANGLER_READ_TIMEOUT_SECONDS}s" \
              gh api "repos/$SOURCE_REPOSITORY/commits/main" --jq '.sha'
          )"
          if [[ ! "$current_source_main_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::ClawSweeper main did not resolve to a full lowercase commit SHA."
            exit 1
          fi
          if [[ "$WORKFLOW_SHA" != "$current_source_main_sha" ]]; then
            echo "::error::ClawSweeper main advanced before D1 mutation."
            exit 1
          fi
          current_main_sha="$(
            timeout --foreground --signal=TERM --kill-after=5s \
              "${WRANGLER_READ_TIMEOUT_SECONDS}s" \
              gh api "repos/$TARGET_REPOSITORY/commits/main" --jq '.sha'
          )"
          if [[ ! "$current_main_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::crawl-remote main did not resolve to a full lowercase commit SHA."
            exit 1
          fi
          if [[ "$DEPLOY_SHA" != "$current_main_sha" ]]; then
            echo "::error::approved crawl-remote release is no longer the current main tip."
            exit 1
          fi

      - name: Apply and verify D1 migrations
        env:
          APPLIED_MIGRATIONS_RESPONSE: ${{ runner.temp }}/crawl-remote-applied-migrations.json
          CLOUDFLARE_API_TOKEN: ${{ secrets.CRAWL_REMOTE_PRODUCTION_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_TOKEN_SHA256: ${{ vars.CRAWL_REMOTE_CLOUDFLARE_TOKEN_SHA256 }}
          CONSUMED_RECEIPT_PATH: ${{ runner.temp }}/${{ needs.preflight.outputs.receipt_name }}.consumed
          FENCE_RESPONSE: ${{ runner.temp }}/crawl-remote-observation-fence.json
          PENDING_MIGRATIONS_PATH: ${{ runner.temp }}/crawl-remote-compatible-pending-migrations.json
          PREVIOUS_DEPLOYMENT_RESPONSE: ${{ runner.temp }}/crawl-remote-previous-deployment.json
          PREVIOUS_RELEASE_SHA_PATH: ${{ runner.temp }}/crawl-remote-previous-release-sha.txt
          PREVIOUS_VERSION_PATH: ${{ runner.temp }}/crawl-remote-previous-version.txt
          PRE_FENCE_ERROR: ${{ runner.temp }}/crawl-remote-observation-fence-precheck.err
          PRE_FENCE_RESPONSE: ${{ runner.temp }}/crawl-remote-observation-fence-precheck.json
          RECEIPT_PATH: ${{ runner.temp }}/${{ needs.preflight.outputs.receipt_name }}
          RELEASE_ROOT: ${{ runner.temp }}/crawl-remote-release
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          test -n "$CLOUDFLARE_API_TOKEN"
          test "$CLOUDFLARE_TOKEN_SHA256" = "$(printf '%s' "$CLOUDFLARE_API_TOKEN" | sha256sum | cut -d ' ' -f 1)"
          wrangler="$TOOLCHAIN_ROOT/node_modules/.bin/wrangler"
          test "$(
            timeout --foreground --signal=TERM --kill-after=5s \
              "${WRANGLER_READ_TIMEOUT_SECONDS}s" \
              "$wrangler" --version
          )" = "$WRANGLER_VERSION"

          test -f "$RECEIPT_PATH"
          test -f "$PREVIOUS_RELEASE_SHA_PATH"
          test ! -e "$CONSUMED_RECEIPT_PATH"

          timeout --foreground --signal=TERM --kill-after=5s \
            "${WRANGLER_READ_TIMEOUT_SECONDS}s" \
            "$wrangler" d1 execute crawl-remote \
            --remote \
            --json \
            --cwd "$RELEASE_ROOT" \
            --config wrangler.json \
            --command "select name from d1_migrations order by id" \
            > "$APPLIED_MIGRATIONS_RESPONSE"
          test "$(wc -c < "$APPLIED_MIGRATIONS_RESPONSE")" -le 1048576

          node --input-type=module <<'PENDING_MIGRATIONS_NODE'
          import { createHash } from 'node:crypto';
          import { readFileSync, writeFileSync } from 'node:fs';
          import { join } from 'node:path';

          const approvedMigrations = [
            {
              name: '0001_remote_archives.sql',
              sha256: 'bfb2ee56d01c7547a644f48b5c493cb9d971646ce331acc10c6bfd78d9b7d066',
            },
            {
              name: '0002_gitcrawl_enrichment_snapshots.sql',
              sha256: 'f984199bef0406ce91724e9ac83a97f41928b1560a51974deb841596f1e403e2',
            },
            {
              name: '0003_gitcrawl_snapshot_hardening.sql',
              sha256: '5daa6e14364f7bd4eba3cc5f61ec266b0559962e7345a65080cc9ef26b084e46',
            },
            {
              name: '0004_gitcrawl_snapshot_cutover.sql',
              sha256: 'e6c4a8edb300ebbf93a2e2449d180408f23be7eac1ef05733045b6ed496eb396',
            },
            {
              name: '0005_discrawl_cursor_state.sql',
              sha256: '5964adcb0807448d937fed38ac9588a1063bf4f490a82b54f15f0e700374ae0c',
            },
            {
              name: '0006_gitcrawl_observation_order.sql',
              sha256: 'a0ebfbb5c40c85df5eaba6772a01a68910fa5f1327d4701d25c5dfde16f77d1a',
            },
            {
              name: '0007_gitcrawl_snapshot_provenance.sql',
              sha256: '5c1e92dbf4d51ef62d317e212a0ec8e39df104983656c6416d0c58ef3503744d',
            },
            {
              name: '0008_gitcrawl_publish_candidates.sql',
              sha256: '3d5afadb62b4343cc88c54a18702aee13b61d1d5a74312a191996833155ab462',
            },
          ];
          const compatibleWithPreviousWorker = new Map([
            [
              '0007_gitcrawl_snapshot_provenance.sql',
              {
                classification: 'additive-snapshot-provenance-and-retirement-v2',
                sha256:
                  '5c1e92dbf4d51ef62d317e212a0ec8e39df104983656c6416d0c58ef3503744d',
              },
            ],
            [
              '0008_gitcrawl_publish_candidates.sql',
              {
                classification: 'additive-publish-candidate-compat-v1',
                sha256:
                  '3d5afadb62b4343cc88c54a18702aee13b61d1d5a74312a191996833155ab462',
              },
            ],
          ]);

          const manifest = JSON.parse(
            readFileSync(join(process.env.RELEASE_ROOT, 'manifest.json'), 'utf8'),
          );
          const reviewedMigrations = Array.isArray(manifest?.files)
            ? manifest.files
                .filter((file) => /^migrations\/[0-9]{4}_[a-z0-9_]+\.sql$/.test(file?.path))
                .map((file) => ({
                  name: file.path.slice('migrations/'.length),
                  sha256: file.sha256,
                }))
            : [];
          if (JSON.stringify(reviewedMigrations) !== JSON.stringify(approvedMigrations)) {
            throw new Error('release manifest is not bound to the reviewed migration set');
          }

          const executions = JSON.parse(
            readFileSync(process.env.APPLIED_MIGRATIONS_RESPONSE, 'utf8'),
          );
          if (
            !Array.isArray(executions) ||
            executions.length !== 1 ||
            executions[0]?.success !== true ||
            !Array.isArray(executions[0]?.results)
          ) {
            throw new Error('remote D1 migration ledger query did not succeed exactly once');
          }

          const appliedNames = executions[0].results.map((row) => row?.name);
          if (
            appliedNames.some(
              (name) =>
                typeof name !== 'string' ||
                !/^[0-9]{4}_[a-z0-9_]+\.sql$/.test(name),
            ) ||
            new Set(appliedNames).size !== appliedNames.length
          ) {
            throw new Error('remote D1 migration ledger contains malformed or duplicate names');
          }
          const expectedAppliedPrefix = approvedMigrations
            .slice(0, appliedNames.length)
            .map((migration) => migration.name);
          if (JSON.stringify(appliedNames) !== JSON.stringify(expectedAppliedPrefix)) {
            throw new Error('remote D1 migration ledger is not the reviewed migration prefix');
          }

          const pendingMigrations = approvedMigrations.slice(appliedNames.length);
          const compatibility = [];
          for (const migration of pendingMigrations) {
            const contract = compatibleWithPreviousWorker.get(migration.name);
            if (!contract || contract.sha256 !== migration.sha256) {
              throw new Error(
                `pending migration ${migration.name} is not classified as compatible with the previous Worker`,
              );
            }

            const migrationPath = join(
              process.env.RELEASE_ROOT,
              'migrations',
              migration.name,
            );
            const sql = readFileSync(migrationPath, 'utf8').replaceAll('\r\n', '\n');
            const sha256 = createHash('sha256').update(sql).digest('hex');
            if (sha256 !== migration.sha256) {
              throw new Error(`pending migration ${migration.name} is not the reviewed content`);
            }

            const createdTables = [
              ...sql.matchAll(
                /\bcreate\s+table\s+if\s+not\s+exists\s+([a-z_][a-z0-9_]*)/gi,
              ),
            ].map((match) => match[1].toLowerCase());
            const insertedTables = [
              ...sql.matchAll(
                /\binsert(?:\s+or\s+ignore)?\s+into\s+([a-z_][a-z0-9_]*)/gi,
              ),
            ].map((match) => match[1].toLowerCase());
            const triggerTargets = [
              ...sql.matchAll(
                /\bcreate\s+trigger\s+if\s+not\s+exists\s+[a-z_][a-z0-9_]*[\s\S]*?\bon\s+([a-z_][a-z0-9_]*)/gi,
              ),
            ].map((match) => match[1].toLowerCase());
            const destructive = /\b(?:alter|drop|truncate|vacuum|reindex|replace)\b/i.test(
              sql,
            );
            const compatibleShape =
              migration.name === '0007_gitcrawl_snapshot_provenance.sql'
                ? !destructive &&
                  JSON.stringify(createdTables) ===
                    JSON.stringify([
                      'gitcrawl_snapshot_provenance',
                      'gitcrawl_archive_snapshot_state',
                    ]) &&
                  JSON.stringify(insertedTables) ===
                    JSON.stringify([
                      'gitcrawl_snapshot_provenance',
                      'remote_capability_fences',
                    ]) &&
                  JSON.stringify(triggerTargets) ===
                    JSON.stringify([
                      'gitcrawl_snapshot_provenance',
                      'gitcrawl_snapshot_provenance',
                      'gitcrawl_archive_snapshot_state',
                      'gitcrawl_archive_snapshot_state',
                    ]) &&
                  /foreign key \(archive_id, snapshot_id\)\s+references gitcrawl_snapshots\(archive_id, snapshot_id\) on delete cascade/i.test(
                    sql,
                  ) &&
                  /create table if not exists gitcrawl_archive_snapshot_state[\s\S]*archive_id text primary key references remote_archives\(id\) on delete cascade[\s\S]*raw_sqlite_retired integer not null default 1 check \(raw_sqlite_retired = 1\)/i.test(
                    sql,
                  ) &&
                  /insert or ignore into gitcrawl_snapshot_provenance[\s\S]*select archive_id, snapshot_id, 'legacy', '', created_at\s+from gitcrawl_snapshots;/i.test(
                    sql,
                  ) &&
                  /insert into remote_capability_fences[\s\S]*'gitcrawl\.snapshot\.provenance\.v1'[\s\S]*on conflict\(capability\) do nothing;/i.test(
                    sql,
                  )
                : migration.name === '0008_gitcrawl_publish_candidates.sql'
                  ? !destructive &&
                    JSON.stringify(createdTables) ===
                      JSON.stringify(['gitcrawl_publish_candidates']) &&
                    JSON.stringify(insertedTables) ===
                      JSON.stringify([
                        'gitcrawl_publish_candidates',
                        'gitcrawl_publish_candidates',
                      ]) &&
                    JSON.stringify(triggerTargets) ===
                      JSON.stringify(['gitcrawl_snapshots']) &&
                    /archive_id text primary key references remote_archives\(id\) on delete cascade/i.test(
                      sql,
                    ) &&
                    /foreign key \(archive_id, snapshot_id\)\s+references gitcrawl_snapshots\(archive_id, snapshot_id\) on delete cascade/i.test(
                      sql,
                    ) &&
                    /insert into gitcrawl_publish_candidates\(archive_id, snapshot_id, completed_at\)[\s\S]*from gitcrawl_active_snapshots active[\s\S]*snapshot\.coverage_complete = 1[\s\S]*trim\(snapshot\.hardening_validated_at\) != ''[\s\S]*on conflict\(archive_id\) do update set[\s\S]*snapshot_id = excluded\.snapshot_id,[\s\S]*completed_at = excluded\.completed_at[\s\S]*where exists \([\s\S]*from gitcrawl_snapshot_cutovers cutover[\s\S]*cutover\.snapshot_id != excluded\.snapshot_id[\s\S]*cutover\.snapshot_id = gitcrawl_publish_candidates\.snapshot_id[\s\S]*\);/i.test(
                      sql,
                    ) &&
                    /update gitcrawl_snapshot_cutovers[\s\S]*set snapshot_id = \([\s\S]*from gitcrawl_active_snapshots active[\s\S]*active\.snapshot_id != gitcrawl_snapshot_cutovers\.snapshot_id[\s\S]*trim\(snapshot\.hardening_validated_at\) != ''[\s\S]*\);/i.test(
                      sql,
                    ) &&
                    /create trigger if not exists gitcrawl_publish_candidates_old_worker_activation\s+after update of activated_at on gitcrawl_snapshots[\s\S]*old\.activated_at is null[\s\S]*new\.activated_at is not null[\s\S]*update gitcrawl_snapshot_cutovers[\s\S]*set snapshot_id = new\.snapshot_id,\s+cutover_at = new\.activated_at/i.test(
                      sql,
                    )
                  : false;
            if (!compatibleShape) {
              throw new Error(
                `${migration.name} is not the reviewed additive previous-Worker-compatible schema shape`,
              );
            }
            compatibility.push({
              name: migration.name,
              sha256,
              classification: contract.classification,
            });
          }

          const proof = {
            schema_version: 1,
            applied_migrations: appliedNames,
            pending_migrations: pendingMigrations.map((migration) => migration.name),
            compatible_with_previous_worker: compatibility,
          };
          writeFileSync(
            process.env.PENDING_MIGRATIONS_PATH,
            `${JSON.stringify(proof, null, 2)}\n`,
            { flag: 'wx', mode: 0o600 },
          );
          PENDING_MIGRATIONS_NODE

          mv -- "$RECEIPT_PATH" "$CONSUMED_RECEIPT_PATH"

          timeout --foreground --signal=TERM --kill-after=5s \
            "${WRANGLER_READ_TIMEOUT_SECONDS}s" \
            "$wrangler" deployments status \
            --name crawl-remote \
            --json \
            --cwd "$RELEASE_ROOT" \
            --config wrangler.json \
            > "$PREVIOUS_DEPLOYMENT_RESPONSE"

          node --input-type=module <<'PREVIOUS_VERSION_NODE'
          import { readFileSync, writeFileSync } from 'node:fs';

          const deployment = JSON.parse(
            readFileSync(process.env.PREVIOUS_DEPLOYMENT_RESPONSE, 'utf8'),
          );
          const versions = deployment?.versions;
          if (
              !Array.isArray(versions) ||
              versions.length !== 1 ||
              versions[0]?.percentage !== 100 ||
              !/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(
                String(versions[0]?.version_id ?? ''),
              )
            ) {
            throw new Error('current Worker deployment is not one stable rollback version');
          }
          writeFileSync(
            process.env.PREVIOUS_VERSION_PATH,
            `${versions[0].version_id}\n`,
            { mode: 0o600 },
          );
          PREVIOUS_VERSION_NODE

          set +e
          timeout --foreground --signal=TERM --kill-after=5s \
            "${WRANGLER_READ_TIMEOUT_SECONDS}s" \
            "$wrangler" d1 execute crawl-remote \
            --remote \
            --json \
            --cwd "$RELEASE_ROOT" \
            --config wrangler.json \
            --command \
            "select capability, migration_ready, cutover_enabled, activated_at from remote_capability_fences where capability in ('gitcrawl.observation-order.v1', 'gitcrawl.snapshot.provenance.v1') order by capability" \
            > "$PRE_FENCE_RESPONSE" 2> "$PRE_FENCE_ERROR"
          pre_fence_status=$?
          set -e
          test "$(wc -c < "$PRE_FENCE_RESPONSE")" -le 1048576
          test "$(wc -c < "$PRE_FENCE_ERROR")" -le 1048576

          PRE_FENCE_STATUS="$pre_fence_status" node --input-type=module <<'PRE_FENCE_NODE'
          import { readFileSync } from 'node:fs';
          import { join } from 'node:path';

          const expectedStates = new Map([
            ['gitcrawl.observation-order.v1', process.env.OBSERVATION_ORDER_STATE],
            ['gitcrawl.snapshot.provenance.v1', process.env.SNAPSHOT_PROVENANCE_STATE],
          ]);
          if (
            [...expectedStates.values()].some(
              (state) => !['dormant', 'active'].includes(state),
            )
          ) {
            throw new Error('pre-migration fence state is invalid');
          }

          const statusText = process.env.PRE_FENCE_STATUS ?? '';
          if (!/^(0|[1-9][0-9]*)$/.test(statusText)) {
            throw new Error('observation-order pre-migration query status is invalid');
          }
          const status = Number(statusText);
          const response = readFileSync(process.env.PRE_FENCE_RESPONSE, 'utf8');
          const errorOutput = readFileSync(process.env.PRE_FENCE_ERROR, 'utf8');

          if (status !== 0) {
            let failure;
            try {
              failure = JSON.parse(response);
            } catch {
              throw new Error('observation-order pre-migration query failed');
            }
            const failureKeys =
              failure && typeof failure === 'object' && !Array.isArray(failure)
                ? Object.keys(failure)
                : [];
            const apiError = failure?.error;
            const errorKeys =
              apiError && typeof apiError === 'object' && !Array.isArray(apiError)
                ? Object.keys(apiError).sort()
                : [];
            const config = JSON.parse(
              readFileSync(join(process.env.RELEASE_ROOT, 'wrangler.json'), 'utf8'),
            );
            const database = Array.isArray(config.d1_databases)
              ? config.d1_databases.find(
                  (candidate) => candidate?.database_name === 'crawl-remote',
                )
              : undefined;
            const expectedAccountId = process.env.CLOUDFLARE_ACCOUNT_ID;
            const expectedDatabaseId = database?.database_id;
            const expectedText =
              `A request to the Cloudflare API (/accounts/${expectedAccountId}/d1/database/${expectedDatabaseId}/query) failed.`;
            const missingTableNotes = new Set([
              'no such table: remote_capability_fences: SQLITE_ERROR [code: 7500]',
              'D1_ERROR: no such table: remote_capability_fences: SQLITE_ERROR [code: 7500]',
            ]);
            const notes = apiError?.notes;
            if (
              errorOutput.length !== 0 ||
              JSON.stringify(failureKeys) !== JSON.stringify(['error']) ||
              JSON.stringify(errorKeys) !==
                JSON.stringify(['accountTag', 'code', 'kind', 'name', 'notes', 'text']) ||
              typeof expectedAccountId !== 'string' ||
              !/^[0-9a-f]{32}$/.test(expectedAccountId) ||
              typeof expectedDatabaseId !== 'string' ||
              !/^[0-9a-f-]{36}$/.test(expectedDatabaseId) ||
              apiError.text !== expectedText ||
              apiError.name !== 'APIError' ||
              apiError.kind !== 'error' ||
              apiError.code !== 7500 ||
              apiError.accountTag !== expectedAccountId ||
              !Array.isArray(notes) ||
              notes.length !== 1 ||
              JSON.stringify(Object.keys(notes[0] ?? {})) !== JSON.stringify(['text']) ||
              !missingTableNotes.has(notes[0].text)
            ) {
              throw new Error('observation-order pre-migration query failed');
            }
            if ([...expectedStates.values()].some((state) => state !== 'dormant')) {
              throw new Error(
                'capability fence table is missing but active state was selected',
              );
            }
            console.log('Capability fence table is absent before dormant bootstrap.');
            process.exit(0);
          }

          const executions = JSON.parse(response);
          if (
            !Array.isArray(executions) ||
            executions.length !== 1 ||
            executions[0]?.success !== true
          ) {
            throw new Error(
              'capability pre-migration query did not succeed exactly once',
            );
          }

          const rows = executions[0].results;
          if (!Array.isArray(rows) || rows.length < 1 || rows.length > expectedStates.size) {
            throw new Error(
              'capability pre-migration query returned an invalid row count',
            );
          }

          const fences = new Map();
          for (const fence of rows) {
            if (
              !expectedStates.has(fence?.capability) ||
              fences.has(fence.capability)
            ) {
              throw new Error('pre-migration query returned an unknown or duplicate fence');
            }
            fences.set(fence.capability, fence);
          }

          for (const [capability, expectedState] of expectedStates) {
            const fence = fences.get(capability);
            if (!fence) {
              if (
                capability === 'gitcrawl.snapshot.provenance.v1' &&
                expectedState === 'dormant'
              ) {
                continue;
              }
              throw new Error(
                `${capability} fence is missing before selected ${expectedState} deployment`,
              );
            }
            const expectedCutover = expectedState === 'active' ? 1 : 0;
            if (
              fence.migration_ready !== 1 ||
              fence.cutover_enabled !== expectedCutover ||
              (
                expectedState === 'active' &&
                (
                  typeof fence.activated_at !== 'string' ||
                  fence.activated_at.trim().length === 0
                )
              ) ||
              (expectedState === 'dormant' && fence.activated_at !== '')
            ) {
              throw new Error(
                `${capability} fence does not match selected ${expectedState} state before migration`,
              );
            }
          }

          console.log('Capability fences match the selected pre-migration states.');
          PRE_FENCE_NODE

          now="$(date +%s)"
          remaining="$((DEPLOY_JOB_DEADLINE_EPOCH - now))"
          if (( remaining < D1_MUTATION_MIN_REMAINING_SECONDS )); then
            echo "::error::refusing D1 migration because the protected job no longer has the complete deploy, proof, and rollback window."
            exit 1
          fi

          timeout --foreground --signal=TERM --kill-after=5s \
            "${WRANGLER_DEPLOY_TIMEOUT_SECONDS}s" \
            "$wrangler" d1 migrations apply crawl-remote \
            --remote \
            --cwd "$RELEASE_ROOT" \
            --config wrangler.json

          timeout --foreground --signal=TERM --kill-after=5s \
            "${WRANGLER_READ_TIMEOUT_SECONDS}s" \
            "$wrangler" d1 execute crawl-remote \
            --remote \
            --json \
            --cwd "$RELEASE_ROOT" \
            --config wrangler.json \
            --command \
            "select capability, migration_ready, cutover_enabled, activated_at from remote_capability_fences where capability in ('gitcrawl.observation-order.v1', 'gitcrawl.snapshot.provenance.v1') order by capability" \
            > "$FENCE_RESPONSE"

          node --input-type=module <<'POST_FENCE_NODE'
          import { readFileSync } from 'node:fs';

          const executions = JSON.parse(
            readFileSync(process.env.FENCE_RESPONSE, 'utf8'),
          );
          if (
            !Array.isArray(executions) ||
            executions.length !== 1 ||
            executions[0]?.success !== true
          ) {
            throw new Error('capability fence query did not succeed exactly once');
          }

          const rows = executions[0].results;
          const expectedStates = new Map([
            ['gitcrawl.observation-order.v1', process.env.OBSERVATION_ORDER_STATE],
            ['gitcrawl.snapshot.provenance.v1', process.env.SNAPSHOT_PROVENANCE_STATE],
          ]);
          if (!Array.isArray(rows) || rows.length !== expectedStates.size) {
            throw new Error('capability fence query did not return exactly two rows');
          }

          const fences = new Map();
          for (const fence of rows) {
            if (
              !expectedStates.has(fence?.capability) ||
              fences.has(fence.capability)
            ) {
              throw new Error('capability fence query returned an unknown or duplicate fence');
            }
            fences.set(fence.capability, fence);
          }

          for (const [capability, expectedState] of expectedStates) {
            const fence = fences.get(capability);
            const expectedCutover = expectedState === 'active' ? 1 : 0;
            if (
              !['dormant', 'active'].includes(expectedState) ||
              fence?.migration_ready !== 1 ||
              fence?.cutover_enabled !== expectedCutover ||
              (
                expectedState === 'active' &&
                (
                  typeof fence?.activated_at !== 'string' ||
                  fence.activated_at.trim().length === 0
                )
              ) ||
              (expectedState === 'dormant' && fence?.activated_at !== '')
            ) {
              throw new Error(
                `${capability} migration does not match expected ${expectedState} state`,
              );
            }
          }

          console.log('Capability migrations are ready in the selected states.');
          POST_FENCE_NODE

      - name: Probe previous Worker against migrated D1
        id: previous-worker-probe
        env:
          PENDING_MIGRATIONS_PATH: ${{ runner.temp }}/crawl-remote-compatible-pending-migrations.json
          PREVIOUS_RELEASE_SHA_PATH: ${{ runner.temp }}/crawl-remote-previous-release-sha.txt
          PREVIOUS_WORKER_CONTRACT_BASELINE: ${{ runner.temp }}/crawl-remote-previous-contract-before-migration.json
          PREVIOUS_WORKER_CONTRACT_PROBE: ${{ runner.temp }}/crawl-remote-previous-contract-after-migration.json
          PREVIOUS_WORKER_HEALTH_BASELINE: ${{ runner.temp }}/crawl-remote-previous-health-before-migration.json
          PREVIOUS_WORKER_HEALTH_PROBE: ${{ runner.temp }}/crawl-remote-previous-health-after-migration.json
          PREVIOUS_WORKER_PROBE_PATH: ${{ runner.temp }}/crawl-remote-previous-worker-migration-proof.txt
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          test -f "$PENDING_MIGRATIONS_PATH"
          test -f "$PREVIOUS_RELEASE_SHA_PATH"
          test -f "$PREVIOUS_WORKER_HEALTH_BASELINE"
          test -f "$PREVIOUS_WORKER_CONTRACT_BASELINE"
          test ! -e "$PREVIOUS_WORKER_PROBE_PATH"

          curl --fail-with-body --silent --show-error \
            --connect-timeout 10 \
            --max-time 20 \
            --max-filesize 1048576 \
            --header "cache-control: no-cache" \
            --output "$PREVIOUS_WORKER_HEALTH_PROBE" \
            "$WORKERS_DEV_URL/health?migration_probe=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-after"
          curl --fail-with-body --silent --show-error \
            --connect-timeout 10 \
            --max-time 20 \
            --max-filesize 1048576 \
            --header "cache-control: no-cache" \
            --output "$PREVIOUS_WORKER_CONTRACT_PROBE" \
            "$WORKERS_DEV_URL/v1/contract?migration_probe=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-after"

          node --input-type=module <<'PREVIOUS_WORKER_PROBE_NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          import { isDeepStrictEqual } from 'node:util';

          const expectedReleaseSHA = readFileSync(
            process.env.PREVIOUS_RELEASE_SHA_PATH,
            'utf8',
          ).trim();
          const baselineHealth = JSON.parse(
            readFileSync(process.env.PREVIOUS_WORKER_HEALTH_BASELINE, 'utf8'),
          );
          const baselineContract = JSON.parse(
            readFileSync(process.env.PREVIOUS_WORKER_CONTRACT_BASELINE, 'utf8'),
          );
          const probedHealth = JSON.parse(
            readFileSync(process.env.PREVIOUS_WORKER_HEALTH_PROBE, 'utf8'),
          );
          const probedContract = JSON.parse(
            readFileSync(process.env.PREVIOUS_WORKER_CONTRACT_PROBE, 'utf8'),
          );
          const probedRoutes = Array.isArray(probedContract?.routes)
            ? probedContract.routes
            : [];
          const probedApps = Array.isArray(probedContract?.apps)
            ? probedContract.apps
            : [];
          if (
            !/^[0-9a-f]{40}$/.test(expectedReleaseSHA) ||
            probedHealth?.ok !== true ||
            probedHealth?.release_sha !== expectedReleaseSHA ||
            probedContract?.service !== 'crawl-remote' ||
            probedContract?.protocol_version !== 'v1' ||
            probedContract?.release_sha !== expectedReleaseSHA ||
            !isDeepStrictEqual(probedHealth, baselineHealth)
          ) {
            throw new Error(
              'previous Worker public identity failed after D1 migration',
            );
          }

          for (const route of baselineContract.routes) {
            if (!probedRoutes.some((candidate) => isDeepStrictEqual(candidate, route))) {
              throw new Error('previous Worker contract lost a route after D1 migration');
            }
          }
          for (const baselineApp of baselineContract.apps) {
            const probedApp = probedApps.find((app) => app?.app === baselineApp?.app);
            if (!probedApp) {
              throw new Error('previous Worker contract lost an app after D1 migration');
            }
            const baselineCapabilities = Array.isArray(baselineApp.capabilities)
              ? baselineApp.capabilities
              : [];
            const probedCapabilities = Array.isArray(probedApp.capabilities)
              ? probedApp.capabilities
              : [];
            if (
              baselineCapabilities.some(
                (capability) => !probedCapabilities.includes(capability),
              )
            ) {
              throw new Error(
                'previous Worker contract lost a capability after D1 migration',
              );
            }
          }
          const baselineNotes = Array.isArray(baselineContract.notes)
            ? baselineContract.notes
            : [];
          const probedNotes = Array.isArray(probedContract.notes)
            ? probedContract.notes
            : [];
          if (baselineNotes.some((note) => !probedNotes.includes(note))) {
            throw new Error('previous Worker contract lost a note after D1 migration');
          }

          writeFileSync(
            process.env.PREVIOUS_WORKER_PROBE_PATH,
            `${expectedReleaseSHA}\n`,
            { flag: 'wx', mode: 0o600 },
          );
          PREVIOUS_WORKER_PROBE_NODE

      - name: Reauthorize current main immediately before Worker deploy
        env:
          CONSUMED_RECEIPT_PATH: ${{ runner.temp }}/${{ needs.preflight.outputs.receipt_name }}.consumed
          GH_TOKEN: ${{ steps.target-token.outputs.token }}
          PENDING_MIGRATIONS_PATH: ${{ runner.temp }}/crawl-remote-compatible-pending-migrations.json
          PREVIOUS_WORKER_PROBE_PATH: ${{ runner.temp }}/crawl-remote-previous-worker-migration-proof.txt
          SOURCE_GH_TOKEN: ${{ github.token }}
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          test -f "$CONSUMED_RECEIPT_PATH"
          test -f "$PENDING_MIGRATIONS_PATH"
          test -f "$PREVIOUS_WORKER_PROBE_PATH"
          current_source_main_sha="$(
            GH_TOKEN="$SOURCE_GH_TOKEN" \
              timeout --foreground --signal=TERM --kill-after=5s \
              "${WRANGLER_READ_TIMEOUT_SECONDS}s" \
              gh api "repos/$SOURCE_REPOSITORY/commits/main" --jq '.sha'
          )"
          if [[ ! "$current_source_main_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::ClawSweeper main did not resolve to a full lowercase commit SHA."
            exit 1
          fi
          if [[ "$WORKFLOW_SHA" != "$current_source_main_sha" ]]; then
            echo "::error::ClawSweeper main advanced before Worker deployment."
            exit 1
          fi
          current_main_sha="$(
            timeout --foreground --signal=TERM --kill-after=5s \
              "${WRANGLER_READ_TIMEOUT_SECONDS}s" \
              gh api "repos/$TARGET_REPOSITORY/commits/main" --jq '.sha'
          )"
          if [[ ! "$current_main_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::crawl-remote main did not resolve to a full lowercase commit SHA."
            exit 1
          fi
          if [[ "$DEPLOY_SHA" != "$current_main_sha" ]]; then
            echo "::error::approved crawl-remote release is no longer the current main tip."
            exit 1
          fi

      - name: Deploy verified Worker bundle
        id: worker-deploy
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CRAWL_REMOTE_PRODUCTION_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_TOKEN_SHA256: ${{ vars.CRAWL_REMOTE_CLOUDFLARE_TOKEN_SHA256 }}
          CONSUMED_RECEIPT_PATH: ${{ runner.temp }}/${{ needs.preflight.outputs.receipt_name }}.consumed
          DEPLOY_OUTPUT_PATH: ${{ runner.temp }}/crawl-remote-deploy-output.ndjson
          PENDING_MIGRATIONS_PATH: ${{ runner.temp }}/crawl-remote-compatible-pending-migrations.json
          PRE_DEPLOYMENT_RESPONSE: ${{ runner.temp }}/crawl-remote-pre-deployment.json
          PREVIOUS_VERSION_PATH: ${{ runner.temp }}/crawl-remote-previous-version.txt
          PREVIOUS_WORKER_PROBE_PATH: ${{ runner.temp }}/crawl-remote-previous-worker-migration-proof.txt
          RELEASE_ROOT: ${{ runner.temp }}/crawl-remote-release
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          test -n "$CLOUDFLARE_API_TOKEN"
          test "$CLOUDFLARE_TOKEN_SHA256" = "$(printf '%s' "$CLOUDFLARE_API_TOKEN" | sha256sum | cut -d ' ' -f 1)"
          test -f "$CONSUMED_RECEIPT_PATH"
          test -f "$PENDING_MIGRATIONS_PATH"
          test -f "$PREVIOUS_VERSION_PATH"
          test -f "$PREVIOUS_WORKER_PROBE_PATH"
          test ! -e "$DEPLOY_OUTPUT_PATH"
          test ! -e "$PRE_DEPLOYMENT_RESPONSE"
          wrangler="$TOOLCHAIN_ROOT/node_modules/.bin/wrangler"
          test "$(
            timeout --foreground --signal=TERM --kill-after=5s \
              "${WRANGLER_READ_TIMEOUT_SECONDS}s" \
              "$wrangler" --version
          )" = "$WRANGLER_VERSION"

          timeout --foreground --signal=TERM --kill-after=5s \
            "${WRANGLER_READ_TIMEOUT_SECONDS}s" \
            "$wrangler" deployments status \
            --name crawl-remote \
            --json \
            --cwd "$RELEASE_ROOT" \
            --config wrangler.json \
            > "$PRE_DEPLOYMENT_RESPONSE"
          test "$(wc -c < "$PRE_DEPLOYMENT_RESPONSE")" -le 1048576

          node --input-type=module <<'PRE_DEPLOYMENT_NODE'
          import { readFileSync } from 'node:fs';

          const previousVersion = readFileSync(
            process.env.PREVIOUS_VERSION_PATH,
            'utf8',
          ).trim();
          const deployment = JSON.parse(
            readFileSync(process.env.PRE_DEPLOYMENT_RESPONSE, 'utf8'),
          );
          const versions = deployment?.versions;
          if (
            !Array.isArray(versions) ||
            versions.length !== 1 ||
            versions[0]?.percentage !== 100 ||
            versions[0]?.version_id !== previousVersion
          ) {
            throw new Error(
              'current Worker version changed after migration proof; refusing deployment',
            );
          }
          PRE_DEPLOYMENT_NODE

          now="$(date +%s)"
          remaining="$((DEPLOY_JOB_DEADLINE_EPOCH - now))"
          if (( remaining < WORKER_MUTATION_MIN_REMAINING_SECONDS )); then
            echo "::error::refusing Worker deployment because the protected job no longer has the complete ownership, proof, and rollback window."
            exit 1
          fi

          WRANGLER_OUTPUT_FILE_PATH="$DEPLOY_OUTPUT_PATH" \
            timeout --foreground --signal=TERM --kill-after=5s \
            "${WRANGLER_DEPLOY_TIMEOUT_SECONDS}s" \
            "$wrangler" deploy bundle/index.js \
            --no-bundle \
            --strict \
            --cwd "$RELEASE_ROOT" \
            --config wrangler.json \
            --var "CRAWL_REMOTE_RELEASE_SHA:$DEPLOY_SHA" \
            --message "$DEPLOY_MESSAGE"

      - name: Resolve Worker deployment ownership
        id: deployment-state
        if: ${{ always() && steps.worker-deploy.outcome != 'skipped' }}
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CRAWL_REMOTE_PRODUCTION_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_TOKEN_SHA256: ${{ vars.CRAWL_REMOTE_CLOUDFLARE_TOKEN_SHA256 }}
          CURRENT_DEPLOYMENT_RESPONSE: ${{ runner.temp }}/crawl-remote-current-deployment.json
          DEPLOYED_VERSION_PATH: ${{ runner.temp }}/crawl-remote-deployed-version.txt
          OWNED_DEPLOYMENT_ID_PATH: ${{ runner.temp }}/crawl-remote-owned-deployment-id.txt
          PREVIOUS_VERSION_PATH: ${{ runner.temp }}/crawl-remote-previous-version.txt
          RELEASE_ROOT: ${{ runner.temp }}/crawl-remote-release
          WORKER_DEPLOY_OUTCOME: ${{ steps.worker-deploy.outcome }}
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          test -n "$CLOUDFLARE_API_TOKEN"
          test "$CLOUDFLARE_TOKEN_SHA256" = "$(printf '%s' "$CLOUDFLARE_API_TOKEN" | sha256sum | cut -d ' ' -f 1)"
          test -f "$PREVIOUS_VERSION_PATH"
          test ! -e "$CURRENT_DEPLOYMENT_RESPONSE"
          test ! -e "$DEPLOYED_VERSION_PATH"
          test ! -e "$OWNED_DEPLOYMENT_ID_PATH"

          node --input-type=module <<'DEPLOY_VERSION_NODE'
          import { spawnSync } from 'node:child_process';
          import { appendFileSync, readFileSync, writeFileSync } from 'node:fs';
          import { join } from 'node:path';

          const uuidPattern =
            /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
          const previousVersion = readFileSync(
            process.env.PREVIOUS_VERSION_PATH,
            'utf8',
          ).trim();
          const expectedMessage = process.env.DEPLOY_MESSAGE ?? '';
          const deployOutcome = process.env.WORKER_DEPLOY_OUTCOME;
          const attempts = Number(process.env.DEPLOYMENT_STATUS_ATTEMPTS);
          const delaySeconds = Number(process.env.DEPLOYMENT_STATUS_DELAY_SECONDS);
          const statusTimeoutSeconds = Number(
            process.env.DEPLOYMENT_STATUS_TIMEOUT_SECONDS,
          );
          const readTimeoutSeconds = Number(
            process.env.WRANGLER_READ_TIMEOUT_SECONDS,
          );
          const wrangler = join(
            process.env.TOOLCHAIN_ROOT,
            'node_modules',
            '.bin',
            'wrangler',
          );
          if (
            !uuidPattern.test(previousVersion) ||
            expectedMessage.length === 0 ||
            expectedMessage.length > 256 ||
            !['success', 'failure', 'cancelled'].includes(deployOutcome) ||
            !Number.isSafeInteger(attempts) ||
            attempts < 1 ||
            attempts > 120 ||
            !Number.isSafeInteger(delaySeconds) ||
            delaySeconds < 0 ||
            delaySeconds > 30 ||
            !Number.isSafeInteger(statusTimeoutSeconds) ||
            statusTimeoutSeconds < 1 ||
            statusTimeoutSeconds > 600 ||
            !Number.isSafeInteger(readTimeoutSeconds) ||
            readTimeoutSeconds < 1 ||
            readTimeoutSeconds > 120
          ) {
            throw new Error('Worker deployment ownership inputs are invalid');
          }
          const deadline = Date.now() + statusTimeoutSeconds * 1000;
          const version = spawnSync(wrangler, ['--version'], {
            encoding: 'utf8',
            env: process.env,
            maxBuffer: 1024 * 1024,
            timeout: Math.min(readTimeoutSeconds * 1000, deadline - Date.now()),
          });
          if (
            version.status !== 0 ||
            version.stdout.trim() !== process.env.WRANGLER_VERSION
          ) {
            throw new Error('trusted Wrangler version changed before ownership proof');
          }

          function sleep() {
            if (delaySeconds > 0) {
              const remaining = deadline - Date.now();
              if (remaining <= 0) {
                return;
              }
              Atomics.wait(
                new Int32Array(new SharedArrayBuffer(4)),
                0,
                0,
                Math.min(delaySeconds * 1000, remaining),
              );
            }
          }

          for (let attempt = 1; attempt <= attempts; attempt += 1) {
            const remaining = deadline - Date.now();
            if (remaining <= 0) {
              throw new Error('Worker deployment ownership deadline expired');
            }
            const status = spawnSync(
              wrangler,
              [
                'deployments',
                'status',
                '--name',
                'crawl-remote',
                '--json',
                '--cwd',
                process.env.RELEASE_ROOT,
                '--config',
                'wrangler.json',
              ],
              {
                encoding: 'utf8',
                env: process.env,
                maxBuffer: 1024 * 1024,
                timeout: Math.min(readTimeoutSeconds * 1000, remaining),
              },
            );
            if (status.status !== 0) {
              if (attempt < attempts) {
                sleep();
                continue;
              }
              throw new Error('unable to resolve current Worker deployment');
            }
            if (Buffer.byteLength(status.stdout, 'utf8') > 1024 * 1024) {
              throw new Error('current Worker deployment response is oversized');
            }
            writeFileSync(process.env.CURRENT_DEPLOYMENT_RESPONSE, status.stdout, {
              mode: 0o600,
            });
            const deployment = JSON.parse(status.stdout);
            const deploymentID = String(deployment?.id ?? '');
            const versions = deployment?.versions;
            if (
              !uuidPattern.test(deploymentID) ||
              !Array.isArray(versions) ||
              versions.length !== 1 ||
              versions[0]?.percentage !== 100 ||
              !uuidPattern.test(String(versions[0]?.version_id ?? ''))
            ) {
              throw new Error('current Worker deployment is not one stable version');
            }
            const currentVersion = versions[0].version_id;
            if (currentVersion === previousVersion) {
              if (attempt < attempts) {
                sleep();
                continue;
              }
              throw new Error(
                `Worker deployment mutation remains indeterminate after ${attempts} status checks`,
              );
            }
            if (deployment?.annotations?.['workers/message'] !== expectedMessage) {
              throw new Error(
                'current Worker deployment is not owned by this workflow run',
              );
            }
            writeFileSync(
              process.env.DEPLOYED_VERSION_PATH,
              `${currentVersion}\n`,
              { flag: 'wx', mode: 0o600 },
            );
            writeFileSync(
              process.env.OWNED_DEPLOYMENT_ID_PATH,
              `${deploymentID}\n`,
              { flag: 'wx', mode: 0o600 },
            );
            appendFileSync(
              process.env.GITHUB_OUTPUT,
              `mutation_owned=true\ndeployed_version=${currentVersion}\ndeployment_id=${deploymentID}\n`,
            );
            process.exit(0);
          }

          throw new Error('unable to resolve Worker deployment ownership');
          DEPLOY_VERSION_NODE

      - name: Validate Worker deploy receipt
        id: deploy-receipt
        if: ${{ steps.deployment-state.outputs.mutation_owned == 'true' }}
        continue-on-error: true
        env:
          DEPLOY_OUTPUT_PATH: ${{ runner.temp }}/crawl-remote-deploy-output.ndjson
          DEPLOYED_VERSION_PATH: ${{ runner.temp }}/crawl-remote-deployed-version.txt
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          test -f "$DEPLOY_OUTPUT_PATH"
          test -f "$DEPLOYED_VERSION_PATH"
          test "$(wc -c < "$DEPLOY_OUTPUT_PATH")" -le 1048576

          node --input-type=module <<'DEPLOY_RECEIPT_NODE'
          import { readFileSync } from 'node:fs';

          const deployedVersion = readFileSync(
            process.env.DEPLOYED_VERSION_PATH,
            'utf8',
          ).trim();
          const entries = readFileSync(process.env.DEPLOY_OUTPUT_PATH, 'utf8')
            .split(/\r?\n/)
            .filter(Boolean)
            .map((line) => JSON.parse(line));
          const deployments = entries.filter((entry) => entry?.type === 'deploy');
          if (
            deployments.length !== 1 ||
            deployments[0]?.version !== 1 ||
            deployments[0]?.worker_name !== 'crawl-remote' ||
            deployments[0]?.version_id !== deployedVersion
          ) {
            throw new Error(
              'Wrangler deploy receipt does not match the owned Worker version',
            );
          }
          DEPLOY_RECEIPT_NODE

      - name: Reauthorize current main after Worker deploy
        id: post-deploy-main
        if: >-
          ${{
            steps.worker-deploy.outcome == 'success' &&
            steps.deployment-state.outcome == 'success' &&
            steps.deployment-state.outputs.mutation_owned == 'true' &&
            steps.deploy-receipt.outcome == 'success'
          }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.target-token.outputs.token }}
          SOURCE_GH_TOKEN: ${{ github.token }}
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          current_source_main_sha="$(
            GH_TOKEN="$SOURCE_GH_TOKEN" \
              timeout --foreground --signal=TERM --kill-after=5s \
              "${WRANGLER_READ_TIMEOUT_SECONDS}s" \
              gh api "repos/$SOURCE_REPOSITORY/commits/main" --jq '.sha'
          )"
          if [[ ! "$current_source_main_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::ClawSweeper main did not resolve to a full lowercase commit SHA."
            exit 1
          fi
          if [[ "$WORKFLOW_SHA" != "$current_source_main_sha" ]]; then
            echo "::error::ClawSweeper main advanced during deployment; rollback is required."
            exit 1
          fi
          current_main_sha="$(
            timeout --foreground --signal=TERM --kill-after=5s \
              "${WRANGLER_READ_TIMEOUT_SECONDS}s" \
              gh api "repos/$TARGET_REPOSITORY/commits/main" --jq '.sha'
          )"
          if [[ ! "$current_main_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::crawl-remote main did not resolve to a full lowercase commit SHA."
            exit 1
          fi
          if [[ "$DEPLOY_SHA" != "$current_main_sha" ]]; then
            echo "::error::crawl-remote main advanced during deployment; rollback is required."
            exit 1
          fi

      - name: Poll exact production release
        id: production-proof
        if: >-
          ${{
            steps.worker-deploy.outcome == 'success' &&
            steps.deployment-state.outcome == 'success' &&
            steps.deployment-state.outputs.mutation_owned == 'true' &&
            steps.deploy-receipt.outcome == 'success' &&
            steps.post-deploy-main.outcome == 'success'
          }}
        continue-on-error: true
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CRAWL_REMOTE_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CRAWL_REMOTE_ACCESS_CLIENT_SECRET }}
          CUSTOM_ROUTE_PROOF: ${{ vars.CRAWL_REMOTE_CUSTOM_ROUTE_PROOF }}
          PRODUCTION_ROUTE_CONTRACT_RESPONSE: ${{ runner.temp }}/crawl-remote-production-route-contract.json
          PRODUCTION_ROUTE_HEALTH_RESPONSE: ${{ runner.temp }}/crawl-remote-production-route-health.json
          WORKERS_DEV_CONTRACT_RESPONSE: ${{ runner.temp }}/crawl-remote-workers-dev-contract.json
          WORKERS_DEV_HEALTH_RESPONSE: ${{ runner.temp }}/crawl-remote-workers-dev-health.json
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          deadline=$((SECONDS + 180))
          attempt=0

          fetch_endpoint() {
            local url="$1"
            local output="$2"
            local access_mode="${3:-public}"
            local remaining=$((deadline - SECONDS))
            local timeout
            local -a access_headers=()

            if (( remaining <= 0 )); then
              return 1
            fi
            if [[ "$access_mode" == "access-service-token" ]]; then
              if [[ -z "$CF_ACCESS_CLIENT_ID" || -z "$CF_ACCESS_CLIENT_SECRET" ]]; then
                echo "::error::custom-route proof requires both Cloudflare Access service-token secrets."
                return 1
              fi
              access_headers=(
                --header "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID"
                --header "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET"
              )
            elif [[ "$access_mode" != "public" ]]; then
              echo "::error::unsupported endpoint access mode: $access_mode"
              return 1
            fi
            timeout="$remaining"
            if (( timeout > 10 )); then
              timeout=10
            fi

            curl --fail-with-body --silent --show-error \
              --connect-timeout "$timeout" \
              --max-time "$timeout" \
              --max-filesize 1048576 \
              --header "cache-control: no-cache" \
              "${access_headers[@]}" \
              --output "$output" \
              "$url"
          }

          test "$CUSTOM_ROUTE_PROOF" = "access-service-token"
          test -n "$CF_ACCESS_CLIENT_ID"
          test -n "$CF_ACCESS_CLIENT_SECRET"

          while (( SECONDS < deadline )); do
            attempt=$((attempt + 1))
            rm -f \
              "$WORKERS_DEV_HEALTH_RESPONSE" \
              "$WORKERS_DEV_CONTRACT_RESPONSE" \
              "$PRODUCTION_ROUTE_HEALTH_RESPONSE" \
              "$PRODUCTION_ROUTE_CONTRACT_RESPONSE"
            if fetch_endpoint "$WORKERS_DEV_URL/health" "$WORKERS_DEV_HEALTH_RESPONSE" &&
              fetch_endpoint "$WORKERS_DEV_URL/v1/contract" "$WORKERS_DEV_CONTRACT_RESPONSE" &&
              fetch_endpoint "$PRODUCTION_ROUTE_URL/health" "$PRODUCTION_ROUTE_HEALTH_RESPONSE" "access-service-token" &&
              fetch_endpoint "$PRODUCTION_ROUTE_URL/v1/contract" "$PRODUCTION_ROUTE_CONTRACT_RESPONSE" "access-service-token" &&
              node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';

          try {
            const expectedSha = process.env.DEPLOY_SHA;
            const expectedObservationOrderState = process.env.OBSERVATION_ORDER_STATE;
            const expectedSnapshotProvenanceState =
              process.env.SNAPSHOT_PROVENANCE_STATE;
            const observationFenceNote =
              'Gitcrawl observation ordering requires the D1 migration, explicit publisher capability, and operator cutover fence before it is advertised or activated.';
            const snapshotProvenanceNote =
              'Gitcrawl content-addressed snapshots bind manifest.source_sha256, status, queries, and SQLite bundle manifests to one source image.';
            const endpoints = [
              {
                label: 'workers.dev',
                healthPath: process.env.WORKERS_DEV_HEALTH_RESPONSE,
                contractPath: process.env.WORKERS_DEV_CONTRACT_RESPONSE,
              },
              {
                label: 'production route',
                healthPath: process.env.PRODUCTION_ROUTE_HEALTH_RESPONSE,
                contractPath: process.env.PRODUCTION_ROUTE_CONTRACT_RESPONSE,
              },
            ];
            if (process.env.CUSTOM_ROUTE_PROOF !== 'access-service-token') {
              throw new Error('custom-route proof mode is invalid');
            }

            function validateEndpoint({ label, healthPath, contractPath }) {
              const health = JSON.parse(readFileSync(healthPath, 'utf8'));
              if (health.ok !== true || health.release_sha !== expectedSha) {
                throw new Error(`${label} health response does not identify the approved release`);
              }

              const contract = JSON.parse(readFileSync(contractPath, 'utf8'));
              if (
                contract.service !== 'crawl-remote' ||
                contract.protocol_version !== 'v1' ||
                contract.release_sha !== expectedSha
              ) {
                throw new Error(`${label} contract does not identify the approved release`);
              }

              const notes = Array.isArray(contract.notes) ? contract.notes : [];
              if (!notes.includes(observationFenceNote)) {
                throw new Error(`${label} contract does not identify the observation-order fence`);
              }
              if (!notes.includes(snapshotProvenanceNote)) {
                throw new Error(`${label} contract does not identify snapshot provenance`);
              }

              const apps = Array.isArray(contract.apps) ? contract.apps : [];
              const gitcrawl = apps.find((app) => app?.app === 'gitcrawl');
              if (!gitcrawl) {
                throw new Error(`${label} contract is missing the Gitcrawl app`);
              }
              if (!Array.isArray(gitcrawl.capabilities)) {
                throw new Error(`${label} Gitcrawl capabilities are malformed`);
              }
              const observationOrderActive = gitcrawl.capabilities.includes(
                'gitcrawl.observation-order.v1',
              );
              const snapshotProvenanceActive = gitcrawl.capabilities.includes(
                'gitcrawl.snapshot.provenance.v1',
              );
              if (
                !['dormant', 'active'].includes(expectedObservationOrderState) ||
                (
                  expectedObservationOrderState === 'active' &&
                  !observationOrderActive
                ) ||
                (
                  expectedObservationOrderState === 'dormant' &&
                  observationOrderActive
                )
              ) {
                throw new Error(
                  `${label} contract does not match expected ${expectedObservationOrderState} observation-order state`,
                );
              }
              if (
                !['dormant', 'active'].includes(expectedSnapshotProvenanceState) ||
                (
                  expectedSnapshotProvenanceState === 'active' &&
                  !snapshotProvenanceActive
                ) ||
                (
                  expectedSnapshotProvenanceState === 'dormant' &&
                  snapshotProvenanceActive
                )
              ) {
                throw new Error(
                  `${label} contract does not match expected ${expectedSnapshotProvenanceState} snapshot-provenance state`,
                );
              }

              const routes = Array.isArray(contract.routes) ? contract.routes : [];
              for (const path of ['/health', '/v1/contract']) {
                if (!routes.some((route) => route?.method === 'GET' && route?.path === path)) {
                  throw new Error(`${label} contract is missing GET ${path}`);
                }
              }
            }

            for (const endpoint of endpoints) validateEndpoint(endpoint);
          } catch (error) {
            console.error(error instanceof Error ? error.message : String(error));
            process.exit(1);
          }
          NODE
            then
              echo "Required production endpoints advertise release $DEPLOY_SHA after $attempt attempt(s)."
              exit 0
            fi

            remaining=$((deadline - SECONDS))
            if (( remaining <= 0 )); then
              break
            fi
            sleep_for=5
            if (( sleep_for > remaining )); then
              sleep_for="$remaining"
            fi
            echo "Production release is not visible yet; retrying."
            sleep "$sleep_for"
          done

          echo "::error::required production endpoints did not converge to release $DEPLOY_SHA before the deadline."
          exit 1

      - name: Reauthorize current main after production proof
        id: final-main
        if: ${{ steps.production-proof.outcome == 'success' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.target-token.outputs.token }}
          SOURCE_GH_TOKEN: ${{ github.token }}
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          current_source_main_sha="$(
            GH_TOKEN="$SOURCE_GH_TOKEN" \
              timeout --foreground --signal=TERM --kill-after=5s \
              "${WRANGLER_READ_TIMEOUT_SECONDS}s" \
              gh api "repos/$SOURCE_REPOSITORY/commits/main" --jq '.sha'
          )"
          if [[ ! "$current_source_main_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::ClawSweeper main did not resolve to a full lowercase commit SHA."
            exit 1
          fi
          if [[ "$WORKFLOW_SHA" != "$current_source_main_sha" ]]; then
            echo "::error::ClawSweeper main advanced after production proof; rollback is required."
            exit 1
          fi
          current_main_sha="$(
            timeout --foreground --signal=TERM --kill-after=5s \
              "${WRANGLER_READ_TIMEOUT_SECONDS}s" \
              gh api "repos/$TARGET_REPOSITORY/commits/main" --jq '.sha'
          )"
          if [[ ! "$current_main_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::crawl-remote main did not resolve to a full lowercase commit SHA."
            exit 1
          fi
          if [[ "$DEPLOY_SHA" != "$current_main_sha" ]]; then
            echo "::error::crawl-remote main advanced after production proof; rollback is required."
            exit 1
          fi

      - name: Recover unresolved Worker deployment ownership
        id: ownership-recovery
        if: >-
          ${{
            always() &&
            steps.worker-deploy.outcome != 'skipped' &&
            (
              steps.deployment-state.outcome != 'success' ||
              steps.deployment-state.outputs.mutation_owned != 'true'
            )
          }}
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CRAWL_REMOTE_PRODUCTION_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_TOKEN_SHA256: ${{ vars.CRAWL_REMOTE_CLOUDFLARE_TOKEN_SHA256 }}
          DEPLOYED_VERSION_PATH: ${{ runner.temp }}/crawl-remote-deployed-version.txt
          OWNED_DEPLOYMENT_ID_PATH: ${{ runner.temp }}/crawl-remote-owned-deployment-id.txt
          PREVIOUS_VERSION_PATH: ${{ runner.temp }}/crawl-remote-previous-version.txt
          RECOVERY_DEPLOYMENT_RESPONSE: ${{ runner.temp }}/crawl-remote-recovered-deployment.json
          RELEASE_ROOT: ${{ runner.temp }}/crawl-remote-release
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          test -n "$CLOUDFLARE_API_TOKEN"
          test "$CLOUDFLARE_TOKEN_SHA256" = "$(printf '%s' "$CLOUDFLARE_API_TOKEN" | sha256sum | cut -d ' ' -f 1)"
          test -f "$PREVIOUS_VERSION_PATH"

          node --input-type=module <<'RECOVER_DEPLOYMENT_NODE'
          import { spawnSync } from 'node:child_process';
          import { appendFileSync, existsSync, readFileSync, writeFileSync } from 'node:fs';
          import { join } from 'node:path';

          const uuidPattern =
            /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
          const previousVersion = readFileSync(
            process.env.PREVIOUS_VERSION_PATH,
            'utf8',
          ).trim();
          const expectedMessage = process.env.DEPLOY_MESSAGE ?? '';
          const recoveryTimeoutSeconds = Number(
            process.env.DEPLOYMENT_RECOVERY_TIMEOUT_SECONDS,
          );
          const readTimeoutSeconds = Number(
            process.env.WRANGLER_READ_TIMEOUT_SECONDS,
          );
          const delayMilliseconds = Math.min(
            2000,
            Math.max(250, Number(process.env.DEPLOYMENT_STATUS_DELAY_SECONDS) * 1000),
          );
          const wrangler = join(
            process.env.TOOLCHAIN_ROOT,
            'node_modules',
            '.bin',
            'wrangler',
          );
          if (
            !uuidPattern.test(previousVersion) ||
            expectedMessage.length === 0 ||
            expectedMessage.length > 256 ||
            !Number.isSafeInteger(recoveryTimeoutSeconds) ||
            recoveryTimeoutSeconds < 1 ||
            recoveryTimeoutSeconds > 300 ||
            !Number.isSafeInteger(readTimeoutSeconds) ||
            readTimeoutSeconds < 1 ||
            readTimeoutSeconds > 120
          ) {
            throw new Error('Worker deployment recovery inputs are invalid');
          }

          const deadline = Date.now() + recoveryTimeoutSeconds * 1000;
          const version = spawnSync(wrangler, ['--version'], {
            encoding: 'utf8',
            env: process.env,
            maxBuffer: 1024 * 1024,
            timeout: Math.min(readTimeoutSeconds * 1000, deadline - Date.now()),
          });
          if (
            version.status !== 0 ||
            version.stdout.trim() !== process.env.WRANGLER_VERSION
          ) {
            throw new Error('trusted Wrangler version changed before ownership recovery');
          }

          while (Date.now() < deadline) {
            const remaining = deadline - Date.now();
            const status = spawnSync(
              wrangler,
              [
                'deployments',
                'status',
                '--name',
                'crawl-remote',
                '--json',
                '--cwd',
                process.env.RELEASE_ROOT,
                '--config',
                'wrangler.json',
              ],
              {
                encoding: 'utf8',
                env: process.env,
                maxBuffer: 1024 * 1024,
                timeout: Math.min(readTimeoutSeconds * 1000, remaining),
              },
            );
            if (status.status === 0) {
              if (Buffer.byteLength(status.stdout, 'utf8') > 1024 * 1024) {
                throw new Error('recovered Worker deployment response is oversized');
              }
              const deployment = JSON.parse(status.stdout);
              const deploymentID = String(deployment?.id ?? '');
              const versions = deployment?.versions;
              if (
                !uuidPattern.test(deploymentID) ||
                !Array.isArray(versions) ||
                versions.length < 1 ||
                versions.length > 8 ||
                versions.some(
                  (entry) =>
                    !uuidPattern.test(String(entry?.version_id ?? '')) ||
                    typeof entry?.percentage !== 'number' ||
                    !Number.isFinite(entry.percentage) ||
                    entry.percentage < 0 ||
                    entry.percentage > 100,
                ) ||
                new Set(versions.map((entry) => entry.version_id)).size !== versions.length ||
                Math.abs(
                  versions.reduce((total, entry) => total + entry.percentage, 0) - 100,
                ) > 0.000001
              ) {
                throw new Error('recovered Worker deployment distribution is invalid');
              }
              const previousEntry = versions.find(
                (entry) => entry.version_id === previousVersion,
              );
              const candidateEntries = versions.filter(
                (entry) => entry.version_id !== previousVersion,
              );
              if (candidateEntries.length > 0) {
                if (
                  candidateEntries.length !== 1 ||
                  (versions.length > 1 && !previousEntry)
                ) {
                  throw new Error(
                    'recovered Worker deployment is not one bounded transition from the previous version',
                  );
                }
                if (deployment?.annotations?.['workers/message'] !== expectedMessage) {
                  throw new Error(
                    'recovered Worker deployment is not owned by this workflow run',
                  );
                }
                const currentVersion = candidateEntries[0].version_id;
                writeFileSync(
                  process.env.RECOVERY_DEPLOYMENT_RESPONSE,
                  status.stdout,
                  { mode: 0o600 },
                );
                if (existsSync(process.env.DEPLOYED_VERSION_PATH)) {
                  const recorded = readFileSync(
                    process.env.DEPLOYED_VERSION_PATH,
                    'utf8',
                  ).trim();
                  if (recorded !== currentVersion) {
                    throw new Error(
                      'recovered Worker version conflicts with the prior ownership record',
                    );
                  }
                } else {
                  writeFileSync(
                    process.env.DEPLOYED_VERSION_PATH,
                    `${currentVersion}\n`,
                    { flag: 'wx', mode: 0o600 },
                  );
                }
                if (existsSync(process.env.OWNED_DEPLOYMENT_ID_PATH)) {
                  const recorded = readFileSync(
                    process.env.OWNED_DEPLOYMENT_ID_PATH,
                    'utf8',
                  ).trim();
                  if (recorded !== deploymentID) {
                    throw new Error(
                      'recovered Worker deployment conflicts with the prior ownership record',
                    );
                  }
                } else {
                  writeFileSync(
                    process.env.OWNED_DEPLOYMENT_ID_PATH,
                    `${deploymentID}\n`,
                    { flag: 'wx', mode: 0o600 },
                  );
                }
                appendFileSync(
                  process.env.GITHUB_OUTPUT,
                  `mutation_owned=true\ndeployed_version=${currentVersion}\ndeployment_id=${deploymentID}\n`,
                );
                process.exit(0);
              }
            }

            const waitMilliseconds = Math.min(
              delayMilliseconds,
              Math.max(0, deadline - Date.now()),
            );
            if (waitMilliseconds > 0) {
              Atomics.wait(
                new Int32Array(new SharedArrayBuffer(4)),
                0,
                0,
                waitMilliseconds,
              );
            }
          }

          throw new Error('unable to recover current Worker deployment ownership');
          RECOVER_DEPLOYMENT_NODE

      - name: Roll back failed Worker release
        id: rollback
        if: >-
          ${{
            always() &&
            (
              (
                steps.deployment-state.outcome == 'success' &&
                steps.deployment-state.outputs.mutation_owned == 'true'
              ) ||
              (
                steps.ownership-recovery.outcome == 'success' &&
                steps.ownership-recovery.outputs.mutation_owned == 'true'
              )
            ) &&
            (
              steps.worker-deploy.outcome != 'success' ||
              steps.deploy-receipt.outcome != 'success' ||
              steps.post-deploy-main.outcome != 'success' ||
              steps.production-proof.outcome != 'success' ||
              steps.final-main.outcome != 'success'
            )
          }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CRAWL_REMOTE_PRODUCTION_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_TOKEN_SHA256: ${{ vars.CRAWL_REMOTE_CLOUDFLARE_TOKEN_SHA256 }}
          CURRENT_DEPLOYMENT_RESPONSE: ${{ runner.temp }}/crawl-remote-current-deployment-before-rollback.json
          DEPLOYED_VERSION_PATH: ${{ runner.temp }}/crawl-remote-deployed-version.txt
          OWNED_DEPLOYMENT_ID_PATH: ${{ runner.temp }}/crawl-remote-owned-deployment-id.txt
          PREVIOUS_VERSION_PATH: ${{ runner.temp }}/crawl-remote-previous-version.txt
          RELEASE_ROOT: ${{ runner.temp }}/crawl-remote-release
          ROLLBACK_DEPLOYMENT_RESPONSE: ${{ runner.temp }}/crawl-remote-rollback-deployment.json
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          test -n "$CLOUDFLARE_API_TOKEN"
          test "$CLOUDFLARE_TOKEN_SHA256" = "$(printf '%s' "$CLOUDFLARE_API_TOKEN" | sha256sum | cut -d ' ' -f 1)"
          test -f "$DEPLOYED_VERSION_PATH"
          test -f "$OWNED_DEPLOYMENT_ID_PATH"
          test -f "$PREVIOUS_VERSION_PATH"
          deployed_version="$(tr -d '\r\n' < "$DEPLOYED_VERSION_PATH")"
          owned_deployment_id="$(tr -d '\r\n' < "$OWNED_DEPLOYMENT_ID_PATH")"
          previous_version="$(tr -d '\r\n' < "$PREVIOUS_VERSION_PATH")"
          test "$deployed_version" != ""
          test "$owned_deployment_id" != ""
          test "$previous_version" != ""
          test "$deployed_version" != "$previous_version"
          wrangler="$TOOLCHAIN_ROOT/node_modules/.bin/wrangler"
          test "$(
            timeout --foreground --signal=TERM --kill-after=5s \
              "${WRANGLER_READ_TIMEOUT_SECONDS}s" \
              "$wrangler" --version
          )" = "$WRANGLER_VERSION"

          timeout --foreground --signal=TERM --kill-after=5s \
            "${WRANGLER_READ_TIMEOUT_SECONDS}s" \
            "$wrangler" deployments status \
            --name crawl-remote \
            --json \
            --cwd "$RELEASE_ROOT" \
            --config wrangler.json \
            > "$CURRENT_DEPLOYMENT_RESPONSE"

          DEPLOYED_VERSION="$deployed_version" OWNED_DEPLOYMENT_ID="$owned_deployment_id" PREVIOUS_VERSION="$previous_version" node --input-type=module <<'ROLLBACK_FENCE_NODE'
          import { readFileSync } from 'node:fs';

          const uuidPattern =
            /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
          const deployedVersion = process.env.DEPLOYED_VERSION ?? '';
          const ownedDeploymentID = process.env.OWNED_DEPLOYMENT_ID ?? '';
          const previousVersion = process.env.PREVIOUS_VERSION ?? '';
          const expectedMessage = process.env.DEPLOY_MESSAGE ?? '';
          const deployment = JSON.parse(
            readFileSync(process.env.CURRENT_DEPLOYMENT_RESPONSE, 'utf8'),
          );
          const versions = deployment?.versions;
          if (
            !Array.isArray(versions) ||
            versions.length < 1 ||
            versions.length > 2 ||
            !uuidPattern.test(deployedVersion) ||
            !uuidPattern.test(ownedDeploymentID) ||
            !uuidPattern.test(previousVersion) ||
            deployedVersion === previousVersion ||
            expectedMessage.length === 0 ||
            expectedMessage.length > 256 ||
            versions.some(
              (entry) =>
                !uuidPattern.test(String(entry?.version_id ?? '')) ||
                typeof entry?.percentage !== 'number' ||
                !Number.isFinite(entry.percentage) ||
                entry.percentage < 0 ||
                entry.percentage > 100,
            ) ||
            new Set(versions.map((entry) => entry.version_id)).size !== versions.length ||
            Math.abs(
              versions.reduce((total, entry) => total + entry.percentage, 0) - 100,
            ) > 0.000001 ||
            deployment?.id !== ownedDeploymentID ||
            !versions.some((entry) => entry.version_id === deployedVersion) ||
            (
              versions.length === 1 &&
              versions[0].percentage !== 100
            ) ||
            (
              versions.length === 2 &&
              !versions.some((entry) => entry.version_id === previousVersion)
            ) ||
            deployment?.annotations?.['workers/message'] !== expectedMessage
          ) {
            throw new Error(
              'refusing rollback because this run no longer owns the current Worker deployment',
            );
          }
          ROLLBACK_FENCE_NODE

          timeout --foreground --signal=TERM --kill-after=5s \
            "${WRANGLER_ROLLBACK_TIMEOUT_SECONDS}s" \
            "$wrangler" rollback "$previous_version" \
            --name crawl-remote \
            --message "rollback failed main ${DEPLOY_SHA}" \
            --yes \
            --cwd "$RELEASE_ROOT" \
            --config wrangler.json

          timeout --foreground --signal=TERM --kill-after=5s \
            "${WRANGLER_READ_TIMEOUT_SECONDS}s" \
            "$wrangler" deployments status \
            --name crawl-remote \
            --json \
            --cwd "$RELEASE_ROOT" \
            --config wrangler.json \
            > "$ROLLBACK_DEPLOYMENT_RESPONSE"

          PREVIOUS_VERSION="$previous_version" node --input-type=module <<'ROLLBACK_NODE'
          import { readFileSync } from 'node:fs';

          const deployment = JSON.parse(
            readFileSync(process.env.ROLLBACK_DEPLOYMENT_RESPONSE, 'utf8'),
          );
          const versions = deployment?.versions;
          if (
            !Array.isArray(versions) ||
            versions.length !== 1 ||
            versions[0]?.version_id !== process.env.PREVIOUS_VERSION ||
            versions[0]?.percentage !== 100
          ) {
            throw new Error('Worker rollback did not restore the previous stable version');
          }
          console.log('Previous Worker version restored; D1 migrations remain applied.');
          ROLLBACK_NODE

      - name: Require successful release and proof
        if: ${{ always() }}
        env:
          DEPLOYMENT_STATE_OUTCOME: ${{ steps.deployment-state.outcome }}
          DEPLOY_RECEIPT_OUTCOME: ${{ steps.deploy-receipt.outcome }}
          FINAL_MAIN_OUTCOME: ${{ steps.final-main.outcome }}
          MUTATION_OWNED: ${{ steps.deployment-state.outputs.mutation_owned }}
          OWNERSHIP_RECOVERY_OUTCOME: ${{ steps.ownership-recovery.outcome }}
          RECOVERED_MUTATION_OWNED: ${{ steps.ownership-recovery.outputs.mutation_owned }}
          POST_DEPLOY_MAIN_OUTCOME: ${{ steps.post-deploy-main.outcome }}
          PREVIOUS_WORKER_PROBE_OUTCOME: ${{ steps.previous-worker-probe.outcome }}
          PRODUCTION_PROOF_OUTCOME: ${{ steps.production-proof.outcome }}
          ROLLBACK_OUTCOME: ${{ steps.rollback.outcome }}
          WORKER_DEPLOY_OUTCOME: ${{ steps.worker-deploy.outcome }}
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          if [[
            "$WORKER_DEPLOY_OUTCOME" == "success" &&
            "$DEPLOYMENT_STATE_OUTCOME" == "success" &&
            "$MUTATION_OWNED" == "true" &&
            "$DEPLOY_RECEIPT_OUTCOME" == "success" &&
            "$POST_DEPLOY_MAIN_OUTCOME" == "success" &&
            "$PRODUCTION_PROOF_OUTCOME" == "success" &&
            "$FINAL_MAIN_OUTCOME" == "success"
          ]]; then
            exit 0
          fi
          echo "::error::crawl-remote release failed or lost authorization; deployment state: $DEPLOYMENT_STATE_OUTCOME/$MUTATION_OWNED; ownership recovery: $OWNERSHIP_RECOVERY_OUTCOME/$RECOVERED_MUTATION_OWNED; deploy receipt: $DEPLOY_RECEIPT_OUTCOME; final main authorization: $FINAL_MAIN_OUTCOME; previous Worker probe: $PREVIOUS_WORKER_PROBE_OUTCOME; Worker rollback outcome: $ROLLBACK_OUTCOME. D1 migrations are not rolled back."
          exit 1
