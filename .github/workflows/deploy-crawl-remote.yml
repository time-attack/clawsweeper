name: Deploy crawl-remote production

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type "deploy crawl-remote production" to confirm
        required: true
        type: string
      main_sha:
        description: Exact current 40-character SHA of crawl-remote main
        required: true
        type: string
      observation_order_state:
        description: Expected Gitcrawl observation-order rollout state
        required: true
        default: dormant
        type: choice
        options:
          - dormant
          - active

permissions: {}

concurrency:
  group: deploy-crawl-remote-production
  cancel-in-progress: false

jobs:
  preflight:
    name: Build immutable crawl-remote release artifact
    if: >-
      ${{
        github.actor == 'vincentkoc' &&
        github.actor_id == '25068' &&
        github.triggering_actor == 'vincentkoc' &&
        github.run_attempt == 1 &&
        github.ref == 'refs/heads/main' &&
        inputs.confirmation == 'deploy crawl-remote production'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      artifact_name: ${{ steps.authorize.outputs.artifact_name }}
      deploy_sha: ${{ steps.authorize.outputs.deploy_sha }}
      observation_order_state: ${{ steps.authorize.outputs.observation_order_state }}
      receipt_name: ${{ steps.authorize.outputs.receipt_name }}
    env:
      CI: "true"
      CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093
      TARGET_REPOSITORY: openclaw/crawl-remote
    steps:
      - name: Create exact-repository read token
        id: target-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: crawl-remote
          permission-contents: read

      - name: Authorize immutable main release
        id: authorize
        env:
          GH_TOKEN: ${{ steps.target-token.outputs.token }}
          OBSERVATION_ORDER_STATE: ${{ inputs.observation_order_state }}
          REQUESTED_SHA: ${{ inputs.main_sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$REQUESTED_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::main_sha must be a full lowercase 40-character commit SHA."
            exit 1
          fi
          if [[ "$OBSERVATION_ORDER_STATE" != "dormant" && "$OBSERVATION_ORDER_STATE" != "active" ]]; then
            echo "::error::observation_order_state must be dormant or active."
            exit 1
          fi

          current_main_sha="$(
            gh api "repos/$TARGET_REPOSITORY/commits/main" --jq '.sha'
          )"
          if [[ ! "$current_main_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::crawl-remote main did not resolve to a full lowercase commit SHA."
            exit 1
          fi
          if [[ "$REQUESTED_SHA" != "$current_main_sha" ]]; then
            echo "::error::main_sha must exactly match the current crawl-remote main tip."
            exit 1
          fi

          artifact_name="crawl-remote-release-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${REQUESTED_SHA}-${OBSERVATION_ORDER_STATE}"
          receipt_name="crawl-remote-release-receipt-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${REQUESTED_SHA}-${OBSERVATION_ORDER_STATE}.json"
          {
            echo "artifact_name=$artifact_name"
            echo "deploy_sha=$REQUESTED_SHA"
            echo "observation_order_state=$OBSERVATION_ORDER_STATE"
            echo "receipt_name=$receipt_name"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout approved crawl-remote release
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: openclaw/crawl-remote
          ref: ${{ steps.authorize.outputs.deploy_sha }}
          token: ${{ steps.target-token.outputs.token }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify checked-out release SHA
        env:
          DEPLOY_SHA: ${{ steps.authorize.outputs.deploy_sha }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$DEPLOY_SHA"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build deploy bundle
        env:
          BUNDLE_DIR: ${{ runner.temp }}/crawl-remote-bundle
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$BUNDLE_DIR"
          npm run deploy -- --dry-run --outdir "$BUNDLE_DIR"

      - name: Package bounded release artifact
        env:
          ARTIFACT_NAME: ${{ steps.authorize.outputs.artifact_name }}
          ARTIFACT_ROOT: ${{ runner.temp }}/${{ steps.authorize.outputs.artifact_name }}
          BUNDLE_DIR: ${{ runner.temp }}/crawl-remote-bundle
          DEPLOY_SHA: ${{ steps.authorize.outputs.deploy_sha }}
          OBSERVATION_ORDER_STATE: ${{ steps.authorize.outputs.observation_order_state }}
          RECEIPT_NAME: ${{ steps.authorize.outputs.receipt_name }}
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { createHash } from 'node:crypto';
          import {
            copyFileSync,
            lstatSync,
            mkdirSync,
            readFileSync,
            readdirSync,
            rmSync,
            writeFileSync,
          } from 'node:fs';
          import { basename, join } from 'node:path';

          const {
            ARTIFACT_NAME: artifactName,
            ARTIFACT_ROOT: artifactRoot,
            BUNDLE_DIR: bundleDir,
            DEPLOY_SHA: targetSha,
            GITHUB_RUN_ATTEMPT: runAttemptText,
            GITHUB_RUN_ID: runId,
            OBSERVATION_ORDER_STATE: observationOrderState,
            RECEIPT_NAME: receiptName,
          } = process.env;
          const runAttempt = Number(runAttemptText);
          if (
            !artifactName ||
            !artifactRoot ||
            !bundleDir ||
            !/^[0-9a-f]{40}$/.test(targetSha ?? '') ||
            !/^[0-9]+$/.test(runId ?? '') ||
            !Number.isSafeInteger(runAttempt) ||
            runAttempt < 1 ||
            !['dormant', 'active'].includes(observationOrderState ?? '') ||
            !receiptName
          ) {
            throw new Error('invalid release artifact identity');
          }

          const expectedArtifactName =
            `crawl-remote-release-${runId}-${runAttempt}-${targetSha}-${observationOrderState}`;
          const expectedReceiptName =
            `crawl-remote-release-receipt-${runId}-${runAttempt}-${targetSha}-${observationOrderState}.json`;
          if (artifactName !== expectedArtifactName || receiptName !== expectedReceiptName) {
            throw new Error('release artifact identity is not bound to this run and SHA');
          }

          function assertRegularFile(path, label) {
            const stat = lstatSync(path);
            if (!stat.isFile() || stat.isSymbolicLink()) {
              throw new Error(`${label} must be one regular file`);
            }
            return stat;
          }

          function assertExactKeys(value, keys, label) {
            if (!value || typeof value !== 'object' || Array.isArray(value)) {
              throw new Error(`${label} must be an object`);
            }
            const actual = Object.keys(value).sort();
            const expected = [...keys].sort();
            if (JSON.stringify(actual) !== JSON.stringify(expected)) {
              throw new Error(`${label} has unexpected fields`);
            }
          }

          const sourceConfigPath = 'wrangler.jsonc';
          assertRegularFile(sourceConfigPath, sourceConfigPath);
          const sourceConfig = JSON.parse(readFileSync(sourceConfigPath, 'utf8'));
          assertExactKeys(
            sourceConfig,
            [
              '$schema',
              'compatibility_date',
              'd1_databases',
              'main',
              'name',
              'observability',
              'r2_buckets',
              'routes',
              'vars',
              'workers_dev',
            ],
            'source Wrangler config',
          );
          if (
            sourceConfig.name !== 'crawl-remote' ||
            sourceConfig.main !== 'src/index.ts' ||
            sourceConfig.workers_dev !== true ||
            sourceConfig.vars?.CRAWL_REMOTE_RELEASE_SHA !== undefined
          ) {
            throw new Error('source Wrangler config has an unexpected deployment identity');
          }
          if (
            JSON.stringify(sourceConfig.routes) !==
              JSON.stringify([
                {
                  pattern: 'reports.openclaw.ai/crawl-remote/*',
                  zone_name: 'openclaw.ai',
                },
              ]) ||
            JSON.stringify(sourceConfig.d1_databases) !==
              JSON.stringify([
                {
                  binding: 'DB',
                  database_name: 'crawl-remote',
                  database_id: '42baacd3-c917-400f-a12f-e0fada21e11f',
                },
              ]) ||
            JSON.stringify(sourceConfig.r2_buckets) !==
              JSON.stringify([
                {
                  binding: 'ARCHIVES',
                  bucket_name: 'crawl-remote-archives',
                },
              ])
          ) {
            throw new Error('source Wrangler config targets unexpected production resources');
          }

          const deploymentConfig = {
            name: sourceConfig.name,
            compatibility_date: sourceConfig.compatibility_date,
            workers_dev: sourceConfig.workers_dev,
            observability: sourceConfig.observability,
            vars: sourceConfig.vars,
            routes: sourceConfig.routes,
            d1_databases: sourceConfig.d1_databases,
            r2_buckets: sourceConfig.r2_buckets,
          };

          rmSync(artifactRoot, { recursive: true, force: true });
          mkdirSync(join(artifactRoot, 'bundle'), { recursive: true });
          mkdirSync(join(artifactRoot, 'migrations'), { recursive: true });

          const bundleEntries = readdirSync(bundleDir, { withFileTypes: true });
          const allowedBundleEntries = new Set(['README.md', 'index.js', 'index.js.map']);
          if (
            !bundleEntries.some((entry) => entry.name === 'index.js') ||
            bundleEntries.some(
              (entry) =>
                !allowedBundleEntries.has(entry.name) ||
                !entry.isFile() ||
                entry.isSymbolicLink(),
            )
          ) {
            throw new Error(
              'Wrangler dry-run output must contain index.js and only known metadata files',
            );
          }
          const bundleSource = join(bundleDir, 'index.js');
          const bundleStat = assertRegularFile(bundleSource, 'deploy bundle');
          if (bundleStat.size < 1 || bundleStat.size > 5 * 1024 * 1024) {
            throw new Error('deploy bundle is empty or exceeds 5 MiB');
          }
          copyFileSync(bundleSource, join(artifactRoot, 'bundle', 'index.js'));
          writeFileSync(
            join(artifactRoot, 'wrangler.json'),
            `${JSON.stringify(deploymentConfig, null, 2)}\n`,
          );

          const approvedMigrations = [
            {
              name: '0001_remote_archives.sql',
              sha256: 'bfb2ee56d01c7547a644f48b5c493cb9d971646ce331acc10c6bfd78d9b7d066',
            },
            {
              name: '0002_gitcrawl_enrichment_snapshots.sql',
              sha256: 'f984199bef0406ce91724e9ac83a97f41928b1560a51974deb841596f1e403e2',
            },
            {
              name: '0003_gitcrawl_snapshot_hardening.sql',
              sha256: '5daa6e14364f7bd4eba3cc5f61ec266b0559962e7345a65080cc9ef26b084e46',
            },
            {
              name: '0004_gitcrawl_snapshot_cutover.sql',
              sha256: 'e6c4a8edb300ebbf93a2e2449d180408f23be7eac1ef05733045b6ed496eb396',
            },
            {
              name: '0005_discrawl_cursor_state.sql',
              sha256: '5964adcb0807448d937fed38ac9588a1063bf4f490a82b54f15f0e700374ae0c',
            },
            {
              name: '0006_gitcrawl_observation_order.sql',
              sha256: 'a0ebfbb5c40c85df5eaba6772a01a68910fa5f1327d4701d25c5dfde16f77d1a',
            },
            {
              name: '0007_gitcrawl_snapshot_provenance.sql',
              sha256: 'bbe5d84db53e388127373e8e10f4d5adf8486dac49a09f302368635f95942eab',
            },
          ];
          const migrationEntries = readdirSync('migrations', { withFileTypes: true })
            .sort((a, b) => a.name.localeCompare(b.name));
          if (
            migrationEntries.length < 6 ||
            migrationEntries.length > approvedMigrations.length
          ) {
            throw new Error('release artifact migrations do not match the reviewed migration set');
          }
          for (const [index, entry] of migrationEntries.entries()) {
            if (!entry.isFile() || !/^[0-9]{4}_[a-z0-9_]+\.sql$/.test(entry.name)) {
              throw new Error(`invalid migration artifact entry: ${entry.name}`);
            }
            const approved = approvedMigrations[index];
            if (!approved || entry.name !== approved.name) {
              throw new Error(`migration ${entry.name} is not in the reviewed migration sequence`);
            }
            const source = join('migrations', entry.name);
            const stat = assertRegularFile(source, `migration ${entry.name}`);
            if (stat.size < 1 || stat.size > 1024 * 1024) {
              throw new Error(`migration ${entry.name} is empty or exceeds 1 MiB`);
            }
            const migrationSHA256 = createHash('sha256')
              .update(readFileSync(source))
              .digest('hex');
            if (migrationSHA256 !== approved.sha256) {
              throw new Error(`migration ${entry.name} differs from its reviewed content`);
            }
            copyFileSync(source, join(artifactRoot, 'migrations', basename(entry.name)));
          }

          const payloadPaths = [
            'bundle/index.js',
            'wrangler.json',
            ...migrationEntries.map((entry) => `migrations/${entry.name}`),
          ].sort();
          const files = payloadPaths.map((path) => {
            const content = readFileSync(join(artifactRoot, path));
            return {
              path,
              sha256: createHash('sha256').update(content).digest('hex'),
              bytes: content.byteLength,
            };
          });
          const manifest = {
            schema_version: 1,
            target_repository: 'openclaw/crawl-remote',
            target_sha: targetSha,
            run_id: runId,
            run_attempt: runAttempt,
            artifact_name: artifactName,
            observation_order_state: observationOrderState,
            receipt_name: receiptName,
            files,
          };
          writeFileSync(
            join(artifactRoot, 'manifest.json'),
            `${JSON.stringify(manifest, null, 2)}\n`,
          );
          NODE

      - name: Upload immutable release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.authorize.outputs.artifact_name }}
          path: ${{ runner.temp }}/${{ steps.authorize.outputs.artifact_name }}
          if-no-files-found: error
          include-hidden-files: false
          compression-level: 0
          overwrite: false
          retention-days: 31 # Covers GitHub's 30-day environment approval window.

  deploy:
    name: Migrate and deploy verified crawl-remote release
    needs: preflight
    permissions:
      contents: read
    if: >-
      ${{
        needs.preflight.result == 'success' &&
        github.actor == 'vincentkoc' &&
        github.actor_id == '25068' &&
        github.triggering_actor == 'vincentkoc' &&
        github.run_attempt == 1 &&
        github.ref == 'refs/heads/main' &&
        inputs.confirmation == 'deploy crawl-remote production'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: crawl-remote-production
      url: https://crawl-remote.services-91b.workers.dev
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    env:
      ARTIFACT_NAME: ${{ needs.preflight.outputs.artifact_name }}
      BASH_ENV: ""
      CI: "true"
      CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093
      CLOUDFLARE_ACCOUNT_ID: 91b59577e757131d68d55a471fe32aca
      DEPLOY_SHA: ${{ needs.preflight.outputs.deploy_sha }}
      ENV: ""
      NODE_OPTIONS: ""
      NPM_CONFIG_IGNORE_SCRIPTS: "true"
      NPM_CONFIG_USERCONFIG: /dev/null
      OBSERVATION_ORDER_STATE: ${{ needs.preflight.outputs.observation_order_state }}
      PRODUCTION_ROUTE_URL: https://reports.openclaw.ai/crawl-remote
      RECEIPT_NAME: ${{ needs.preflight.outputs.receipt_name }}
      TARGET_REPOSITORY: openclaw/crawl-remote
      TOOLCHAIN_ROOT: ${{ github.workspace }}/.github/deploy/crawl-remote-toolchain
      WORKERS_DEV_URL: https://crawl-remote.services-91b.workers.dev
      WRANGLER_VERSION: 4.107.1
    steps:
      - name: Verify central deployment authority
        env:
          CUSTOM_ROUTE_PROOF: ${{ vars.CRAWL_REMOTE_CUSTOM_ROUTE_PROOF }}
          DEPLOY_AUTHORITY: ${{ vars.CRAWL_REMOTE_DEPLOY_AUTHORITY }}
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          if [[ "$DEPLOY_AUTHORITY" != "clawsweeper-v1" ]]; then
            echo "::error::crawl-remote production authority is not assigned to ClawSweeper."
            exit 1
          fi
          if [[ "$CUSTOM_ROUTE_PROOF" != "disabled" && "$CUSTOM_ROUTE_PROOF" != "access-service-token" ]]; then
            echo "::error::CRAWL_REMOTE_CUSTOM_ROUTE_PROOF must be disabled or access-service-token."
            exit 1
          fi

      - name: Checkout trusted deployment toolchain
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: openclaw/clawsweeper
          ref: ${{ github.sha }}
          sparse-checkout: .github/deploy/crawl-remote-toolchain
          sparse-checkout-cone-mode: false
          fetch-depth: 1
          persist-credentials: false

      - name: Setup trusted Node runtime
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.18.0

      - name: Install exact trusted Wrangler
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          test -f "$TOOLCHAIN_ROOT/package.json"
          test -f "$TOOLCHAIN_ROOT/package-lock.json"
          (
            cd "$TOOLCHAIN_ROOT" || exit 1
            npm ci --ignore-scripts --no-audit --no-fund
            actual_version="$(./node_modules/.bin/wrangler --version)"
            test "$actual_version" = "$WRANGLER_VERSION"
          )

      - name: Download immutable release artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ needs.preflight.outputs.artifact_name }}
          path: ${{ runner.temp }}/crawl-remote-release

      - name: Verify bounded release artifact
        env:
          RECEIPT_PATH: ${{ runner.temp }}/${{ needs.preflight.outputs.receipt_name }}
          RELEASE_ROOT: ${{ runner.temp }}/crawl-remote-release
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          node --input-type=module <<'NODE'
          import { createHash } from 'node:crypto';
          import {
            lstatSync,
            readFileSync,
            readdirSync,
            writeFileSync,
          } from 'node:fs';
          import { join, relative, sep } from 'node:path';

          const {
            ARTIFACT_NAME: artifactName,
            DEPLOY_SHA: targetSha,
            GITHUB_RUN_ATTEMPT: runAttemptText,
            GITHUB_RUN_ID: runId,
            OBSERVATION_ORDER_STATE: observationOrderState,
            RECEIPT_NAME: receiptName,
            RECEIPT_PATH: receiptPath,
            RELEASE_ROOT: releaseRoot,
          } = process.env;
          const runAttempt = Number(runAttemptText);
          const expectedArtifactName =
            `crawl-remote-release-${runId}-${runAttempt}-${targetSha}-${observationOrderState}`;
          const expectedReceiptName =
            `crawl-remote-release-receipt-${runId}-${runAttempt}-${targetSha}-${observationOrderState}.json`;
          if (
            !releaseRoot ||
            !receiptPath ||
            artifactName !== expectedArtifactName ||
            receiptName !== expectedReceiptName ||
            !/^[0-9a-f]{40}$/.test(targetSha ?? '') ||
            !/^[0-9]+$/.test(runId ?? '') ||
            !Number.isSafeInteger(runAttempt) ||
            runAttempt < 1 ||
            !['dormant', 'active'].includes(observationOrderState ?? '')
          ) {
            throw new Error('downloaded artifact identity is not bound to this run and SHA');
          }

          function assertExactKeys(value, keys, label) {
            if (!value || typeof value !== 'object' || Array.isArray(value)) {
              throw new Error(`${label} must be an object`);
            }
            const actual = Object.keys(value).sort();
            const expected = [...keys].sort();
            if (JSON.stringify(actual) !== JSON.stringify(expected)) {
              throw new Error(`${label} has unexpected fields`);
            }
          }

          function walk(root, directory = root) {
            const files = [];
            for (const entry of readdirSync(directory, { withFileTypes: true })) {
              const absolute = join(directory, entry.name);
              const stat = lstatSync(absolute);
              if (stat.isSymbolicLink()) {
                throw new Error(`artifact contains symlink: ${relative(root, absolute)}`);
              }
              if (stat.isDirectory()) {
                files.push(...walk(root, absolute));
              } else if (stat.isFile()) {
                files.push(relative(root, absolute).split(sep).join('/'));
              } else {
                throw new Error(`artifact contains non-file entry: ${relative(root, absolute)}`);
              }
            }
            return files;
          }

          const manifestPath = join(releaseRoot, 'manifest.json');
          const rawManifest = readFileSync(manifestPath, 'utf8');
          if (Buffer.byteLength(rawManifest) > 128 * 1024) {
            throw new Error('release manifest exceeds 128 KiB');
          }
          const manifest = JSON.parse(rawManifest);
          assertExactKeys(
            manifest,
            [
              'artifact_name',
              'files',
              'observation_order_state',
              'receipt_name',
              'run_attempt',
              'run_id',
              'schema_version',
              'target_repository',
              'target_sha',
            ],
            'release manifest',
          );
          if (
            manifest.schema_version !== 1 ||
            manifest.target_repository !== 'openclaw/crawl-remote' ||
            manifest.target_sha !== targetSha ||
            manifest.run_id !== runId ||
            manifest.run_attempt !== runAttempt ||
            manifest.artifact_name !== artifactName ||
            manifest.observation_order_state !== observationOrderState ||
            manifest.receipt_name !== receiptName ||
            !Array.isArray(manifest.files) ||
            manifest.files.length < 3
          ) {
            throw new Error('release manifest identity is invalid');
          }

          const canonicalFiles = [];
          const declaredPaths = new Set();
          for (const file of manifest.files) {
            assertExactKeys(file, ['bytes', 'path', 'sha256'], 'release manifest file');
            if (
              typeof file.path !== 'string' ||
              (
                file.path !== 'bundle/index.js' &&
                file.path !== 'wrangler.json' &&
                !/^migrations\/[0-9]{4}_[a-z0-9_]+\.sql$/.test(file.path)
              ) ||
              !/^[0-9a-f]{64}$/.test(file.sha256) ||
              !Number.isSafeInteger(file.bytes) ||
              file.bytes < 1 ||
              declaredPaths.has(file.path)
            ) {
              throw new Error(`invalid release manifest path: ${String(file.path)}`);
            }
            const maxBytes = file.path === 'bundle/index.js'
              ? 5 * 1024 * 1024
              : file.path === 'wrangler.json'
                ? 128 * 1024
                : 1024 * 1024;
            if (file.bytes > maxBytes) {
              throw new Error(`release artifact file exceeds its size limit: ${file.path}`);
            }
            declaredPaths.add(file.path);
            canonicalFiles.push({
              path: file.path,
              sha256: file.sha256,
              bytes: file.bytes,
            });
          }
          canonicalFiles.sort((a, b) => a.path.localeCompare(b.path));
          if (
            canonicalFiles[0]?.path !== 'bundle/index.js' ||
            !declaredPaths.has('wrangler.json') ||
            !canonicalFiles.some((file) => file.path.startsWith('migrations/'))
          ) {
            throw new Error('release manifest is missing required payload files');
          }

          const canonicalManifest = {
            schema_version: 1,
            target_repository: 'openclaw/crawl-remote',
            target_sha: targetSha,
            run_id: runId,
            run_attempt: runAttempt,
            artifact_name: artifactName,
            observation_order_state: observationOrderState,
            receipt_name: receiptName,
            files: canonicalFiles,
          };
          if (rawManifest !== `${JSON.stringify(canonicalManifest, null, 2)}\n`) {
            throw new Error('release manifest is not canonical');
          }

          const actualPaths = walk(releaseRoot).sort();
          const expectedPaths = ['manifest.json', ...canonicalFiles.map((file) => file.path)].sort();
          if (JSON.stringify(actualPaths) !== JSON.stringify(expectedPaths)) {
            throw new Error('release artifact contains files outside the manifest allowlist');
          }

          let totalBytes = 0;
          for (const file of canonicalFiles) {
            const absolute = join(releaseRoot, file.path);
            const stat = lstatSync(absolute);
            if (!stat.isFile() || stat.isSymbolicLink() || stat.size !== file.bytes) {
              throw new Error(`release artifact size mismatch: ${file.path}`);
            }
            const content = readFileSync(absolute);
            const actualHash = createHash('sha256').update(content).digest('hex');
            if (actualHash !== file.sha256) {
              throw new Error(`release artifact hash mismatch: ${file.path}`);
            }
            totalBytes += file.bytes;
          }
          if (totalBytes > 10 * 1024 * 1024) {
            throw new Error('release artifact exceeds 10 MiB');
          }

          const configRaw = readFileSync(join(releaseRoot, 'wrangler.json'), 'utf8');
          const config = JSON.parse(configRaw);
          assertExactKeys(
            config,
            [
              'compatibility_date',
              'd1_databases',
              'name',
              'observability',
              'r2_buckets',
              'routes',
              'vars',
              'workers_dev',
            ],
            'deployment Wrangler config',
          );
          if (
            config.name !== 'crawl-remote' ||
            config.workers_dev !== true ||
            config.vars?.CRAWL_REMOTE_RELEASE_SHA !== undefined ||
            Object.hasOwn(config, 'main') ||
            Object.hasOwn(config, 'build')
          ) {
            throw new Error('deployment Wrangler config has unsafe execution fields');
          }
          if (
            JSON.stringify(config.routes) !==
              JSON.stringify([
                {
                  pattern: 'reports.openclaw.ai/crawl-remote/*',
                  zone_name: 'openclaw.ai',
                },
              ]) ||
            JSON.stringify(config.d1_databases) !==
              JSON.stringify([
                {
                  binding: 'DB',
                  database_name: 'crawl-remote',
                  database_id: '42baacd3-c917-400f-a12f-e0fada21e11f',
                },
              ]) ||
            JSON.stringify(config.r2_buckets) !==
              JSON.stringify([
                {
                  binding: 'ARCHIVES',
                  bucket_name: 'crawl-remote-archives',
                },
              ])
          ) {
            throw new Error('deployment Wrangler config targets unexpected resources');
          }

          const manifestSha256 = createHash('sha256').update(rawManifest).digest('hex');
          const receipt = {
            schema_version: 1,
            target_sha: targetSha,
            run_id: runId,
            run_attempt: runAttempt,
            artifact_name: artifactName,
            observation_order_state: observationOrderState,
            receipt_name: receiptName,
            manifest_sha256: manifestSha256,
          };
          try {
            lstatSync(receiptPath);
            throw new Error('release receipt already exists');
          } catch (error) {
            if (error?.code !== 'ENOENT') throw error;
          }
          writeFileSync(receiptPath, `${JSON.stringify(receipt, null, 2)}\n`, {
            flag: 'wx',
            mode: 0o600,
          });
          NODE

      - name: Create exact-repository reauthorization token
        id: target-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: crawl-remote
          permission-contents: read

      - name: Reauthorize current main before D1 mutation
        env:
          GH_TOKEN: ${{ steps.target-token.outputs.token }}
          RECEIPT_PATH: ${{ runner.temp }}/${{ needs.preflight.outputs.receipt_name }}
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          test -f "$RECEIPT_PATH"
          current_main_sha="$(
            gh api "repos/$TARGET_REPOSITORY/commits/main" --jq '.sha'
          )"
          if [[ ! "$current_main_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::crawl-remote main did not resolve to a full lowercase commit SHA."
            exit 1
          fi
          if [[ "$DEPLOY_SHA" != "$current_main_sha" ]]; then
            echo "::error::approved crawl-remote release is no longer the current main tip."
            exit 1
          fi

      - name: Apply and verify D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CRAWL_REMOTE_PRODUCTION_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_TOKEN_SHA256: ${{ vars.CRAWL_REMOTE_CLOUDFLARE_TOKEN_SHA256 }}
          CONSUMED_RECEIPT_PATH: ${{ runner.temp }}/${{ needs.preflight.outputs.receipt_name }}.consumed
          FENCE_RESPONSE: ${{ runner.temp }}/crawl-remote-observation-fence.json
          PREVIOUS_DEPLOYMENT_RESPONSE: ${{ runner.temp }}/crawl-remote-previous-deployment.json
          PREVIOUS_VERSION_PATH: ${{ runner.temp }}/crawl-remote-previous-version.txt
          PRE_FENCE_ERROR: ${{ runner.temp }}/crawl-remote-observation-fence-precheck.err
          PRE_FENCE_RESPONSE: ${{ runner.temp }}/crawl-remote-observation-fence-precheck.json
          RECEIPT_PATH: ${{ runner.temp }}/${{ needs.preflight.outputs.receipt_name }}
          RELEASE_ROOT: ${{ runner.temp }}/crawl-remote-release
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          test -n "$CLOUDFLARE_API_TOKEN"
          test "$CLOUDFLARE_TOKEN_SHA256" = "$(printf '%s' "$CLOUDFLARE_API_TOKEN" | sha256sum | cut -d ' ' -f 1)"
          wrangler="$TOOLCHAIN_ROOT/node_modules/.bin/wrangler"
          test "$("$wrangler" --version)" = "$WRANGLER_VERSION"

          test -f "$RECEIPT_PATH"
          test ! -e "$CONSUMED_RECEIPT_PATH"
          mv -- "$RECEIPT_PATH" "$CONSUMED_RECEIPT_PATH"

          "$wrangler" deployments status \
            --name crawl-remote \
            --json \
            --cwd "$RELEASE_ROOT" \
            --config wrangler.json \
            > "$PREVIOUS_DEPLOYMENT_RESPONSE"

          node --input-type=module <<'PREVIOUS_VERSION_NODE'
          import { readFileSync, writeFileSync } from 'node:fs';

          const deployment = JSON.parse(
            readFileSync(process.env.PREVIOUS_DEPLOYMENT_RESPONSE, 'utf8'),
          );
          const versions = deployment?.versions;
          if (
            !Array.isArray(versions) ||
            versions.length !== 1 ||
            versions[0]?.percentage !== 100 ||
            !/^[0-9a-f-]{36}$/i.test(String(versions[0]?.version_id ?? ''))
          ) {
            throw new Error('current Worker deployment is not one stable rollback version');
          }
          writeFileSync(
            process.env.PREVIOUS_VERSION_PATH,
            `${versions[0].version_id}\n`,
            { mode: 0o600 },
          );
          PREVIOUS_VERSION_NODE

          set +e
          "$wrangler" d1 execute crawl-remote \
            --remote \
            --json \
            --cwd "$RELEASE_ROOT" \
            --config wrangler.json \
            --command \
            "select capability, migration_ready, cutover_enabled, activated_at from remote_capability_fences where capability = 'gitcrawl.observation-order.v1'" \
            > "$PRE_FENCE_RESPONSE" 2> "$PRE_FENCE_ERROR"
          pre_fence_status=$?
          set -e
          test "$(wc -c < "$PRE_FENCE_RESPONSE")" -le 1048576
          test "$(wc -c < "$PRE_FENCE_ERROR")" -le 1048576

          PRE_FENCE_STATUS="$pre_fence_status" node --input-type=module <<'PRE_FENCE_NODE'
          import { readFileSync } from 'node:fs';
          import { join } from 'node:path';

          const expectedState = process.env.OBSERVATION_ORDER_STATE;
          if (!['dormant', 'active'].includes(expectedState)) {
            throw new Error('observation-order pre-migration state is invalid');
          }

          const statusText = process.env.PRE_FENCE_STATUS ?? '';
          if (!/^(0|[1-9][0-9]*)$/.test(statusText)) {
            throw new Error('observation-order pre-migration query status is invalid');
          }
          const status = Number(statusText);
          const response = readFileSync(process.env.PRE_FENCE_RESPONSE, 'utf8');
          const errorOutput = readFileSync(process.env.PRE_FENCE_ERROR, 'utf8');

          if (status !== 0) {
            let failure;
            try {
              failure = JSON.parse(response);
            } catch {
              throw new Error('observation-order pre-migration query failed');
            }
            const failureKeys =
              failure && typeof failure === 'object' && !Array.isArray(failure)
                ? Object.keys(failure)
                : [];
            const apiError = failure?.error;
            const errorKeys =
              apiError && typeof apiError === 'object' && !Array.isArray(apiError)
                ? Object.keys(apiError).sort()
                : [];
            const config = JSON.parse(
              readFileSync(join(process.env.RELEASE_ROOT, 'wrangler.json'), 'utf8'),
            );
            const database = Array.isArray(config.d1_databases)
              ? config.d1_databases.find(
                  (candidate) => candidate?.database_name === 'crawl-remote',
                )
              : undefined;
            const expectedAccountId = process.env.CLOUDFLARE_ACCOUNT_ID;
            const expectedDatabaseId = database?.database_id;
            const expectedText =
              `A request to the Cloudflare API (/accounts/${expectedAccountId}/d1/database/${expectedDatabaseId}/query) failed.`;
            const missingTableNotes = new Set([
              'no such table: remote_capability_fences: SQLITE_ERROR [code: 7500]',
              'D1_ERROR: no such table: remote_capability_fences: SQLITE_ERROR [code: 7500]',
            ]);
            const notes = apiError?.notes;
            if (
              errorOutput.length !== 0 ||
              JSON.stringify(failureKeys) !== JSON.stringify(['error']) ||
              JSON.stringify(errorKeys) !==
                JSON.stringify(['accountTag', 'code', 'kind', 'name', 'notes', 'text']) ||
              typeof expectedAccountId !== 'string' ||
              !/^[0-9a-f]{32}$/.test(expectedAccountId) ||
              typeof expectedDatabaseId !== 'string' ||
              !/^[0-9a-f-]{36}$/.test(expectedDatabaseId) ||
              apiError.text !== expectedText ||
              apiError.name !== 'APIError' ||
              apiError.kind !== 'error' ||
              apiError.code !== 7500 ||
              apiError.accountTag !== expectedAccountId ||
              !Array.isArray(notes) ||
              notes.length !== 1 ||
              JSON.stringify(Object.keys(notes[0] ?? {})) !== JSON.stringify(['text']) ||
              !missingTableNotes.has(notes[0].text)
            ) {
              throw new Error('observation-order pre-migration query failed');
            }
            if (expectedState !== 'dormant') {
              throw new Error(
                'observation-order fence table is missing but active state was selected',
              );
            }
            console.log('Observation-order fence table is absent before dormant bootstrap.');
            process.exit(0);
          }

          const executions = JSON.parse(response);
          if (
            !Array.isArray(executions) ||
            executions.length !== 1 ||
            executions[0]?.success !== true
          ) {
            throw new Error(
              'observation-order pre-migration query did not succeed exactly once',
            );
          }

          const rows = executions[0].results;
          if (!Array.isArray(rows) || rows.length !== 1) {
            throw new Error(
              'observation-order pre-migration query did not return exactly one row',
            );
          }

          const fence = rows[0];
          const expectedCutover = expectedState === 'active' ? 1 : 0;
          if (
            fence?.capability !== 'gitcrawl.observation-order.v1' ||
            fence?.migration_ready !== 1 ||
            fence?.cutover_enabled !== expectedCutover ||
            (
              expectedState === 'active' &&
              (
                typeof fence?.activated_at !== 'string' ||
                fence.activated_at.trim().length === 0
              )
            ) ||
            (expectedState === 'dormant' && fence?.activated_at !== '')
          ) {
            throw new Error(
              `observation-order fence does not match selected ${expectedState} state before migration`,
            );
          }

          console.log(`Observation-order fence matches selected ${expectedState} state.`);
          PRE_FENCE_NODE

          "$wrangler" d1 migrations apply crawl-remote \
            --remote \
            --cwd "$RELEASE_ROOT" \
            --config wrangler.json

          "$wrangler" d1 execute crawl-remote \
            --remote \
            --json \
            --cwd "$RELEASE_ROOT" \
            --config wrangler.json \
            --command \
            "select capability, migration_ready, cutover_enabled, activated_at from remote_capability_fences where capability = 'gitcrawl.observation-order.v1'" \
            > "$FENCE_RESPONSE"

          node --input-type=module <<'POST_FENCE_NODE'
          import { readFileSync } from 'node:fs';

          const executions = JSON.parse(
            readFileSync(process.env.FENCE_RESPONSE, 'utf8'),
          );
          if (
            !Array.isArray(executions) ||
            executions.length !== 1 ||
            executions[0]?.success !== true
          ) {
            throw new Error('observation-order fence query did not succeed exactly once');
          }

          const rows = executions[0].results;
          if (!Array.isArray(rows) || rows.length !== 1) {
            throw new Error('observation-order fence query did not return exactly one row');
          }

          const fence = rows[0];
          const expectedState = process.env.OBSERVATION_ORDER_STATE;
          const expectedCutover = expectedState === 'active' ? 1 : 0;
          if (
            !['dormant', 'active'].includes(expectedState) ||
            fence?.capability !== 'gitcrawl.observation-order.v1' ||
            fence?.migration_ready !== 1 ||
            fence?.cutover_enabled !== expectedCutover ||
            (
              expectedState === 'active' &&
              (
                typeof fence?.activated_at !== 'string' ||
                fence.activated_at.trim().length === 0
              )
            ) ||
            (expectedState === 'dormant' && fence?.activated_at !== '')
          ) {
            throw new Error(
              `observation-order migration does not match expected ${expectedState} state`,
            );
          }

          console.log(`Observation-order migration is ready and ${expectedState}.`);
          POST_FENCE_NODE

      - name: Reauthorize current main immediately before Worker deploy
        env:
          CONSUMED_RECEIPT_PATH: ${{ runner.temp }}/${{ needs.preflight.outputs.receipt_name }}.consumed
          GH_TOKEN: ${{ steps.target-token.outputs.token }}
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          test -f "$CONSUMED_RECEIPT_PATH"
          current_main_sha="$(
            gh api "repos/$TARGET_REPOSITORY/commits/main" --jq '.sha'
          )"
          if [[ ! "$current_main_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::crawl-remote main did not resolve to a full lowercase commit SHA."
            exit 1
          fi
          if [[ "$DEPLOY_SHA" != "$current_main_sha" ]]; then
            echo "::error::approved crawl-remote release is no longer the current main tip."
            exit 1
          fi

      - name: Deploy verified Worker bundle
        id: worker-deploy
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CRAWL_REMOTE_PRODUCTION_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_TOKEN_SHA256: ${{ vars.CRAWL_REMOTE_CLOUDFLARE_TOKEN_SHA256 }}
          CONSUMED_RECEIPT_PATH: ${{ runner.temp }}/${{ needs.preflight.outputs.receipt_name }}.consumed
          RELEASE_ROOT: ${{ runner.temp }}/crawl-remote-release
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          test -n "$CLOUDFLARE_API_TOKEN"
          test "$CLOUDFLARE_TOKEN_SHA256" = "$(printf '%s' "$CLOUDFLARE_API_TOKEN" | sha256sum | cut -d ' ' -f 1)"
          test -f "$CONSUMED_RECEIPT_PATH"
          wrangler="$TOOLCHAIN_ROOT/node_modules/.bin/wrangler"
          test "$("$wrangler" --version)" = "$WRANGLER_VERSION"

          "$wrangler" deploy bundle/index.js \
            --no-bundle \
            --strict \
            --cwd "$RELEASE_ROOT" \
            --config wrangler.json \
            --var "CRAWL_REMOTE_RELEASE_SHA:$DEPLOY_SHA" \
            --message "main ${DEPLOY_SHA}"

      - name: Reauthorize current main after Worker deploy
        id: post-deploy-main
        if: ${{ steps.worker-deploy.outcome == 'success' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.target-token.outputs.token }}
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          current_main_sha="$(
            gh api "repos/$TARGET_REPOSITORY/commits/main" --jq '.sha'
          )"
          if [[ ! "$current_main_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::crawl-remote main did not resolve to a full lowercase commit SHA."
            exit 1
          fi
          if [[ "$DEPLOY_SHA" != "$current_main_sha" ]]; then
            echo "::error::crawl-remote main advanced during deployment; rollback is required."
            exit 1
          fi

      - name: Poll exact production release
        id: production-proof
        if: >-
          ${{
            steps.worker-deploy.outcome == 'success' &&
            steps.post-deploy-main.outcome == 'success'
          }}
        continue-on-error: true
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CRAWL_REMOTE_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CRAWL_REMOTE_ACCESS_CLIENT_SECRET }}
          CUSTOM_ROUTE_PROOF: ${{ vars.CRAWL_REMOTE_CUSTOM_ROUTE_PROOF }}
          PRODUCTION_ROUTE_CONTRACT_RESPONSE: ${{ runner.temp }}/crawl-remote-production-route-contract.json
          PRODUCTION_ROUTE_HEALTH_RESPONSE: ${{ runner.temp }}/crawl-remote-production-route-health.json
          WORKERS_DEV_CONTRACT_RESPONSE: ${{ runner.temp }}/crawl-remote-workers-dev-contract.json
          WORKERS_DEV_HEALTH_RESPONSE: ${{ runner.temp }}/crawl-remote-workers-dev-health.json
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          deadline=$((SECONDS + 180))
          attempt=0

          fetch_endpoint() {
            local url="$1"
            local output="$2"
            local access_mode="${3:-public}"
            local remaining=$((deadline - SECONDS))
            local timeout
            local -a access_headers=()

            if (( remaining <= 0 )); then
              return 1
            fi
            if [[ "$access_mode" == "access-service-token" ]]; then
              if [[ -z "$CF_ACCESS_CLIENT_ID" || -z "$CF_ACCESS_CLIENT_SECRET" ]]; then
                echo "::error::custom-route proof requires both Cloudflare Access service-token secrets."
                return 1
              fi
              access_headers=(
                --header "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID"
                --header "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET"
              )
            elif [[ "$access_mode" != "public" ]]; then
              echo "::error::unsupported endpoint access mode: $access_mode"
              return 1
            fi
            timeout="$remaining"
            if (( timeout > 10 )); then
              timeout=10
            fi

            curl --fail-with-body --silent --show-error \
              --connect-timeout "$timeout" \
              --max-time "$timeout" \
              --max-filesize 1048576 \
              --header "cache-control: no-cache" \
              "${access_headers[@]}" \
              --output "$output" \
              "$url"
          }

          if [[ "$CUSTOM_ROUTE_PROOF" == "access-service-token" ]]; then
            test -n "$CF_ACCESS_CLIENT_ID"
            test -n "$CF_ACCESS_CLIENT_SECRET"
          fi

          while (( SECONDS < deadline )); do
            attempt=$((attempt + 1))
            rm -f \
              "$WORKERS_DEV_HEALTH_RESPONSE" \
              "$WORKERS_DEV_CONTRACT_RESPONSE" \
              "$PRODUCTION_ROUTE_HEALTH_RESPONSE" \
              "$PRODUCTION_ROUTE_CONTRACT_RESPONSE"
            if fetch_endpoint "$WORKERS_DEV_URL/health" "$WORKERS_DEV_HEALTH_RESPONSE" &&
              fetch_endpoint "$WORKERS_DEV_URL/v1/contract" "$WORKERS_DEV_CONTRACT_RESPONSE" &&
              (
                [[ "$CUSTOM_ROUTE_PROOF" == "disabled" ]] ||
                (
                  fetch_endpoint "$PRODUCTION_ROUTE_URL/health" "$PRODUCTION_ROUTE_HEALTH_RESPONSE" "access-service-token" &&
                  fetch_endpoint "$PRODUCTION_ROUTE_URL/v1/contract" "$PRODUCTION_ROUTE_CONTRACT_RESPONSE" "access-service-token"
                )
              ) &&
              node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';

          try {
            const expectedSha = process.env.DEPLOY_SHA;
            const expectedObservationOrderState = process.env.OBSERVATION_ORDER_STATE;
            const observationFenceNote =
              'Gitcrawl observation ordering requires the D1 migration, explicit publisher capability, and operator cutover fence before it is advertised or activated.';
            const endpoints = [
              {
                label: 'workers.dev',
                healthPath: process.env.WORKERS_DEV_HEALTH_RESPONSE,
                contractPath: process.env.WORKERS_DEV_CONTRACT_RESPONSE,
              },
            ];
            if (process.env.CUSTOM_ROUTE_PROOF === 'access-service-token') {
              endpoints.push({
                label: 'production route',
                healthPath: process.env.PRODUCTION_ROUTE_HEALTH_RESPONSE,
                contractPath: process.env.PRODUCTION_ROUTE_CONTRACT_RESPONSE,
              });
            } else if (process.env.CUSTOM_ROUTE_PROOF !== 'disabled') {
              throw new Error('custom-route proof mode is invalid');
            }

            function validateEndpoint({ label, healthPath, contractPath }) {
              const health = JSON.parse(readFileSync(healthPath, 'utf8'));
              if (health.ok !== true || health.release_sha !== expectedSha) {
                throw new Error(`${label} health response does not identify the approved release`);
              }

              const contract = JSON.parse(readFileSync(contractPath, 'utf8'));
              if (
                contract.service !== 'crawl-remote' ||
                contract.protocol_version !== 'v1' ||
                contract.release_sha !== expectedSha
              ) {
                throw new Error(`${label} contract does not identify the approved release`);
              }

              const notes = Array.isArray(contract.notes) ? contract.notes : [];
              if (!notes.includes(observationFenceNote)) {
                throw new Error(`${label} contract does not identify the observation-order fence`);
              }

              const apps = Array.isArray(contract.apps) ? contract.apps : [];
              const gitcrawl = apps.find((app) => app?.app === 'gitcrawl');
              if (!gitcrawl) {
                throw new Error(`${label} contract is missing the Gitcrawl app`);
              }
              if (!Array.isArray(gitcrawl.capabilities)) {
                throw new Error(`${label} Gitcrawl capabilities are malformed`);
              }
              const observationOrderActive = gitcrawl.capabilities.includes(
                'gitcrawl.observation-order.v1',
              );
              if (
                !['dormant', 'active'].includes(expectedObservationOrderState) ||
                (
                  expectedObservationOrderState === 'active' &&
                  !observationOrderActive
                ) ||
                (
                  expectedObservationOrderState === 'dormant' &&
                  observationOrderActive
                )
              ) {
                throw new Error(
                  `${label} contract does not match expected ${expectedObservationOrderState} observation-order state`,
                );
              }

              const routes = Array.isArray(contract.routes) ? contract.routes : [];
              for (const path of ['/health', '/v1/contract']) {
                if (!routes.some((route) => route?.method === 'GET' && route?.path === path)) {
                  throw new Error(`${label} contract is missing GET ${path}`);
                }
              }
            }

            for (const endpoint of endpoints) validateEndpoint(endpoint);
          } catch (error) {
            console.error(error instanceof Error ? error.message : String(error));
            process.exit(1);
          }
          NODE
            then
              echo "Required production endpoints advertise release $DEPLOY_SHA after $attempt attempt(s)."
              exit 0
            fi

            remaining=$((deadline - SECONDS))
            if (( remaining <= 0 )); then
              break
            fi
            sleep_for=5
            if (( sleep_for > remaining )); then
              sleep_for="$remaining"
            fi
            echo "Production release is not visible yet; retrying."
            sleep "$sleep_for"
          done

          echo "::error::required production endpoints did not converge to release $DEPLOY_SHA before the deadline."
          exit 1

      - name: Roll back failed Worker release
        id: rollback
        if: >-
          ${{
            always() &&
            steps.worker-deploy.outcome != 'skipped' &&
            (
              steps.worker-deploy.outcome != 'success' ||
              steps.post-deploy-main.outcome != 'success' ||
              steps.production-proof.outcome != 'success'
            )
          }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CRAWL_REMOTE_PRODUCTION_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_TOKEN_SHA256: ${{ vars.CRAWL_REMOTE_CLOUDFLARE_TOKEN_SHA256 }}
          PREVIOUS_DEPLOYMENT_RESPONSE: ${{ runner.temp }}/crawl-remote-rollback-deployment.json
          PREVIOUS_VERSION_PATH: ${{ runner.temp }}/crawl-remote-previous-version.txt
          RELEASE_ROOT: ${{ runner.temp }}/crawl-remote-release
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          test -n "$CLOUDFLARE_API_TOKEN"
          test "$CLOUDFLARE_TOKEN_SHA256" = "$(printf '%s' "$CLOUDFLARE_API_TOKEN" | sha256sum | cut -d ' ' -f 1)"
          test -f "$PREVIOUS_VERSION_PATH"
          previous_version="$(tr -d '\r\n' < "$PREVIOUS_VERSION_PATH")"
          test "$previous_version" != ""
          wrangler="$TOOLCHAIN_ROOT/node_modules/.bin/wrangler"
          test "$("$wrangler" --version)" = "$WRANGLER_VERSION"

          "$wrangler" rollback "$previous_version" \
            --name crawl-remote \
            --message "rollback failed main ${DEPLOY_SHA}" \
            --yes \
            --cwd "$RELEASE_ROOT" \
            --config wrangler.json

          "$wrangler" deployments status \
            --name crawl-remote \
            --json \
            --cwd "$RELEASE_ROOT" \
            --config wrangler.json \
            > "$PREVIOUS_DEPLOYMENT_RESPONSE"

          PREVIOUS_VERSION="$previous_version" node --input-type=module <<'ROLLBACK_NODE'
          import { readFileSync } from 'node:fs';

          const deployment = JSON.parse(
            readFileSync(process.env.PREVIOUS_DEPLOYMENT_RESPONSE, 'utf8'),
          );
          const versions = deployment?.versions;
          if (
            !Array.isArray(versions) ||
            versions.length !== 1 ||
            versions[0]?.version_id !== process.env.PREVIOUS_VERSION ||
            versions[0]?.percentage !== 100
          ) {
            throw new Error('Worker rollback did not restore the previous stable version');
          }
          ROLLBACK_NODE

      - name: Require successful release and proof
        if: ${{ always() }}
        env:
          POST_DEPLOY_MAIN_OUTCOME: ${{ steps.post-deploy-main.outcome }}
          PRODUCTION_PROOF_OUTCOME: ${{ steps.production-proof.outcome }}
          ROLLBACK_OUTCOME: ${{ steps.rollback.outcome }}
          WORKER_DEPLOY_OUTCOME: ${{ steps.worker-deploy.outcome }}
        run: |
          unset BASH_ENV ENV CDPATH GLOBIGNORE NODE_OPTIONS
          if [[
            "$WORKER_DEPLOY_OUTCOME" == "success" &&
            "$POST_DEPLOY_MAIN_OUTCOME" == "success" &&
            "$PRODUCTION_PROOF_OUTCOME" == "success"
          ]]; then
            exit 0
          fi
          echo "::error::crawl-remote release failed or lost authorization; rollback outcome: $ROLLBACK_OUTCOME."
          exit 1
