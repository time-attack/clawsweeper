name: repair self-heal failed clusters

on:
  workflow_dispatch:
    inputs:
      execute:
        description: "Dispatch retry jobs instead of printing candidates"
        required: true
        default: false
        type: boolean
      max_jobs:
        description: "Maximum failed latest jobs to retry"
        required: true
        default: "5"
        type: string
      max_age_hours:
        description: "Only retry failed latest jobs published within this age"
        required: true
        default: "6"
        type: string
      runner:
        description: "Runner label for retried cluster workers"
        required: true
        default: blacksmith-4vcpu-ubuntu-2404
        type: string
      execution_runner:
        description: "Runner label for retried fix/apply execution work"
        required: true
        default: blacksmith-16vcpu-ubuntu-2404
        type: string
  schedule:
    - cron: "17,47 * * * *"

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093

concurrency:
  group: clawsweeper-repair-self-heal
  cancel-in-progress: false

jobs:
  self-heal:
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner || vars.CLAWSWEEPER_WORKER_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}
    timeout-minutes: 20
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ vars.CLAWSWEEPER_ALLOWED_OWNER || github.repository_owner }}
          permission-actions: write
          permission-contents: write

      - uses: actions/checkout@v5
        with:
          filter: blob:none
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Create state token
        id: state-token
        uses: ./.github/actions/create-state-token
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}

      - uses: ./.github/actions/setup-state
        with:
          token: ${{ steps.state-token.outputs.token }}

      - uses: ./.github/actions/setup-pnpm
        with:
          build-script: build:repair

      - name: Self-heal failed cluster runs
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          CLAWSWEEPER_ALLOW_EXECUTE: ${{ vars.CLAWSWEEPER_ALLOW_EXECUTE || '0' }}
          CLAWSWEEPER_ALLOW_FIX_PR: ${{ vars.CLAWSWEEPER_ALLOW_FIX_PR || '0' }}
        run: |
          execute="false"
          max_jobs="${{ github.event_name == 'workflow_dispatch' && inputs.max_jobs || vars.CLAWSWEEPER_SELF_HEAL_MAX_JOBS || '5' }}"
          max_age_hours="${{ github.event_name == 'workflow_dispatch' && inputs.max_age_hours || vars.CLAWSWEEPER_SELF_HEAL_MAX_AGE_HOURS || '6' }}"
          runner="${{ github.event_name == 'workflow_dispatch' && inputs.runner || vars.CLAWSWEEPER_WORKER_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}"
          execution_runner="${{ github.event_name == 'workflow_dispatch' && inputs.execution_runner || vars.CLAWSWEEPER_EXECUTION_RUNNER || 'blacksmith-16vcpu-ubuntu-2404' }}"
          if { [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.execute }}" = "true" ]; } ||
             { [ "${{ github.event_name }}" = "schedule" ] && [ "${{ vars.CLAWSWEEPER_SELF_HEAL_EXECUTE || '0' }}" = "1" ]; }; then
            execute="true"
          fi

          args=(--max-jobs "$max_jobs" --max-age-hours "$max_age_hours" --runner "$runner" --execution-runner "$execution_runner" --wait-for-capacity)
          if [ "$execute" = "true" ]; then
            args+=(--execute)
          fi
          pnpm run repair:self-heal -- "${args[@]}"

      - name: Commit self-heal ledger
        if: ${{ always() && ((github.event_name == 'workflow_dispatch' && inputs.execute) || (github.event_name == 'schedule' && vars.CLAWSWEEPER_SELF_HEAL_EXECUTE == '1')) }}
        run: |
          if [ ! -f results/self-heal.json ]; then
            echo "No self-heal ledger"
            exit 0
          fi
          pnpm run repair:publish-main -- \
            --message "chore: record self-heal dispatch" \
            --path results/self-heal.json \
            --rebase-strategy theirs
