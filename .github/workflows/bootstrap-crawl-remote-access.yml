name: Bootstrap crawl-remote Access

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type: bootstrap crawl-remote access"
        required: true
        type: string
      rotate_service_token:
        description: "Replace an existing crawl-remote Access service token"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: bootstrap-crawl-remote-access
  cancel-in-progress: false

env:
  CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093

jobs:
  bootstrap:
    name: Reconcile Cloudflare Access and GitHub configuration
    if: >-
      ${{
        github.actor == 'vincentkoc' &&
        github.actor_id == '25068' &&
        github.triggering_actor == 'vincentkoc' &&
        github.run_attempt == 1 &&
        github.ref == 'refs/heads/main' &&
        inputs.confirmation == 'bootstrap crawl-remote access'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out trusted bootstrap
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Reauthorize current ClawSweeper main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current_main_sha="$(gh api "repos/$GITHUB_REPOSITORY/commits/main" --jq '.sha')"
          if [[ ! "$current_main_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::ClawSweeper main did not resolve to a full commit SHA."
            exit 1
          fi
          if [[ "$GITHUB_SHA" != "$current_main_sha" ]]; then
            echo "::error::The dispatched bootstrap is no longer current ClawSweeper main."
            exit 1
          fi

      - name: Verify generation-slot consumer contract
        run: node scripts/bootstrap-crawl-remote-access.mjs --check-consumer-contract

      - name: Reauthorize current main before token minting
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current_main_sha="$(gh api "repos/$GITHUB_REPOSITORY/commits/main" --jq '.sha')"
          if [[ "$GITHUB_SHA" != "$current_main_sha" ]]; then
            echo "::error::ClawSweeper main advanced after consumer-contract verification."
            exit 1
          fi

      - name: Create ClawSweeper bootstrap token
        id: clawsweeper-admin-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: clawsweeper
          permission-environments: write
          permission-secrets: write
          # The action runtime forwards this GitHub permission even though its generated metadata
          # currently omits the input.
          permission-variables: write

      - name: Create gitcrawl-store bootstrap token
        id: gitcrawl-store-admin-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: gitcrawl-store
          permission-secrets: write
          # See the ClawSweeper token note above.
          permission-variables: write

      - name: Bootstrap crawl-remote Access
        env:
          CLAWSWEEPER_BOOTSTRAP_GH_TOKEN: ${{ steps.clawsweeper-admin-token.outputs.token }}
          CLAWSWEEPER_MAIN_READ_GH_TOKEN: ${{ github.token }}
          GITCRAWL_STORE_BOOTSTRAP_GH_TOKEN: ${{ steps.gitcrawl-store-admin-token.outputs.token }}
          OPENCLAW_CLOUDFLARE_CONFIG_API_TOKEN: ${{ secrets.OPENCLAW_CLOUDFLARE_CONFIG_API_TOKEN }}
          OPENCLAW_CLOUDFLARE_WORKERS_API_TOKEN: ${{ secrets.OPENCLAW_CLOUDFLARE_WORKERS_API_TOKEN }}
          ROTATE_SERVICE_TOKEN: ${{ inputs.rotate_service_token && '1' || '0' }}
        run: |
          args=(
            --confirm "bootstrap crawl-remote access"
            --publisher-enabled 0
            --rotation-label "$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
            --runtime-provider local
          )
          if [[ "$ROTATE_SERVICE_TOKEN" == "1" ]]; then
            args+=(--rotate-service-token)
          fi
          node scripts/bootstrap-crawl-remote-access.mjs "${args[@]}"
