name: OpenClaw maintainer activity report

on:
  workflow_dispatch:
    inputs:
      period:
        description: "Report period to generate"
        required: true
        default: all
        type: choice
        options:
          - all
          - day
          - week
          - month
      deploy:
        description: "Deploy reports.openclaw.ai"
        required: true
        default: true
        type: boolean
      generate:
        description: "Generate report files before deploy; Hetzner cron owns normal generation"
        required: true
        default: false
        type: boolean
      comments:
        description: "Collect issue/PR comments when manually regenerating"
        required: true
        default: true
        type: boolean
      date:
        description: "Optional YYYY-MM-DD report date"
        required: false
        default: ""
        type: string
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLAWSWEEPER_APP_CLIENT_ID: Iv23liQswtjAxzxkCqb4
  CLAWSWEEPER_MODEL: internal
  CLOUDFLARE_ACCOUNT_ID: 91b59577e757131d68d55a471fe32aca
  REPORTS_DOMAIN: reports.openclaw.ai
  REPORTS_PROJECT: openclaw-maintainer-reports

concurrency:
  group: openclaw-maintainer-activity-report
  cancel-in-progress: false

jobs:
  generate:
    name: Generate maintainer reports
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.generate }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      maintainers_sha: ${{ steps.maintainers-base.outputs.sha }}
    steps:
      - name: Create maintainer repo read token
        id: maintainers_read_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: garrytan
          repositories: maintainers
          permission-contents: read

      - name: Create OpenClaw read token
        id: openclaw_read_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: garrytan
          permission-contents: read
          permission-issues: read
          permission-pull-requests: read

      - name: Check out maintainers
        uses: actions/checkout@v7
        with:
          repository: openclaw/maintainers
          path: maintainers
          token: ${{ steps.maintainers_read_token.outputs.token }}
          fetch-depth: 0
          persist-credentials: false

      - name: Record maintainer base
        id: maintainers-base
        working-directory: maintainers
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check out ClawSweeper
        uses: actions/checkout@v7
        with:
          path: clawsweeper
          filter: blob:none
          persist-credentials: false

      - uses: ./clawsweeper/.github/actions/setup-codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAWSWEEPER_INTERNAL_MODEL: ${{ secrets.CLAWSWEEPER_MODEL }}

      - name: Generate reports
        working-directory: maintainers
        env:
          GH_TOKEN: ${{ steps.openclaw_read_token.outputs.token }}
          DISCRAWL_NO_AUTO_UPDATE: "1"
        run: |
          set -euo pipefail
          period="${{ github.event_name == 'workflow_dispatch' && inputs.period || 'day' }}"
          report_date="${{ github.event_name == 'workflow_dispatch' && inputs.date || '' }}"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "47 8 * * 1") period="week" ;;
              "17 9 1 * *") period="month" ;;
              *) period="day" ;;
            esac
          fi
          args=(--period "$period")
          if [ -n "$report_date" ]; then
            args+=(--date "$report_date")
          fi
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] || [ "${{ inputs.comments }}" != "true" ]; then
            args+=(--no-comments)
          fi
          node .agents/skills/openclaw-maintainer-activity/scripts/generate-maintainer-activity-history.mjs "${args[@]}"

      - name: Upload generated reports
        uses: actions/upload-artifact@v7
        with:
          name: maintainer-reports-${{ github.run_id }}-${{ github.run_attempt }}
          path: maintainers/reports
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

  publish:
    name: Publish maintainer reports
    needs: generate
    if: ${{ always() && needs.generate.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out ClawSweeper
        uses: actions/checkout@v7
        with:
          path: clawsweeper
          filter: blob:none
          persist-credentials: false

      - name: Create maintainer repo write token
        id: maintainers_write_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: garrytan
          repositories: maintainers
          permission-contents: write

      - name: Check out maintainer base
        uses: actions/checkout@v7
        with:
          repository: openclaw/maintainers
          path: maintainers
          ref: ${{ needs.generate.outputs.maintainers_sha }}
          token: ${{ steps.maintainers_write_token.outputs.token }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download generated reports
        uses: actions/download-artifact@v8
        with:
          name: maintainer-reports-${{ github.run_id }}-${{ github.run_attempt }}
          path: generated-reports

      - name: Prepare generated report publication
        id: prepare
        run: >-
          bash clawsweeper/scripts/prepare-maintainer-report-publication.sh
          generated-reports
          maintainers
          "${{ needs.generate.outputs.maintainers_sha }}"

      - name: Commit report history
        if: ${{ steps.prepare.outputs.changed == 'true' }}
        working-directory: maintainers
        env:
          GH_TOKEN: ${{ steps.maintainers_write_token.outputs.token }}
        run: |
          set -euo pipefail
          git config user.name "openclaw-clawsweeper[bot]"
          git config user.email "openclaw-clawsweeper[bot]@users.noreply.github.com"
          git commit -m "chore: publish maintainer activity report"
          gh auth setup-git
          git pull --rebase origin main
          git push origin HEAD:main

  deploy:
    name: Deploy maintainer reports
    needs: [generate, publish]
    if: >-
      ${{
        always() &&
        (github.event_name != 'workflow_dispatch' || inputs.deploy) &&
        (
          (needs.generate.result == 'success' && needs.publish.result == 'success') ||
          needs.generate.result == 'skipped'
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Create maintainer repo read token
        id: maintainers_read_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: garrytan
          repositories: maintainers
          permission-contents: read

      - name: Check out maintainers
        uses: actions/checkout@v7
        with:
          repository: openclaw/maintainers
          path: maintainers
          token: ${{ steps.maintainers_read_token.outputs.token }}
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Configure Cloudflare Access
        working-directory: maintainers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.OPENCLAW_CLOUDFLARE_CONFIG_API_TOKEN || secrets.OPENCLAW_CLOUDFLARE_ACCESS_API_TOKEN }}
          CF_API_TOKEN: ${{ secrets.OPENCLAW_CLOUDFLARE_CONFIG_API_TOKEN || secrets.OPENCLAW_CLOUDFLARE_ACCESS_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::notice title=Cloudflare Access not configured::Set OPENCLAW_CLOUDFLARE_CONFIG_API_TOKEN with Pages, DNS, and Zero Trust Access write scope to enforce GitHub org login for reports.openclaw.ai."
            exit 0
          fi
          node scripts/ensure-cloudflare-maintainer-reports.mjs \
            --domain "$REPORTS_DOMAIN" \
            --project "$REPORTS_PROJECT" \
            --github-org openclaw

      - name: Deploy reports.openclaw.ai
        working-directory: maintainers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.OPENCLAW_CLOUDFLARE_PAGES_API_TOKEN }}
          CF_API_TOKEN: ${{ secrets.OPENCLAW_CLOUDFLARE_PAGES_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error title=Cloudflare Pages token missing::Set OPENCLAW_CLOUDFLARE_PAGES_API_TOKEN for the OpenClaw Cloudflare account. The existing Workers token is intentionally not used for Pages deploys."
            exit 1
          fi
          npx wrangler@4.107.0 pages project create "$REPORTS_PROJECT" --production-branch main || true
          npx wrangler@4.107.0 pages deploy reports \
            --project-name "$REPORTS_PROJECT" \
            --branch main \
            --commit-dirty=false \
            --skip-caching
