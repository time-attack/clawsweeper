name: repair publish cluster results

on:
  workflow_run:
    workflows:
      - repair cluster worker
    types:
      - completed

permissions:
  contents: read
  actions: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093

concurrency:
  group: clawsweeper-repair-publish-results
  # Serialize state publication while retaining every completed worker
  # generation instead of replacing the older pending publisher.
  cancel-in-progress: false
  queue: max

jobs:
  publish:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          filter: blob:none
          fetch-depth: 0
          persist-credentials: false

      - name: Classify trusted worker artifact contract
        id: worker-contract
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          WORKER_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail
          echo "trusted_legacy_worker_head=" >> "$GITHUB_OUTPUT"
          if [[ ! "$WORKER_HEAD_SHA" =~ ^[a-f0-9]{40}$ ]]; then
            echo "::error title=Untrusted worker::Worker head is not an exact commit."
            exit 1
          fi
          git fetch --no-tags origin "refs/heads/${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"
          if ! git cat-file -e "${WORKER_HEAD_SHA}^{commit}" 2>/dev/null ||
             ! git merge-base --is-ancestor "$WORKER_HEAD_SHA" "refs/remotes/origin/${DEFAULT_BRANCH}"; then
            echo "::error title=Untrusted worker::Worker head is not on default-branch history."
            exit 1
          fi
          mapfile -t contract_commits < <(
            git log --reverse --format=%H \
              -S'Seal immutable source job provenance' \
              -- .github/workflows/repair-cluster-worker.yml
          )
          contract_commit="${contract_commits[0]:-}"
          if [ -z "$contract_commit" ]; then
            echo "::error::Cannot locate the immutable worker artifact contract."
            exit 1
          fi
          if git merge-base --is-ancestor "$WORKER_HEAD_SHA" "${contract_commit}^"; then
            echo "trusted_legacy_worker_head=$WORKER_HEAD_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ vars.CLAWSWEEPER_ALLOWED_OWNER || github.repository_owner }}
          permission-actions: read
          permission-contents: write
          permission-pull-requests: read

      - name: Create state token
        id: state-token
        uses: ./.github/actions/create-state-token
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}

      - uses: ./.github/actions/setup-state
        with:
          token: ${{ steps.state-token.outputs.token }}
          fetch-depth: 0

      - uses: ./.github/actions/setup-action-ledger

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Enable pinned pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          for attempt in 1 2 3; do
            if corepack prepare "pnpm@11.10.0" --activate; then
              exit 0
            fi
            sleep "$((attempt * 10))"
          done
          corepack prepare "pnpm@11.10.0" --activate

      # This workflow_run job executes trusted main-branch code only; artifacts
      # from worker runs are downloaded as data and handled by repair publishers.
      # codeql[actions/untrusted-checkout/critical]
      # lgtm[actions/untrusted-checkout/critical]
      - name: Resolve pnpm store
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-11.10.0-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-11.10.0-
            ${{ runner.os }}-pnpm-

      # This workflow_run job executes trusted main-branch code only; artifacts
      # from worker runs are downloaded as data and handled by repair publishers.
      # codeql[actions/untrusted-checkout/critical]
      # lgtm[actions/untrusted-checkout/critical]
      - name: Install dependencies
        id: setup-pnpm
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if pnpm install --frozen-lockfile; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep "$((attempt * 10))"
          done
          pnpm run build:repair

      - name: Resolve current worker result artifact
        id: current-result-artifact
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          ARTIFACT_INVENTORY: ${{ runner.temp }}/clawsweeper-repair-artifacts.json
        run: |
          set -euo pipefail
          rm -rf artifacts
          rm -rf artifact-provenance
          mkdir -p artifacts artifact-provenance
          gh api --paginate --slurp \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts?per_page=100" \
            > "$ARTIFACT_INVENTORY"
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          import { resolveOptionalRunArtifact } from "./dist/repair/run-artifact.js";

          const pages = JSON.parse(fs.readFileSync(process.env.ARTIFACT_INVENTORY, "utf8"));
          if (!Array.isArray(pages)) throw new Error("workflow artifact response is invalid");
          const artifacts = pages.flatMap((page) => {
            if (!Array.isArray(page?.artifacts)) {
              throw new Error("workflow artifact page is invalid");
            }
            return page.artifacts;
          });
          const artifact = resolveOptionalRunArtifact({
            artifacts,
            prefix: "clawsweeper-repair",
            fallbackPrefixes: ["clawsweeper-repair-worker"],
            runId: process.env.RUN_ID,
            currentAttempt: Number(process.env.RUN_ATTEMPT),
            allowPriorAttempts: false,
          });
          if (!artifact) {
            writeOutputs({ artifact_found: "0" });
          } else {
            writeOutputs({
              artifact_found: "1",
              artifact_id: String(artifact.id),
              artifact_name: artifact.name,
              producer_attempt: String(artifact.producerAttempt),
              artifact_digest: artifact.digest,
            });
          }

          function writeOutputs(outputs) {
            fs.appendFileSync(
              process.env.GITHUB_OUTPUT,
              Object.entries(outputs)
                .map(([name, value]) => `${name}=${value}\n`)
                .join(""),
            );
          }
          NODE

      - name: Resolve verified prior worker result cohort
        id: prior-result-artifact
        if: ${{ steps.current-result-artifact.outputs.artifact_found != '1' }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          ARTIFACT_INVENTORY: ${{ runner.temp }}/clawsweeper-repair-artifacts.json
          CURRENT_ATTEMPT_JOBS: ${{ runner.temp }}/clawsweeper-repair-current-attempt-jobs.json
        run: |
          set -euo pipefail
          gh api --paginate --slurp \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/attempts/${RUN_ATTEMPT}/jobs?per_page=100" \
            > "$CURRENT_ATTEMPT_JOBS"
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          import {
            allowsPriorResultArtifactCohort,
            resolveOptionalRunArtifact,
            resolveRunArtifact,
          } from "./dist/repair/run-artifact.js";

          const artifacts = readPages(process.env.ARTIFACT_INVENTORY, "artifacts");
          const jobs = readPages(process.env.CURRENT_ATTEMPT_JOBS, "jobs");
          const currentAttempt = Number(process.env.RUN_ATTEMPT);
          if (!Number.isInteger(currentAttempt) || currentAttempt < 1) {
            throw new Error("current workflow attempt is invalid");
          }
          const policyAllowsPrior = allowsPriorResultArtifactCohort({
            jobs,
            currentAttempt,
          });
          if (!policyAllowsPrior) {
            writeOutputs({ artifact_found: "0", selection_policy: "current-attempt-only" });
            process.exit(0);
          }

          const artifact = resolveOptionalRunArtifact({
            artifacts,
            prefix: "clawsweeper-repair",
            requiredPrefixes: ["clawsweeper-repair-provenance"],
            runId: process.env.RUN_ID,
            currentAttempt,
            maxProducerAttempt: currentAttempt - 1,
            allowPriorAttempts: true,
          });
          if (!artifact) {
            writeOutputs({ artifact_found: "0", selection_policy: "no-prior-cohort" });
            process.exit(0);
          }
          const provenance = resolveRunArtifact({
            artifacts,
            prefix: "clawsweeper-repair-provenance",
            runId: process.env.RUN_ID,
            currentAttempt,
            expectedProducerAttempt: artifact.producerAttempt,
            allowPriorAttempts: true,
          });
          writeOutputs({
            artifact_found: "1",
            selection_policy: "verified-prior-cohort",
            artifact_id: String(artifact.id),
            artifact_name: artifact.name,
            producer_attempt: String(artifact.producerAttempt),
            artifact_digest: artifact.digest,
            provenance_artifact_id: String(provenance.id),
            provenance_artifact_name: provenance.name,
            provenance_artifact_digest: provenance.digest,
          });

          function readPages(filePath, key) {
            const pages = JSON.parse(fs.readFileSync(filePath, "utf8"));
            if (!Array.isArray(pages)) throw new Error(`workflow ${key} response is invalid`);
            return pages.flatMap((page) => {
              if (!Array.isArray(page?.[key])) {
                throw new Error(`workflow ${key} page is invalid`);
              }
              return page[key];
            });
          }

          function writeOutputs(outputs) {
            fs.appendFileSync(
              process.env.GITHUB_OUTPUT,
              Object.entries(outputs)
                .map(([name, value]) => `${name}=${value}\n`)
                .join(""),
            );
          }
          NODE

      - name: Select worker result artifact
        id: result-artifact
        env:
          CURRENT_FOUND: ${{ steps.current-result-artifact.outputs.artifact_found }}
          CURRENT_ARTIFACT_ID: ${{ steps.current-result-artifact.outputs.artifact_id }}
          CURRENT_ARTIFACT_NAME: ${{ steps.current-result-artifact.outputs.artifact_name }}
          CURRENT_PRODUCER_ATTEMPT: ${{ steps.current-result-artifact.outputs.producer_attempt }}
          CURRENT_ARTIFACT_DIGEST: ${{ steps.current-result-artifact.outputs.artifact_digest }}
          PRIOR_FOUND: ${{ steps.prior-result-artifact.outputs.artifact_found }}
          PRIOR_POLICY: ${{ steps.prior-result-artifact.outputs.selection_policy }}
          PRIOR_ARTIFACT_ID: ${{ steps.prior-result-artifact.outputs.artifact_id }}
          PRIOR_ARTIFACT_NAME: ${{ steps.prior-result-artifact.outputs.artifact_name }}
          PRIOR_PRODUCER_ATTEMPT: ${{ steps.prior-result-artifact.outputs.producer_attempt }}
          PRIOR_ARTIFACT_DIGEST: ${{ steps.prior-result-artifact.outputs.artifact_digest }}
          PRIOR_PROVENANCE_ARTIFACT_ID: ${{ steps.prior-result-artifact.outputs.provenance_artifact_id }}
          PRIOR_PROVENANCE_ARTIFACT_NAME: ${{ steps.prior-result-artifact.outputs.provenance_artifact_name }}
          PRIOR_PROVENANCE_ARTIFACT_DIGEST: ${{ steps.prior-result-artifact.outputs.provenance_artifact_digest }}
        run: |
          set -euo pipefail
          if [ "$CURRENT_FOUND" = "1" ]; then
            {
              echo "artifact_found=1"
              echo "selection=current"
              echo "selection_policy=current-attempt"
              echo "artifact_id=$CURRENT_ARTIFACT_ID"
              echo "artifact_name=$CURRENT_ARTIFACT_NAME"
              echo "producer_attempt=$CURRENT_PRODUCER_ATTEMPT"
              echo "artifact_digest=$CURRENT_ARTIFACT_DIGEST"
            } >> "$GITHUB_OUTPUT"
          elif [ "$PRIOR_FOUND" = "1" ]; then
            {
              echo "artifact_found=1"
              echo "selection=prior"
              echo "selection_policy=$PRIOR_POLICY"
              echo "artifact_id=$PRIOR_ARTIFACT_ID"
              echo "artifact_name=$PRIOR_ARTIFACT_NAME"
              echo "producer_attempt=$PRIOR_PRODUCER_ATTEMPT"
              echo "artifact_digest=$PRIOR_ARTIFACT_DIGEST"
              echo "provenance_artifact_id=$PRIOR_PROVENANCE_ARTIFACT_ID"
              echo "provenance_artifact_name=$PRIOR_PROVENANCE_ARTIFACT_NAME"
              echo "provenance_artifact_digest=$PRIOR_PROVENANCE_ARTIFACT_DIGEST"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "artifact_found=0"
              echo "selection=empty"
              echo "selection_policy=${PRIOR_POLICY:-no-current-artifact}"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Download exact worker result artifact
        if: ${{ steps.result-artifact.outputs.artifact_found == '1' }}
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ steps.result-artifact.outputs.artifact_id }}
          path: artifacts
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download exact worker result provenance
        if: ${{ steps.result-artifact.outputs.selection == 'prior' }}
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ steps.result-artifact.outputs.provenance_artifact_id }}
          path: artifact-provenance
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Verify selected worker result artifact
        id: download
        env:
          ARTIFACT_FOUND: ${{ steps.result-artifact.outputs.artifact_found }}
          SELECTION: ${{ steps.result-artifact.outputs.selection }}
          SELECTION_POLICY: ${{ steps.result-artifact.outputs.selection_policy }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          WORKER_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          ARTIFACT_ID: ${{ steps.result-artifact.outputs.artifact_id }}
          ARTIFACT_NAME: ${{ steps.result-artifact.outputs.artifact_name }}
          ARTIFACT_DIGEST: ${{ steps.result-artifact.outputs.artifact_digest }}
          PRODUCER_ATTEMPT: ${{ steps.result-artifact.outputs.producer_attempt }}
          PROVENANCE_ARTIFACT_ID: ${{ steps.result-artifact.outputs.provenance_artifact_id }}
          PROVENANCE_ARTIFACT_NAME: ${{ steps.result-artifact.outputs.provenance_artifact_name }}
          PROVENANCE_ARTIFACT_DIGEST: ${{ steps.result-artifact.outputs.provenance_artifact_digest }}
          ARTIFACT_INVENTORY: ${{ runner.temp }}/clawsweeper-repair-artifacts.json
        run: |
          set -euo pipefail
          if [ "$ARTIFACT_FOUND" != "1" ]; then
            echo "has_artifacts=0" >> "$GITHUB_OUTPUT"
            echo "::notice title=No repair artifacts::No verified result payload for worker run $RUN_ID ($SELECTION_POLICY)."
            exit 0
          fi

          if [ "$SELECTION" = "current" ]; then
            if [ "$PRODUCER_ATTEMPT" != "$RUN_ATTEMPT" ]; then
              echo "::error::Resolved current worker result attempt does not match workflow attempt."
              exit 1
            fi
            case "$ARTIFACT_NAME" in
              "clawsweeper-repair-${RUN_ID}-${RUN_ATTEMPT}" | \
              "clawsweeper-repair-worker-${RUN_ID}-${RUN_ATTEMPT}") ;;
              *)
                echo "::error::Resolved worker result artifact does not belong to the current attempt."
                exit 1
                ;;
            esac
          elif [ "$SELECTION" = "prior" ]; then
            if [ "$PRODUCER_ATTEMPT" -ge "$RUN_ATTEMPT" ] ||
               [ "$ARTIFACT_NAME" != "clawsweeper-repair-${RUN_ID}-${PRODUCER_ATTEMPT}" ]; then
              echo "::error::Resolved prior worker result artifact identity is invalid."
              exit 1
            fi
            node --input-type=module <<'NODE'
            import fs from "node:fs";
            import path from "node:path";
            import { verifyPriorResultArtifactCohort } from "./dist/repair/run-artifact.js";

            const pages = JSON.parse(fs.readFileSync(process.env.ARTIFACT_INVENTORY, "utf8"));
            if (!Array.isArray(pages)) throw new Error("workflow artifact response is invalid");
            const artifacts = pages.flatMap((page) => {
              if (!Array.isArray(page?.artifacts)) {
                throw new Error("workflow artifact page is invalid");
              }
              return page.artifacts;
            });
            const runId = process.env.RUN_ID;
            const currentAttempt = positiveInteger(process.env.RUN_ATTEMPT, "current attempt");
            const producerAttempt = positiveInteger(
              process.env.PRODUCER_ATTEMPT,
              "producer attempt",
            );
            const provenanceFiles = fs
              .readdirSync("artifact-provenance", { recursive: true })
              .map((entry) => path.join("artifact-provenance", String(entry)))
              .filter(
                (entry) =>
                  path.basename(entry) === "final-worker.json" && fs.statSync(entry).isFile(),
              );
            if (provenanceFiles.length !== 1) {
              throw new Error("prior result provenance file is missing or ambiguous");
            }
            const provenance = JSON.parse(fs.readFileSync(provenanceFiles[0], "utf8"));
            verifyPriorResultArtifactCohort({
              artifacts,
              provenance,
              repository: process.env.GITHUB_REPOSITORY,
              runId,
              workflowSha: process.env.WORKER_HEAD_SHA,
              currentAttempt,
              producerAttempt,
              resultArtifactId: process.env.ARTIFACT_ID,
              resultArtifactName: process.env.ARTIFACT_NAME,
              resultArtifactDigest: process.env.ARTIFACT_DIGEST,
              provenanceArtifactId: process.env.PROVENANCE_ARTIFACT_ID,
              provenanceArtifactName: process.env.PROVENANCE_ARTIFACT_NAME,
              provenanceArtifactDigest: process.env.PROVENANCE_ARTIFACT_DIGEST,
            });

            function positiveInteger(value, label) {
              const text = String(value ?? "");
              if (!/^[1-9][0-9]*$/.test(text)) {
                throw new Error(`${label} is invalid`);
              }
              const parsed = Number(text);
              if (!Number.isSafeInteger(parsed)) throw new Error(`${label} is invalid`);
              return parsed;
            }
            NODE
          else
            echo "::error::Worker result artifact selection is invalid."
            exit 1
          fi

          result_paths_file="$RUNNER_TEMP/clawsweeper-repair-result-paths.txt"
          node --input-type=module > "$result_paths_file" <<'NODE'
          import { findResultPaths } from "./dist/repair/publish-files.js";
          for (const resultPath of findResultPaths("artifacts")) {
            process.stdout.write(`${resultPath}\n`);
          }
          NODE
          if [ ! -s "$result_paths_file" ]; then
            echo "::error::Exact worker artifact $ARTIFACT_NAME has no verified result payload."
            exit 1
          fi
          mapfile -t result_paths < "$result_paths_file"
          pnpm run repair:review-results -- "${result_paths[@]}"
          echo "has_artifacts=1" >> "$GITHUB_OUTPUT"

      # This workflow_run job executes trusted main-branch code only; artifacts
      # from worker runs are downloaded as data and handled by repair publishers.
      # codeql[actions/untrusted-checkout/critical]
      # lgtm[actions/untrusted-checkout/critical]
      - name: Publish result ledger
        if: ${{ steps.download.outputs.has_artifacts == '1' }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_CREATED_AT: ${{ github.event.workflow_run.created_at }}
          PRODUCER_ATTEMPT: ${{ steps.result-artifact.outputs.producer_attempt }}
          TRUSTED_LEGACY_WORKER_HEAD: ${{ steps.worker-contract.outputs.trusted_legacy_worker_head }}
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B main origin/main
          legacy_worker_args=()
          if [ -n "$TRUSTED_LEGACY_WORKER_HEAD" ]; then
            legacy_worker_args+=(--trusted-legacy-worker-head "$TRUSTED_LEGACY_WORKER_HEAD")
          fi
          CLAWSWEEPER_ACTION_LEDGER_INVOCATION=cluster-results \
            pnpm run repair:publish-result -- artifacts \
            --skip-dashboard \
            --run-id "$RUN_ID" \
            --run-url "$RUN_URL" \
            --head-sha "$HEAD_SHA" \
            --conclusion "$CONCLUSION" \
            --workflow-created-at "$WORKFLOW_CREATED_AT" \
            --producer-attempt "$PRODUCER_ATTEMPT" \
            "${legacy_worker_args[@]}"
          CLAWSWEEPER_ACTION_LEDGER_INVOCATION=open-pr-finalizer \
            pnpm run repair:finalize-open-prs -- --write-report
          CLAWSWEEPER_ACTION_LEDGER_INVOCATION=finalizer-results \
            pnpm run repair:publish-result -- \
              --skip-dashboard \
              --run-id "$RUN_ID" \
              --run-url "$RUN_URL" \
              --head-sha "$HEAD_SHA" \
              --conclusion "$CONCLUSION" \
              --workflow-created-at "$WORKFLOW_CREATED_AT" \
              --producer-attempt "$PRODUCER_ATTEMPT"

      # This workflow_run job executes trusted main-branch code only; artifacts
      # from worker runs are downloaded as data and handled by repair publishers.
      # codeql[actions/untrusted-checkout/critical]
      # lgtm[actions/untrusted-checkout/critical]
      - name: Prepare durable notification claims
        if: ${{ steps.download.outputs.has_artifacts == '1' }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          CLAWSWEEPER_OPENCLAW_HOOK_URL: ${{ secrets.CLAWSWEEPER_OPENCLAW_HOOK_URL }}
          CLAWSWEEPER_OPENCLAW_HOOK_TOKEN: ${{ secrets.CLAWSWEEPER_OPENCLAW_HOOK_TOKEN }}
          CLAWSWEEPER_OPENCLAW_AGENT_ID: ${{ vars.CLAWSWEEPER_OPENCLAW_AGENT_ID || 'clawsweeper' }}
          CLAWSWEEPER_DISCORD_TARGET: ${{ vars.CLAWSWEEPER_DISCORD_TARGET }}
          CLAWSWEEPER_STATUS_INGEST_URL: https://clawsweeper.openclaw.ai/api/events
          CLAWSWEEPER_STATUS_INGEST_TOKEN: ${{ secrets.CLAWSWEEPER_STATUS_INGEST_TOKEN }}
        run: |
          set -euo pipefail
          pnpm run repair:notify-events -- \
            --run-id "$RUN_ID" \
            --run-record "results/runs/$RUN_ID.json" \
            --prepare-only \
            --write-report

      # This workflow_run job executes trusted main-branch code only; notification
      # claims are generated locally from already verified result artifacts and
      # must be durable before any external delivery can begin.
      # codeql[actions/untrusted-checkout/critical]
      # lgtm[actions/untrusted-checkout/critical]
      - name: Commit notification claims
        if: ${{ steps.download.outputs.has_artifacts == '1' }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set -euo pipefail
          if [ -d notifications ]; then
            CLAWSWEEPER_ACTION_LEDGER_INVOCATION=notification-claims \
              pnpm run repair:publish-main -- \
              --message "chore: claim event notifications" \
              --path notifications \
              --receipt-kind repair_notification_state \
              --best-effort-refresh \
              --max-attempts 12 \
              --push-attempts 4
          fi

      # This workflow_run job executes trusted main-branch code only; delivery is
      # permitted only for claims durably published by this exact run attempt.
      # codeql[actions/untrusted-checkout/critical]
      # lgtm[actions/untrusted-checkout/critical]
      - name: Notify OpenClaw about ClawSweeper events
        if: ${{ steps.download.outputs.has_artifacts == '1' }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          CLAWSWEEPER_EVENT_NOTIFY_REQUIRE_DURABLE_CLAIM: "1"
          CLAWSWEEPER_OPENCLAW_HOOK_URL: ${{ secrets.CLAWSWEEPER_OPENCLAW_HOOK_URL }}
          CLAWSWEEPER_OPENCLAW_HOOK_TOKEN: ${{ secrets.CLAWSWEEPER_OPENCLAW_HOOK_TOKEN }}
          CLAWSWEEPER_OPENCLAW_AGENT_ID: ${{ vars.CLAWSWEEPER_OPENCLAW_AGENT_ID || 'clawsweeper' }}
          CLAWSWEEPER_DISCORD_TARGET: ${{ vars.CLAWSWEEPER_DISCORD_TARGET }}
          CLAWSWEEPER_STATUS_INGEST_URL: https://clawsweeper.openclaw.ai/api/events
          CLAWSWEEPER_STATUS_INGEST_TOKEN: ${{ secrets.CLAWSWEEPER_STATUS_INGEST_TOKEN }}
        run: |
          set -euo pipefail
          pnpm run repair:notify-events -- \
            --run-id "$RUN_ID" \
            --run-record "results/runs/$RUN_ID.json" \
            --write-report

      # This workflow_run job executes trusted main-branch code only; accepted
      # hook and dashboard receipts advance the already durable claim.
      # codeql[actions/untrusted-checkout/critical]
      # lgtm[actions/untrusted-checkout/critical]
      - name: Commit notification receipts
        if: ${{ steps.download.outputs.has_artifacts == '1' }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set -euo pipefail
          if [ -d notifications ]; then
            CLAWSWEEPER_ACTION_LEDGER_INVOCATION=notification-receipts \
              pnpm run repair:publish-main -- \
              --message "chore: checkpoint event notification receipts" \
              --path notifications \
              --receipt-kind repair_notification_state \
              --max-attempts 12 \
              --push-attempts 4
          fi

      # This workflow_run job executes trusted main-branch code only; artifacts
      # from worker runs are downloaded as data and handled by repair publishers.
      # codeql[actions/untrusted-checkout/critical]
      # lgtm[actions/untrusted-checkout/critical]
      - name: Commit result ledger
        if: ${{ steps.download.outputs.has_artifacts == '1' }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set -euo pipefail
          pnpm run repair:publish-main -- \
            --message "chore: publish cluster result" \
            --path results \
            --path jobs/openclaw/closed \
            --path repair-apply-report.json \
            --receipt-kind repair_result_state \
            --max-attempts 12 \
            --push-attempts 4

      - name: Finalize repair publication action ledger
        if: ${{ always() && steps.setup-pnpm.outcome == 'success' }}
        run: |
          set -euo pipefail
          : "${CLAWSWEEPER_ACTION_LEDGER_OUTPUT_ROOT:?setup-action-ledger output root is required}"
          mkdir -p .artifacts
          allow_empty_args=()
          if [ "${{ steps.download.outputs.has_artifacts }}" = "0" ]; then
            allow_empty_args+=(--allow-empty)
          fi
          pnpm run --silent repair:action-ledger -- finalize \
            --repair-lane repair-publication \
            "${allow_empty_args[@]}" \
            > .artifacts/repair-publication-action-ledger-manifest.json

      - name: Publish immutable repair publication action ledger
        if: ${{ always() && steps.setup-pnpm.outcome == 'success' }}
        run: |
          set -euo pipefail
          test -n "${CLAWSWEEPER_STATE_DIR:-}"
          source_root="${CLAWSWEEPER_ACTION_LEDGER_OUTPUT_ROOT:?setup-action-ledger output root is required}"
          manifest_file=".artifacts/repair-publication-action-ledger-manifest.json"
          event_paths_file=".artifacts/repair-publication-action-ledger-paths.txt"
          import_result_file=".artifacts/repair-publication-action-ledger-import.json"
          mkdir -p .artifacts
          test -s "$manifest_file"
          allow_empty_args=()
          if [ "${{ steps.download.outputs.has_artifacts }}" = "0" ]; then
            allow_empty_args+=(--allow-empty)
          fi
          pnpm run --silent repair:action-ledger -- publish \
            --repair-lane repair-publication \
            --manifest "$manifest_file" \
            "${allow_empty_args[@]}" \
            --source-root "$source_root" \
            --state-root "$CLAWSWEEPER_STATE_DIR" > "$import_result_file"
          jq -e --slurpfile manifest "$manifest_file" \
            '.eventPaths == $manifest[0].event_paths' \
            "$import_result_file" >/dev/null
          jq -r '.paths[]?' "$import_result_file" | sort -u > "$event_paths_file"
          if [ ! -s "$event_paths_file" ]; then
            if [ "${{ steps.download.outputs.has_artifacts }}" = "0" ]; then
              exit 0
            fi
            echo "Repair publication action event shards existed but no paths were imported." >&2
            exit 1
          fi
          action_ledger_args=()
          while IFS= read -r event_path; do
            durable_event_path="$CLAWSWEEPER_STATE_DIR/$event_path"
            test -f "$durable_event_path"
            mkdir -p "$(dirname "$event_path")"
            cp "$durable_event_path" "$event_path"
            action_ledger_args+=(--path "$event_path")
          done < "$event_paths_file"
          pnpm run repair:publish-main -- \
            --message "chore: append repair publication action ledger" \
            "${action_ledger_args[@]}" \
            --rebase-strategy normal
