name: repair finalize open PRs

on:
  workflow_dispatch:
    inputs:
      execute:
        description: "Dispatch repair workers for actionable open PRs"
        required: true
        default: false
        type: boolean
      max_prs:
        description: "Maximum open PRs to dispatch"
        required: true
        default: "5"
        type: string
      runner:
        description: "Runner label for cluster planning/review work"
        required: true
        default: blacksmith-4vcpu-ubuntu-2404
        type: string
      execution_runner:
        description: "Runner label for fix/apply execution work"
        required: true
        default: blacksmith-16vcpu-ubuntu-2404
        type: string

permissions:
  contents: write
  actions: write
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093

concurrency:
  group: clawsweeper-repair-finalize-open-prs
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 20
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ vars.CLAWSWEEPER_ALLOWED_OWNER || github.repository_owner }}
          permission-actions: write
          permission-contents: write
          permission-issues: read
          permission-pull-requests: read

      - uses: actions/checkout@v5
        with:
          filter: blob:none
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Create state token
        id: state-token
        uses: ./.github/actions/create-state-token
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}

      - uses: ./.github/actions/setup-state
        with:
          token: ${{ steps.state-token.outputs.token }}

      - uses: ./.github/actions/setup-pnpm
        with:
          build-script: build:repair

      - name: Finalize open ClawSweeper Repair PRs
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          CLAWSWEEPER_ALLOW_EXECUTE: ${{ inputs.execute && vars.CLAWSWEEPER_ALLOW_EXECUTE == '1' && '1' || '0' }}
          CLAWSWEEPER_ALLOW_FIX_PR: ${{ inputs.execute && vars.CLAWSWEEPER_ALLOW_FIX_PR == '1' && '1' || '0' }}
        run: |
          args=(
            --write-report
            --dispatch-repairs
            --max-prs "${{ inputs.max_prs }}"
            --runner "${{ inputs.runner }}"
            --execution-runner "${{ inputs.execution_runner }}"
          )
          if [ "${{ inputs.execute }}" = "true" ] && [ "${CLAWSWEEPER_ALLOW_EXECUTE}" = "1" ] && [ "${CLAWSWEEPER_ALLOW_FIX_PR}" = "1" ]; then
            args+=(--execute)
          elif [ "${{ inputs.execute }}" = "true" ]; then
            echo "execution requested, but ClawSweeper execute/fix gates are not explicitly 1; writing report without dispatching repairs"
          fi
          pnpm run repair:finalize-open-prs -- "${args[@]}"
          pnpm run repair:publish-result -- --skip-dashboard

      - name: Commit finalizer ledger
        run: |
          pnpm run repair:publish-main -- \
            --message "chore: record open PR finalizer" \
            --path repair-apply-report.json \
            --path results/finalize-open-prs.json \
            --path results/finalize-open-prs.md \
            --path results/finalize-open-prs-dispatch.json \
            --rebase-strategy theirs
