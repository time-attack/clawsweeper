name: ClawSweeper Proof Nudges

run-name: ${{ github.event_name == 'schedule' && 'Scheduled proof nudges' || 'Manual proof nudges' }}

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Repository to inspect for proof nudges"
        required: false
        default: "openclaw/openclaw"
      execute:
        description: "Post proof-nudge comments; false runs dry-run only"
        required: false
        default: "false"
      limit:
        description: "Maximum proof nudges to plan or post"
        required: false
        default: "10"
      processed_limit:
        description: "Maximum candidate records to inspect before advancing the cursor (minimum 1)"
        required: false
        default: ""
      min_age_days:
        description: "Minimum age in days since review/author activity before first proof nudge"
        required: false
        default: "5"
      cooldown_days:
        description: "Same-head cooldown in days between proof nudges"
        required: false
        default: "7"
      item_numbers:
        description: "Optional comma-separated PR numbers to inspect first"
        required: false
        default: ""
      bot_proof:
        description: "Also inspect bot-owned PRs blocked on real behavior proof"
        required: false
        default: "false"
      bot_proof_execute:
        description: "Post bot-owned proof status comments and labels; false runs dry-run only"
        required: false
        default: "false"
  schedule:
    - cron: "0 10 * * *"

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093

concurrency:
  group: ${{ format('clawsweeper-proof-nudges-{0}', github.event.inputs.target_repo || vars.CLAWSWEEPER_PROOF_NUDGES_TARGET_REPO || 'openclaw/openclaw') }}
  cancel-in-progress: false

jobs:
  proof-nudges:
    name: Proof nudges
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && (vars.CLAWSWEEPER_PROOF_NUDGES_SCHEDULED == '1' || vars.CLAWSWEEPER_BOT_PROOF_SCHEDULED == '1')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          filter: blob:none
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve target repository
        id: target
        env:
          TARGET_REPO_INPUT: ${{ github.event.inputs.target_repo || vars.CLAWSWEEPER_PROOF_NUDGES_TARGET_REPO || 'openclaw/openclaw' }}
        run: |
          target_repo="$TARGET_REPO_INPUT"
          if [[ ! "$target_repo" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "::error::target_repo must be owner/repo with GitHub-safe characters"
            exit 1
          fi
          target_owner="${target_repo%%/*}"
          target_name="${target_repo#*/}"
          {
            echo "target_repo=$target_repo"
            echo "target_repo_owner=$target_owner"
            echo "target_repo_name=$target_name"
          } >> "$GITHUB_OUTPUT"

      - name: Create target proof-nudge token
        id: target-proof-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ steps.target.outputs.target_repo_owner }}
          repositories: ${{ steps.target.outputs.target_repo_name }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write

      - name: Create state token
        id: state-token
        uses: ./.github/actions/create-state-token
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}

      - uses: ./.github/actions/setup-state
        id: setup-state
        with:
          token: ${{ steps.state-token.outputs.token }}

      - uses: ./.github/actions/setup-action-ledger
        id: action-ledger

      - uses: ./.github/actions/setup-pnpm
        id: setup-pnpm
        with:
          build-script: build:all

      - name: Run proof nudges
        env:
          GH_TOKEN: ${{ steps.target-proof-token.outputs.token }}
          TARGET_REPO: ${{ steps.target.outputs.target_repo }}
          PROOF_NUDGES_EXECUTE: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.execute == 'true') || (github.event_name == 'schedule' && vars.CLAWSWEEPER_PROOF_NUDGES_EXECUTE == '1') }}
          PROOF_NUDGES_ITEM_NUMBERS: ${{ github.event.inputs.item_numbers || '' }}
          PROOF_NUDGES_LIMIT: ${{ github.event.inputs.limit || vars.CLAWSWEEPER_PROOF_NUDGES_LIMIT || '10' }}
          PROOF_NUDGES_PROCESSED_LIMIT: ${{ github.event.inputs.processed_limit || vars.CLAWSWEEPER_PROOF_NUDGES_PROCESSED_LIMIT || '' }}
          PROOF_NUDGES_MIN_AGE_DAYS: ${{ github.event.inputs.min_age_days || vars.CLAWSWEEPER_PROOF_NUDGES_MIN_AGE_DAYS || '5' }}
          PROOF_NUDGES_COOLDOWN_DAYS: ${{ github.event.inputs.cooldown_days || vars.CLAWSWEEPER_PROOF_NUDGES_COOLDOWN_DAYS || '7' }}
          BOT_PROOF_ENABLED: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.bot_proof == 'true') || (github.event_name == 'schedule' && vars.CLAWSWEEPER_BOT_PROOF_SCHEDULED == '1') }}
          BOT_PROOF_EXECUTE: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.bot_proof_execute == 'true') || (github.event_name == 'schedule' && vars.CLAWSWEEPER_BOT_PROOF_EXECUTE == '1') }}
        run: |
          set -euo pipefail
          for numeric_input in PROOF_NUDGES_LIMIT PROOF_NUDGES_MIN_AGE_DAYS PROOF_NUDGES_COOLDOWN_DAYS; do
            if [[ ! "${!numeric_input}" =~ ^[0-9]+$ ]]; then
              echo "::error::$numeric_input must be a non-negative integer"
              exit 1
            fi
          done
          if [ -n "$PROOF_NUDGES_PROCESSED_LIMIT" ] && [[ ! "$PROOF_NUDGES_PROCESSED_LIMIT" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::PROOF_NUDGES_PROCESSED_LIMIT must be a positive integer"
            exit 1
          fi

          execute_arg=()
          if [ "$PROOF_NUDGES_EXECUTE" = "true" ]; then
            execute_arg=(--execute)
          fi
          processed_limit_arg=()
          if [ -n "$PROOF_NUDGES_PROCESSED_LIMIT" ]; then
            processed_limit_arg=(--processed-limit "$PROOF_NUDGES_PROCESSED_LIMIT")
          fi
          item_numbers_arg=()
          cursor_arg=()
          bot_cursor_arg=()
          cursor_publish_args=()
          target_slug="$TARGET_REPO"
          target_slug="${target_slug//\//-}"
          if [ -n "$PROOF_NUDGES_ITEM_NUMBERS" ]; then
            if [[ ! "$PROOF_NUDGES_ITEM_NUMBERS" =~ ^[0-9]+([[:space:]]*,[[:space:]]*[0-9]+)*$ ]]; then
              echo "::error::item_numbers must be a comma-separated list of pull request numbers"
              exit 1
            fi
            item_numbers_arg=(--item-numbers "$PROOF_NUDGES_ITEM_NUMBERS")
          else
            cursor_arg=(--cursor-path "results/proof-nudge-cursors/${target_slug}.json")
            bot_cursor_arg=(--cursor-path "results/bot-proof-cursors/${target_slug}.json")
          fi
          pnpm run proof-nudges -- \
            --target-repo "$TARGET_REPO" \
            --limit "$PROOF_NUDGES_LIMIT" \
            --min-age-days "$PROOF_NUDGES_MIN_AGE_DAYS" \
            --cooldown-days "$PROOF_NUDGES_COOLDOWN_DAYS" \
            --report-path proof-nudge-report.json \
            "${processed_limit_arg[@]}" \
            "${item_numbers_arg[@]}" \
            "${cursor_arg[@]}" \
            "${execute_arg[@]}"
          proof_cursor_path="results/proof-nudge-cursors/${target_slug}.json"
          if [ "$PROOF_NUDGES_EXECUTE" = "true" ] && [ -f "$proof_cursor_path" ]; then
            cursor_publish_args+=(--path "$proof_cursor_path")
          fi

          if [ "$BOT_PROOF_ENABLED" = "true" ]; then
            bot_proof_execute_arg=()
            if [ "$BOT_PROOF_EXECUTE" = "true" ]; then
              bot_proof_execute_arg=(--execute)
            fi
            pnpm run bot-proof -- \
              --target-repo "$TARGET_REPO" \
              --limit "$PROOF_NUDGES_LIMIT" \
              --report-path bot-proof-report.json \
              "${processed_limit_arg[@]}" \
              "${item_numbers_arg[@]}" \
              "${bot_cursor_arg[@]}" \
              "${bot_proof_execute_arg[@]}"
            bot_cursor_path="results/bot-proof-cursors/${target_slug}.json"
            if [ "$BOT_PROOF_EXECUTE" = "true" ] && [ -f "$bot_cursor_path" ]; then
              cursor_publish_args+=(--path "$bot_cursor_path")
            fi
          fi
          if [ ${#cursor_publish_args[@]} -gt 0 ]; then
            pnpm run repair:publish-main -- \
              --message "chore: update proof handling cursors" \
              --receipt-kind proof_cursor_publication \
              --rebase-strategy theirs \
              "${cursor_publish_args[@]}"
          fi

      - name: Finalize proof handling action ledger
        id: finalize-action-ledger
        if: ${{ always() && steps.action-ledger.outcome == 'success' && steps.setup-pnpm.outcome == 'success' }}
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          pnpm run --silent repair:action-ledger -- finalize \
            > .artifacts/proof-action-ledger-finalize.json

      - name: Import immutable proof handling action ledger
        id: import-action-ledger
        if: ${{ always() && steps.setup-state.outcome == 'success' && steps.finalize-action-ledger.outcome == 'success' }}
        run: |
          set -euo pipefail
          test -n "${CLAWSWEEPER_STATE_DIR:-}"
          source_root="${CLAWSWEEPER_ACTION_LEDGER_OUTPUT_ROOT:?setup-action-ledger output root is required}"
          import_result_file=".artifacts/proof-action-ledger-import.json"
          paths_file=".artifacts/proof-action-ledger-paths.txt"
          pnpm run --silent repair:action-ledger -- publish-workflow \
            --expected-producer-job proof-nudges \
            --source-root "$source_root" \
            --state-root "$CLAWSWEEPER_STATE_DIR" > "$import_result_file"
          jq -r '.paths[]?' "$import_result_file" | sort -u > "$paths_file"
          while IFS= read -r event_path; do
            durable_event_path="$CLAWSWEEPER_STATE_DIR/$event_path"
            test -f "$durable_event_path"
            mkdir -p "$(dirname "$event_path")"
            cp "$durable_event_path" "$event_path"
          done < "$paths_file"

      - name: Publish immutable proof handling action ledger
        if: ${{ always() && steps.import-action-ledger.outcome == 'success' }}
        run: |
          set -euo pipefail
          paths_file=".artifacts/proof-action-ledger-paths.txt"
          if [ ! -s "$paths_file" ]; then
            echo "No immutable proof handling action events to publish."
            exit 0
          fi
          node dist/clawsweeper.js publish-action-event-paths \
            --paths-file "$paths_file" \
            --message "chore: append proof handling action ledger"

      - uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: proof-handling-reports
          path: |
            proof-nudge-report.json
            bot-proof-report.json
          if-no-files-found: ignore
