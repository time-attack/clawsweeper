name: ClawSweeper assist

run-name: ${{ github.event.client_payload.dispatch_key && format('Assist {0}#{1} [{2}]', github.event.client_payload.target_repo || 'openclaw/openclaw', github.event.client_payload.item_number || '?', github.event.client_payload.dispatch_key) || format('Assist {0}#{1}', github.event.client_payload.target_repo || 'openclaw/openclaw', github.event.client_payload.item_number || '?') }}

on:
  repository_dispatch:
    types: [clawsweeper_assist]
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Repository containing the issue or PR"
        required: true
        default: openclaw/openclaw
        type: string
      item_number:
        description: "Issue or PR number"
        required: true
        type: string
      question:
        description: "Maintainer question to answer"
        required: true
        type: string
      mode:
        description: "Assist mode: assist or visual"
        required: false
        default: assist
        type: string
      lens:
        description: "Visual lens when mode is visual"
        required: false
        default: auto
        type: string
      comment_id:
        description: "Source issue comment id"
        required: false
        default: ""
        type: string
      comment_url:
        description: "Source issue comment URL"
        required: false
        default: ""
        type: string
      author:
        description: "Source comment author"
        required: false
        default: ""
        type: string

permissions:
  actions: read
  contents: read
  issues: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093
  CLAWSWEEPER_MODEL: internal

concurrency:
  group: ${{ format('clawsweeper-assist-{0}-{1}-{2}', github.event.client_payload.target_repo || inputs.target_repo || 'openclaw/openclaw', github.event.client_payload.item_number || inputs.item_number || 'unknown', github.event.client_payload.comment_id || inputs.comment_id || 'manual') }}
  cancel-in-progress: false

jobs:
  receipt:
    name: Deduplicate command dispatch receipt
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.receipt.outputs.proceed }}
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: scripts/dispatch-receipt-owner.sh
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - id: receipt
        env:
          DISPATCH_KEY: ${{ github.event.client_payload.dispatch_key || '' }}
          ITEM_NUMBER: ${{ github.event.client_payload.item_number || '?' }}
          TARGET_REPO: ${{ github.event.client_payload.target_repo || 'openclaw/openclaw' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "$DISPATCH_KEY" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          expected_title="Assist ${TARGET_REPO}#${ITEM_NUMBER} [${DISPATCH_KEY}]"
          owner="$(bash scripts/dispatch-receipt-owner.sh \
            assist.yml "$expected_title" "$GITHUB_RUN_ID" \
            "Publish trusted assist comment" "Revalidate and publish assist comment")"
          if [ "$owner" = "owner" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "An older active or successfully executed command dispatch already exists; skipping duplicate assist."
            exit 0
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

  capacity:
    needs: receipt
    if: ${{ needs.receipt.outputs.proceed == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.limit.outputs.proceed }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          filter: blob:none
          sparse-checkout: |
            .github/actions/setup-pnpm
            config
            src/command.ts
            src
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            tsconfig.json
            tsconfig.repair.json
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - uses: ./.github/actions/setup-pnpm
        with:
          build-script: build:repair

      - id: limit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cap="$(pnpm run --silent workflow -- worker-limit assist)"
          active_assist_jobs() {
            local runs total id jobs
            total=0
            runs="$(gh run list --repo "${{ github.repository }}" --status in_progress --limit 100 --json databaseId,workflowName \
              | jq -r '.[] | select(.workflowName == "ClawSweeper assist") | .databaseId')"
            while IFS= read -r id; do
              if [ -z "$id" ]; then
                continue
              fi
              jobs="$(gh run view "$id" --repo "${{ github.repository }}" --json jobs 2>/dev/null \
                | jq '[.jobs[]? | select(.name == "assist") | select(.status == "in_progress" or .status == "pending" or .status == "queued" or .status == "waiting" or .status == "requested")] | length' 2>/dev/null \
                || printf '0')"
              if [[ "$jobs" =~ ^[0-9]+$ ]]; then
                total=$((total + jobs))
              fi
            done <<< "$runs"
            printf '%s' "$total"
          }

          for _ in $(seq 1 80); do
            active="$(active_assist_jobs)"
            if [ "$active" -lt "$cap" ]; then
              echo "proceed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::notice::Assist lane is at capacity (${active}/${cap}); waiting for a slot."
            sleep 15
          done

          echo "::warning::Assist lane stayed at capacity (${cap}) for 20 minutes; leaving this run without posting an answer."
          echo "proceed=false" >> "$GITHUB_OUTPUT"

  assist:
    needs: capacity
    if: ${{ needs.capacity.outputs.proceed == 'true' }}
    runs-on: ${{ vars.CLAWSWEEPER_WORKER_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}
    timeout-minutes: 8
    outputs:
      generation_attempt: ${{ steps.generate.outputs.generation_attempt }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          filter: blob:none
          persist-credentials: false

      - uses: ./.github/actions/setup-action-ledger
        id: assist-action-ledger

      - uses: ./.github/actions/setup-pnpm
        with:
          build-script: build

      - name: Resolve validated target repository
        id: target
        env:
          TARGET_REPO: ${{ github.event.client_payload.target_repo || inputs.target_repo }}
        run: |
          set -euo pipefail
          resolved="$(node dist/clawsweeper.js assist-target --target-repo "$TARGET_REPO")"
          {
            echo "target_repo=$(jq -er '.repo' <<< "$resolved")"
            echo "target_repo_owner=$(jq -er '.owner' <<< "$resolved")"
            echo "target_repo_name=$(jq -er '.repository' <<< "$resolved")"
          } >> "$GITHUB_OUTPUT"

      - name: Create read-only GitHub App token
        id: read_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ steps.target.outputs.target_repo_owner }}
          repositories: ${{ steps.target.outputs.target_repo_name }}
          permission-issues: read
          permission-pull-requests: read

      - uses: ./.github/actions/setup-codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAWSWEEPER_INTERNAL_MODEL: ${{ secrets.CLAWSWEEPER_MODEL }}

      - name: Generate bounded assist artifact
        id: generate
        env:
          GH_TOKEN: ${{ steps.read_token.outputs.token }}
          TARGET_REPO: ${{ steps.target.outputs.target_repo }}
          ITEM_NUMBER: ${{ github.event.client_payload.item_number || inputs.item_number }}
          QUESTION: ${{ github.event.client_payload.question || inputs.question }}
          MODE: ${{ github.event.client_payload.assist.mode || github.event.client_payload.mode || inputs.mode || 'assist' }}
          LENS: ${{ github.event.client_payload.assist.lens || github.event.client_payload.lens || inputs.lens || 'auto' }}
          COMMENT_ID: ${{ github.event.client_payload.comment_id || inputs.comment_id || '' }}
          COMMENT_URL: ${{ github.event.client_payload.comment_url || inputs.comment_url || '' }}
          AUTHOR: ${{ github.event.client_payload.author || inputs.author || '' }}
          MODEL: internal
          REASONING_EFFORT: high
          TIMEOUT_MS: ${{ github.event.client_payload.assist.timeout_ms || github.event.client_payload.timeout_ms || '120000' }}
        run: |
          set -euo pipefail
          test -n "$GH_TOKEN"
          node dist/clawsweeper.js assist-generate \
            --target-repo "$TARGET_REPO" \
            --item-number "$ITEM_NUMBER" \
            --question "$QUESTION" \
            --mode "$MODE" \
            --lens "$LENS" \
            --comment-id "$COMMENT_ID" \
            --comment-url "$COMMENT_URL" \
            --author "$AUTHOR" \
            --codex-model "$MODEL" \
            --codex-reasoning-effort "$REASONING_EFFORT" \
            --codex-sandbox read-only \
            --codex-timeout-ms "$TIMEOUT_MS" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --artifact .artifacts/assist-result.json
          echo "generation_attempt=$GITHUB_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"

      - name: Upload assist artifact
        if: ${{ steps.generate.outcome == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-assist-${{ github.run_id }}-${{ steps.generate.outputs.generation_attempt }}
          path: .artifacts/assist-result.json
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

      - name: Upload assist generation action ledger
        if: ${{ always() && steps.assist-action-ledger.outcome == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: action-ledger-assist-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.assist-action-ledger.outputs.output-root }}/**
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 90

  publish:
    name: Publish trusted assist comment
    needs: assist
    if: ${{ always() && needs.assist.result != 'skipped' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          filter: blob:none
          persist-credentials: false

      - uses: ./.github/actions/setup-action-ledger
        id: publish-action-ledger

      - name: Create state token
        id: state-token
        uses: ./.github/actions/create-state-token
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}

      - uses: ./.github/actions/setup-state
        id: setup-state
        with:
          token: ${{ steps.state-token.outputs.token }}

      - uses: ./.github/actions/setup-pnpm
        id: setup-pnpm
        with:
          build-script: build

      - name: Verify exact workflow source
        if: ${{ needs.assist.result == 'success' }}
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Resolve validated target repository
        id: target
        if: ${{ needs.assist.result == 'success' }}
        env:
          TARGET_REPO: ${{ github.event.client_payload.target_repo || inputs.target_repo }}
        run: |
          set -euo pipefail
          resolved="$(node dist/clawsweeper.js assist-target --target-repo "$TARGET_REPO")"
          {
            echo "target_repo=$(jq -er '.repo' <<< "$resolved")"
            echo "target_repo_owner=$(jq -er '.owner' <<< "$resolved")"
            echo "target_repo_name=$(jq -er '.repository' <<< "$resolved")"
          } >> "$GITHUB_OUTPUT"

      - name: Download assist artifact
        if: ${{ needs.assist.result == 'success' }}
        uses: actions/download-artifact@v8
        with:
          name: clawsweeper-assist-${{ github.run_id }}-${{ needs.assist.outputs.generation_attempt }}
          path: .artifacts/publish

      - name: Download assist generation action ledger
        id: download-assist-action-ledger
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: action-ledger-assist-${{ github.run_id }}-${{ github.run_attempt }}
          path: .clawsweeper-repair/action-ledger-download/assist

      - name: Validate untrusted assist artifact
        if: ${{ needs.assist.result == 'success' }}
        env:
          TARGET_REPO: ${{ steps.target.outputs.target_repo }}
          ITEM_NUMBER: ${{ github.event.client_payload.item_number || inputs.item_number }}
          QUESTION: ${{ github.event.client_payload.question || inputs.question }}
          MODE: ${{ github.event.client_payload.assist.mode || github.event.client_payload.mode || inputs.mode || 'assist' }}
          LENS: ${{ github.event.client_payload.assist.lens || github.event.client_payload.lens || inputs.lens || 'auto' }}
          COMMENT_ID: ${{ github.event.client_payload.comment_id || inputs.comment_id || '' }}
          COMMENT_URL: ${{ github.event.client_payload.comment_url || inputs.comment_url || '' }}
          AUTHOR: ${{ github.event.client_payload.author || inputs.author || '' }}
          REASONING_EFFORT: high
          GENERATION_ATTEMPT: ${{ needs.assist.outputs.generation_attempt }}
        run: |
          set -euo pipefail
          node dist/clawsweeper.js assist-validate \
            --artifact .artifacts/publish/assist-result.json \
            --target-repo "$TARGET_REPO" \
            --item-number "$ITEM_NUMBER" \
            --question "$QUESTION" \
            --mode "$MODE" \
            --lens "$LENS" \
            --comment-id "$COMMENT_ID" \
            --comment-url "$COMMENT_URL" \
            --author "$AUTHOR" \
            --codex-reasoning-effort "$REASONING_EFFORT" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GENERATION_ATTEMPT"

      - name: Create narrow GitHub App write token
        id: write_token
        if: ${{ needs.assist.result == 'success' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ steps.target.outputs.target_repo_owner }}
          repositories: ${{ steps.target.outputs.target_repo_name }}
          permission-issues: write
          permission-pull-requests: write

      - name: Revalidate and publish assist comment
        id: publish-comment
        if: ${{ needs.assist.result == 'success' }}
        env:
          GH_TOKEN: ${{ steps.write_token.outputs.token }}
          TARGET_REPO: ${{ steps.target.outputs.target_repo }}
          ITEM_NUMBER: ${{ github.event.client_payload.item_number || inputs.item_number }}
          QUESTION: ${{ github.event.client_payload.question || inputs.question }}
          MODE: ${{ github.event.client_payload.assist.mode || github.event.client_payload.mode || inputs.mode || 'assist' }}
          LENS: ${{ github.event.client_payload.assist.lens || github.event.client_payload.lens || inputs.lens || 'auto' }}
          COMMENT_ID: ${{ github.event.client_payload.comment_id || inputs.comment_id || '' }}
          COMMENT_URL: ${{ github.event.client_payload.comment_url || inputs.comment_url || '' }}
          AUTHOR: ${{ github.event.client_payload.author || inputs.author || '' }}
          REASONING_EFFORT: high
          GENERATION_ATTEMPT: ${{ needs.assist.outputs.generation_attempt }}
        run: |
          set -euo pipefail
          test -n "$GH_TOKEN"
          node dist/clawsweeper.js assist-publish \
            --artifact .artifacts/publish/assist-result.json \
            --target-repo "$TARGET_REPO" \
            --item-number "$ITEM_NUMBER" \
            --question "$QUESTION" \
            --mode "$MODE" \
            --lens "$LENS" \
            --comment-id "$COMMENT_ID" \
            --comment-url "$COMMENT_URL" \
            --author "$AUTHOR" \
            --codex-reasoning-effort "$REASONING_EFFORT" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GENERATION_ATTEMPT"

      - name: Publish immutable assist action ledger
        if: ${{ always() && steps.setup-state.outcome == 'success' && steps.setup-pnpm.outcome == 'success' && steps.publish-action-ledger.outcome == 'success' }}
        env:
          GENERATION_LEDGER_OUTCOME: ${{ steps.download-assist-action-ledger.outcome }}
        run: |
          set -euo pipefail
          test -n "${CLAWSWEEPER_STATE_DIR:-}"
          event_paths_file=".artifacts/assist-action-ledger-paths.txt"
          mkdir -p .artifacts
          : > "$event_paths_file"
          if [ "$GENERATION_LEDGER_OUTCOME" = "success" ]; then
            pnpm run --silent publish-action-events -- \
              --source-root .clawsweeper-repair/action-ledger-download/assist \
              --state-root "$CLAWSWEEPER_STATE_DIR" \
              --expected-producer-job assist |
              jq -r '.paths[]?' >> "$event_paths_file"
          fi
          if [ -d "$CLAWSWEEPER_ACTION_LEDGER_OUTPUT_ROOT/ledger" ]; then
            pnpm run --silent publish-action-events -- \
              --source-root "$CLAWSWEEPER_ACTION_LEDGER_OUTPUT_ROOT" \
              --state-root "$CLAWSWEEPER_STATE_DIR" \
              --expected-producer-job "$GITHUB_JOB" |
              jq -r '.paths[]?' >> "$event_paths_file"
          fi
          sort -u -o "$event_paths_file" "$event_paths_file"
          if [ ! -s "$event_paths_file" ]; then
            echo "No immutable assist action events to publish."
            exit 0
          fi
          while IFS= read -r event_path; do
            durable_event_path="$CLAWSWEEPER_STATE_DIR/$event_path"
            test -f "$durable_event_path"
            mkdir -p "$(dirname "$event_path")"
            cp "$durable_event_path" "$event_path"
          done < "$event_paths_file"
          node dist/clawsweeper.js publish-action-event-paths \
            --paths-file "$event_paths_file" \
            --message "chore: append assist action ledger"
