name: repair comment router

on:
  repository_dispatch:
    types: [clawsweeper_comment]
  workflow_dispatch:
    inputs:
      execute:
        description: "Post replies and dispatch repair workers"
        required: true
        default: false
        type: boolean
      force_reprocess:
        description: "Replay matching comments even if their current version is already in the ledger"
        required: true
        default: false
        type: boolean
      attempt_id:
        description: "Optional durable identity for one forced replay across workflow retries"
        required: false
        default: ""
        type: string
      target_repo:
        description: "Repository to scan for ClawSweeper commands"
        required: true
        default: openclaw/openclaw
        type: string
      target_branch:
        description: "Optional target repository branch for exact review dispatches"
        required: false
        default: ""
        type: string
      lookback_minutes:
        description: "How far back to scan comments"
        required: true
        default: "180"
        type: string
      since:
        description: "Optional ISO timestamp lower bound for scanned comments"
        required: false
        default: ""
        type: string
      max_comments:
        description: "Maximum recent comments and distinct item lanes per page"
        required: true
        default: "100"
        type: string
      item_numbers:
        description: "Optional comma-separated issue or PR numbers to route directly"
        required: false
        default: ""
        type: string
      comment_ids:
        description: "Optional comma-separated issue comment or synthetic repair-loop ids to route directly"
        required: false
        default: ""
        type: string
      router_fanout_after:
        description: "Internal distinct-item fanout continuation cursor"
        required: false
        default: ""
        type: string
      runner:
        description: "Runner label for repair planning/review work"
        required: true
        default: blacksmith-4vcpu-ubuntu-2404
        type: string
      execution_runner:
        description: "Runner label for fix/apply execution work"
        required: true
        default: blacksmith-16vcpu-ubuntu-2404
        type: string
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write
  actions: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLAWSWEEPER_APP_SLUG: openclaw-clawsweeper
  CLAWSWEEPER_APP_CLIENT_ID: Iv23liOECG0slfuhz093
  CLAWSWEEPER_UNSPONSORED_FEATURE_CLOSE_ENABLED: ${{ vars.CLAWSWEEPER_UNSPONSORED_FEATURE_CLOSE_ENABLED || 'false' }}

jobs:
  normalize-lane:
    runs-on: ubuntu-latest
    outputs:
      concurrency_group: ${{ steps.lane.outputs.concurrency_group }}
      dispatch_concurrency_group: ${{ steps.lane.outputs.dispatch_concurrency_group }}
      exact_item: ${{ steps.lane.outputs.exact_item }}
    steps:
      - name: Normalize exact item lane
        id: lane
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY_DISPATCH_ITEM_NUMBER: ${{ github.event.client_payload.item_number }}
          WORKFLOW_DISPATCH_ITEM_NUMBERS: ${{ inputs.item_numbers }}
          ROUTER_FANOUT_AFTER: ${{ inputs.router_fanout_after }}
          TARGET_REPO: ${{ github.event_name == 'workflow_dispatch' && inputs.target_repo || github.event_name == 'repository_dispatch' && github.event.client_payload.target_repo || vars.CLAWSWEEPER_TARGET_REPO || 'openclaw/openclaw' }}
        run: |
          set -euo pipefail
          target_repo="${TARGET_REPO:-openclaw/openclaw}"
          if ! printf '%s' "$target_repo" | grep -Eq '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$'; then
            echo "Invalid target_repo: $target_repo" >&2
            exit 1
          fi
          target_repo="$(printf '%s' "$target_repo" | tr '[:upper:]' '[:lower:]')"
          item_number=""
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            item_number="${REPOSITORY_DISPATCH_ITEM_NUMBER:-}"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] &&
               [[ "${WORKFLOW_DISPATCH_ITEM_NUMBERS:-}" != *,* ]]; then
            item_number="${WORKFLOW_DISPATCH_ITEM_NUMBERS:-}"
          fi
          if [ -n "$item_number" ]; then
            if ! printf '%s' "$item_number" | grep -Eq '^[1-9][0-9]*$' ||
               ! node -e 'const n = Number(process.argv[1]); process.exit(Number.isSafeInteger(n) && String(n) === process.argv[1] ? 0 : 1)' "$item_number"; then
              echo "Invalid exact item number: expected canonical positive decimal, got $item_number" >&2
              exit 1
            fi
            concurrency_group="repair-comment-router-$target_repo-item-$item_number"
          elif [ -n "${ROUTER_FANOUT_AFTER:-}" ]; then
            if ! printf '%s' "$ROUTER_FANOUT_AFTER" | grep -Eq '^[1-9][0-9]*$' ||
               ! node -e 'const n = Number(process.argv[1]); process.exit(Number.isSafeInteger(n) && String(n) === process.argv[1] ? 0 : 1)' "$ROUTER_FANOUT_AFTER"; then
              echo "Invalid router fanout cursor: expected canonical positive decimal, got $ROUTER_FANOUT_AFTER" >&2
              exit 1
            fi
            concurrency_group="repair-comment-router-$target_repo-scan-continuation-$ROUTER_FANOUT_AFTER"
          else
            concurrency_group="repair-comment-router-$target_repo-scan"
          fi
          dispatch_concurrency_group="repair-comment-router-$target_repo-worker-dispatch"
          {
            echo "concurrency_group=$concurrency_group"
            echo "dispatch_concurrency_group=$dispatch_concurrency_group"
            echo "exact_item=$([ -n "$item_number" ] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

  route-comments:
    needs: normalize-lane
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: ${{ needs.normalize-lane.outputs.concurrency_group }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
        with:
          filter: blob:none
          fetch-depth: 0
          sparse-checkout: |
            .github
            config
            jobs
            prompts/pr-close-coverage-proof.md
            results
            schema/clawsweeper-pr-close-coverage-proof.schema.json
            scripts/hydrate-state.ts
            src/clawsweeper-text.ts
            src/command.ts
            src/codex-env.ts
            src/codex-output-capture.ts
            src/codex-spawn.ts
            src/codex-process-worker.ts
            src/codex-process.ts
            src/codex-transient.ts
            src/github-json.ts
            src/github-retry.ts
            src/pr-close-coverage-proof.ts
            src/action-ledger-files.ts
            src/action-ledger-runtime.ts
            src/action-ledger.ts
            src/repair
            src/repository-profiles.ts
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            tsconfig.repair.json
          sparse-checkout-cone-mode: false

      - name: Resolve target repository
        id: target
        env:
          TARGET_REPO: ${{ github.event_name == 'workflow_dispatch' && inputs.target_repo || github.event_name == 'repository_dispatch' && github.event.client_payload.target_repo || vars.CLAWSWEEPER_TARGET_REPO || 'openclaw/openclaw' }}
        run: |
          set -euo pipefail
          target_repo="${TARGET_REPO:-openclaw/openclaw}"
          if ! printf '%s' "$target_repo" | grep -Eq '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$'; then
            echo "Invalid target_repo: $target_repo" >&2
            exit 1
          fi
          {
            echo "target_repo=$target_repo"
            echo "target_repo_owner=${target_repo%%/*}"
            echo "target_repo_name=${target_repo#*/}"
          } >> "$GITHUB_OUTPUT"

      - name: Create target GitHub App token
        id: app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ steps.target.outputs.target_repo_owner }}
          repositories: ${{ steps.target.outputs.target_repo_name }}
          permission-actions: write
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Create central dispatch token
        id: dispatch-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: clawsweeper
          permission-actions: write
          permission-contents: write

      - name: Create state token
        id: state-token
        uses: ./.github/actions/create-state-token
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}

      - uses: ./.github/actions/setup-state
        with:
          token: ${{ steps.state-token.outputs.token }}
          fetch-depth: 1

      - uses: ./.github/actions/setup-action-ledger

      - uses: ./.github/actions/setup-pnpm
        id: setup-pnpm
        with:
          build-script: build:repair

      - name: Create isolated ruleset verifier token
        id: ruleset-verifier-token
        if: ${{ vars.CLAWSWEEPER_ALLOW_MERGE == '1' }}
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ steps.target.outputs.target_repo_owner }}
          repositories: ${{ steps.target.outputs.target_repo_name }}
          permission-administration: write

      - name: Bind authenticated mutation App identity
        id: mutation-app
        if: ${{ vars.CLAWSWEEPER_ALLOW_MERGE == '1' }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          APP_SLUG: ${{ steps.app_token.outputs.app-slug }}
        run: |
          set -euo pipefail
          app_id="$(gh api "apps/$APP_SLUG" --jq '.id')"
          test "$app_id" -gt 0
          echo "app_id=$app_id" >> "$GITHUB_OUTPUT"

      - name: Bind authenticated ruleset App identity
        id: ruleset-app
        if: ${{ vars.CLAWSWEEPER_ALLOW_MERGE == '1' && steps.ruleset-verifier-token.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ steps.ruleset-verifier-token.outputs.token }}
          APP_SLUG: ${{ steps.ruleset-verifier-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          app_id="$(gh api "apps/$APP_SLUG" --jq '.id')"
          test "$app_id" -gt 0
          echo "app_id=$app_id" >> "$GITHUB_OUTPUT"

      - name: Route ClawSweeper comments
        id: route-comments
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          CLAWSWEEPER_AUTHENTICATED_APP_ID: ${{ steps.mutation-app.outputs.app_id }}
          CLAWSWEEPER_AUTHENTICATED_APP_SLUG: ${{ steps.app_token.outputs.app-slug }}
          CLAWSWEEPER_AUTHENTICATED_INSTALLATION_ID: ${{ steps.app_token.outputs.installation-id }}
          CLAWSWEEPER_RULESET_APP_ID: ${{ steps.ruleset-app.outputs.app_id }}
          CLAWSWEEPER_RULESET_APP_SLUG: ${{ steps.ruleset-verifier-token.outputs.app-slug }}
          CLAWSWEEPER_RULESET_INSTALLATION_ID: ${{ steps.ruleset-verifier-token.outputs.installation-id }}
          CLAWSWEEPER_RULESET_GH_TOKEN: ${{ steps.ruleset-verifier-token.outputs.token }}
          CLAWSWEEPER_DISPATCH_TOKEN: ${{ steps.dispatch-token.outputs.token }}
          CLAWSWEEPER_MUTATION_TOKEN_SOURCE: clawsweeper-app
          CLAWSWEEPER_ALLOW_MERGE: ${{ vars.CLAWSWEEPER_ALLOW_MERGE || '0' }}
          CLAWSWEEPER_ACTION_LEDGER_INVOCATION: initial
        run: |
          set -euo pipefail
          target_repo="${{ github.event_name == 'workflow_dispatch' && inputs.target_repo || vars.CLAWSWEEPER_TARGET_REPO || 'openclaw/openclaw' }}"
          target_branch="${{ github.event_name == 'workflow_dispatch' && inputs.target_branch || '' }}"
          lookback_minutes="${{ github.event_name == 'workflow_dispatch' && inputs.lookback_minutes || vars.CLAWSWEEPER_COMMENT_LOOKBACK_MINUTES || '180' }}"
          since="${{ github.event_name == 'workflow_dispatch' && inputs.since || '' }}"
          max_comments="${{ github.event_name == 'workflow_dispatch' && inputs.max_comments || vars.CLAWSWEEPER_COMMENT_MAX_COMMENTS || '100' }}"
          item_numbers="${{ github.event_name == 'workflow_dispatch' && inputs.item_numbers || '' }}"
          comment_ids="${{ github.event_name == 'workflow_dispatch' && inputs.comment_ids || '' }}"
          router_fanout_after="${{ github.event_name == 'workflow_dispatch' && inputs.router_fanout_after || '' }}"
          runner="${{ github.event_name == 'workflow_dispatch' && inputs.runner || vars.CLAWSWEEPER_WORKER_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}"
          execution_runner="${{ github.event_name == 'workflow_dispatch' && inputs.execution_runner || vars.CLAWSWEEPER_EXECUTION_RUNNER || 'blacksmith-16vcpu-ubuntu-2404' }}"
          force_reprocess="${{ github.event_name == 'workflow_dispatch' && inputs.force_reprocess || 'false' }}"
          attempt_id="${{ github.event_name == 'workflow_dispatch' && inputs.attempt_id || '' }}"
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            target_repo="${{ github.event.client_payload.target_repo || 'openclaw/openclaw' }}"
            target_branch="${{ github.event.client_payload.target_branch || '' }}"
            lookback_minutes="${{ github.event.client_payload.lookback_minutes || vars.CLAWSWEEPER_COMMENT_LOOKBACK_MINUTES || '180' }}"
            since="${{ github.event.client_payload.since || '' }}"
            max_comments="${{ github.event.client_payload.max_comments || '1' }}"
            item_numbers="${{ github.event.client_payload.item_number || '' }}"
            comment_ids="${{ github.event.client_payload.comment_id || '' }}"
            status_comment_id="${{ github.event.client_payload.status_comment_id || '' }}"
            source_event="${{ github.event.client_payload.source_event || '' }}"
            source_action="${{ github.event.client_payload.source_action || '' }}"
            dispatch_actor="${{ github.actor }}"
            comment_event_auth="${{ github.event.client_payload.comment_event_auth || '' }}"
            comment_updated_at="${{ github.event.client_payload.comment_updated_at || '' }}"
            comment_body_sha256="${{ github.event.client_payload.comment_body_sha256 || '' }}"
            force_reprocess="${{ github.event.client_payload.force_reprocess || 'false' }}"
            attempt_id="${{ github.event.client_payload.attempt_id || '' }}"
          else
            status_comment_id=""
            source_event=""
            source_action=""
            dispatch_actor=""
            comment_event_auth=""
            comment_updated_at=""
            comment_body_sha256=""
          fi
          if [ "$force_reprocess" = "true" ] && [ -z "$attempt_id" ]; then
            attempt_id="forced-replay-${GITHUB_RUN_ID}"
          fi
          if [ "$force_reprocess" != "true" ] && [ -n "$attempt_id" ]; then
            echo "attempt_id requires force_reprocess=true" >&2
            exit 1
          fi

          args=(
            --write-report
            --repo "$target_repo"
            --lookback-minutes "$lookback_minutes"
            --max-comments "$max_comments"
            --runner "$runner"
            --execution-runner "$execution_runner"
            --wait-for-capacity
          )
          if [ -n "$target_branch" ]; then
            args+=(--target-branch "$target_branch")
          fi
          if [ -n "$since" ]; then
            args+=(--since "$since")
          fi
          if [ -n "$item_numbers" ]; then
            args+=(--item-numbers "$item_numbers")
          fi
          if [ -n "$comment_ids" ]; then
            args+=(--comment-ids "$comment_ids")
          fi
          if [ -n "$router_fanout_after" ]; then
            args+=(--router-fanout-after "$router_fanout_after")
          fi
          if [ -n "$status_comment_id" ]; then
            args+=(--status-comment-id "$status_comment_id")
          fi
          if [ -n "$source_event" ]; then
            args+=(--source-event "$source_event")
          fi
          if [ -n "$source_action" ]; then
            args+=(--source-action "$source_action")
          fi
          if [ -n "$dispatch_actor" ]; then
            args+=(--dispatch-actor "$dispatch_actor")
          fi
          if [ -n "$comment_event_auth" ]; then
            args+=(--comment-event-auth "$comment_event_auth")
          fi
          if [ -n "$comment_updated_at" ]; then
            args+=(--comment-updated-at "$comment_updated_at")
          fi
          if [ -n "$comment_body_sha256" ]; then
            args+=(--comment-body-sha256 "$comment_body_sha256")
          fi
          if [ "$force_reprocess" = "true" ]; then
            args+=(--force-reprocess)
            args+=(--attempt-id "$attempt_id")
          fi
          if { [ "${{ github.event_name }}" = "repository_dispatch" ]; } ||
             { [ "${{ github.event_name }}" = "workflow_dispatch" ] &&
               [ "${{ inputs.execute }}" = "true" ]; } ||
             { [ "${{ github.event_name }}" = "schedule" ] &&
               [ "${{ vars.CLAWSWEEPER_COMMENT_ROUTER_EXECUTE || '0' }}" = "1" ]; }; then
            args+=(--stage-selected-commands)
          fi
          pnpm run repair:comment-router -- "${args[@]}"

      - name: Commit comment router ledger
        if: always()
        run: |
          if jq -e '.short_circuited == true' results/comment-router-latest.json >/dev/null 2>&1; then
            echo "Exact terminal comment version already recorded; skipping state publication."
            exit 0
          fi
          pnpm run repair:publish-main -- \
            --message "chore: record ClawSweeper comment routing" \
            --path results/comment-router.json \
            --path results/comment-router-latest.json \
            --path jobs \
            --rebase-strategy merge-comment-router

      - name: Dispatch discovered items through exact router lanes
        if: ${{ success() && (github.event_name == 'schedule' && (vars.CLAWSWEEPER_COMMENT_ROUTER_EXECUTE || '0') == '1' || github.event_name == 'workflow_dispatch' && inputs.execute && (inputs.item_numbers == '' || contains(inputs.item_numbers, ',')) || github.event_name == 'repository_dispatch' && !github.event.client_payload.item_number && github.event.client_payload.comment_id) }}
        env:
          GH_TOKEN: ${{ steps.dispatch-token.outputs.token }}
        run: |
          set -euo pipefail
          target_repo="${{ github.event_name == 'workflow_dispatch' && inputs.target_repo || vars.CLAWSWEEPER_TARGET_REPO || 'openclaw/openclaw' }}"
          target_branch="${{ github.event_name == 'workflow_dispatch' && inputs.target_branch || '' }}"
          lookback_minutes="${{ github.event_name == 'workflow_dispatch' && inputs.lookback_minutes || vars.CLAWSWEEPER_COMMENT_LOOKBACK_MINUTES || '180' }}"
          max_comments="${{ github.event_name == 'workflow_dispatch' && inputs.max_comments || vars.CLAWSWEEPER_COMMENT_MAX_COMMENTS || '100' }}"
          runner="${{ github.event_name == 'workflow_dispatch' && inputs.runner || vars.CLAWSWEEPER_WORKER_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}"
          execution_runner="${{ github.event_name == 'workflow_dispatch' && inputs.execution_runner || vars.CLAWSWEEPER_EXECUTION_RUNNER || 'blacksmith-16vcpu-ubuntu-2404' }}"
          force_reprocess="${{ github.event_name == 'workflow_dispatch' && inputs.force_reprocess || 'false' }}"
          item_numbers="${{ github.event_name == 'workflow_dispatch' && inputs.item_numbers || '' }}"
          comment_ids="${{ github.event_name == 'workflow_dispatch' && inputs.comment_ids || '' }}"
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            target_repo="${{ github.event.client_payload.target_repo || 'openclaw/openclaw' }}"
            target_branch="${{ github.event.client_payload.target_branch || '' }}"
            lookback_minutes="${{ github.event.client_payload.lookback_minutes || vars.CLAWSWEEPER_COMMENT_LOOKBACK_MINUTES || '180' }}"
            max_comments="${{ github.event.client_payload.max_comments || '1' }}"
            runner="${{ github.event.client_payload.runner || vars.CLAWSWEEPER_WORKER_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}"
            execution_runner="${{ github.event.client_payload.execution_runner || vars.CLAWSWEEPER_EXECUTION_RUNNER || 'blacksmith-16vcpu-ubuntu-2404' }}"
            force_reprocess="${{ github.event.client_payload.force_reprocess || 'false' }}"
            item_numbers="${{ github.event.client_payload.item_number || '' }}"
            comment_ids="${{ github.event.client_payload.comment_id || '' }}"
          fi
          since="$(
            jq -er '.since | strings | select(length > 0)' \
              results/comment-router-latest.json
          )"
          jq -r '
            (.router_item_fanout.selected_item_numbers // []) as $selected
            | .commands
            | map(
                select(
                  (.issue_number as $number | ($selected | index($number)) != null) and
                  (.issue_number | type == "number" and . > 0) and
                  (
                    .status == "ready" or
                    any(.actions[]?; .status == "waiting" or .status == "active")
                  )
                )
              )
            | sort_by(.issue_number)
            | group_by(.issue_number)[]
            | [
                .[0].issue_number,
                ([
                  .[].comment_id
                  | strings
                  | select(
                      test("^[0-9]+$") or
                      test("^repair-loop-label-sweep:(autofix|automerge):[1-9][0-9]*$")
                    )
                ] | unique | join(","))
              ]
            | @tsv
          ' results/comment-router-latest.json | while IFS=$'\t' read -r item_number item_comment_ids; do
            dispatch_args=(
              workflow run repair-comment-router.yml
              --repo "$GITHUB_REPOSITORY"
              -f execute=true
              -f force_reprocess="$force_reprocess"
              -f target_repo="$target_repo"
              -f target_branch="$target_branch"
              -f lookback_minutes="$lookback_minutes"
              -f since="$since"
              -f max_comments="$max_comments"
              -f item_numbers="$item_number"
              -f runner="$runner"
              -f execution_runner="$execution_runner"
            )
            if [ -n "$item_comment_ids" ]; then
              dispatch_args+=(-f "comment_ids=$item_comment_ids")
            fi
            gh "${dispatch_args[@]}"
          done

          router_fanout_after="$(
            jq -r '.router_item_fanout.next_after_item_number // empty' \
              results/comment-router-latest.json
          )"
          if [ -n "$router_fanout_after" ]; then
            gh workflow run repair-comment-router.yml \
              --repo "$GITHUB_REPOSITORY" \
              -f execute=true \
              -f force_reprocess="$force_reprocess" \
              -f target_repo="$target_repo" \
              -f target_branch="$target_branch" \
              -f lookback_minutes="$lookback_minutes" \
              -f since="$since" \
              -f max_comments="$max_comments" \
              -f item_numbers="$item_numbers" \
              -f comment_ids="$comment_ids" \
              -f router_fanout_after="$router_fanout_after" \
              -f runner="$runner" \
              -f execution_runner="$execution_runner"
          fi

  dispatch-waiting-commands:
    needs: [normalize-lane, route-comments]
    if: ${{ needs.normalize-lane.outputs.exact_item == 'true' && (github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch' && inputs.execute) }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    concurrency:
      group: ${{ needs.normalize-lane.outputs.dispatch_concurrency_group }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
        with:
          filter: blob:none
          fetch-depth: 0
          sparse-checkout: |
            .github
            config
            jobs
            prompts/pr-close-coverage-proof.md
            results
            schema/clawsweeper-pr-close-coverage-proof.schema.json
            scripts/hydrate-state.ts
            src/clawsweeper-text.ts
            src/command.ts
            src/codex-env.ts
            src/codex-output-capture.ts
            src/codex-spawn.ts
            src/codex-process-worker.ts
            src/codex-process.ts
            src/codex-transient.ts
            src/github-json.ts
            src/github-retry.ts
            src/pr-close-coverage-proof.ts
            src/repair
            src/repository-profiles.ts
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            tsconfig.repair.json
          sparse-checkout-cone-mode: false

      - name: Resolve target repository
        id: dispatch-target
        env:
          TARGET_REPO: ${{ github.event_name == 'workflow_dispatch' && inputs.target_repo || github.event.client_payload.target_repo || vars.CLAWSWEEPER_TARGET_REPO || 'openclaw/openclaw' }}
        run: |
          set -euo pipefail
          target_repo="${TARGET_REPO:-openclaw/openclaw}"
          if ! printf '%s' "$target_repo" | grep -Eq '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$'; then
            echo "Invalid target_repo: $target_repo" >&2
            exit 1
          fi
          {
            echo "target_repo=$target_repo"
            echo "target_repo_owner=${target_repo%%/*}"
            echo "target_repo_name=${target_repo#*/}"
          } >> "$GITHUB_OUTPUT"

      - name: Create target GitHub App token
        id: dispatch-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ steps.dispatch-target.outputs.target_repo_owner }}
          repositories: ${{ steps.dispatch-target.outputs.target_repo_name }}
          permission-actions: write
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Create central dispatch token
        id: worker-dispatch-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: openclaw
          repositories: clawsweeper
          permission-actions: write
          permission-contents: write

      - name: Create state token
        id: dispatch-state-token
        uses: ./.github/actions/create-state-token
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}

      - uses: ./.github/actions/setup-state
        with:
          token: ${{ steps.dispatch-state-token.outputs.token }}
          fetch-depth: 1

      - uses: ./.github/actions/setup-pnpm
        with:
          build-script: build:repair

      - name: Create isolated ruleset verifier token
        id: dispatch-ruleset-verifier-token
        if: ${{ vars.CLAWSWEEPER_ALLOW_MERGE == '1' }}
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ steps.dispatch-target.outputs.target_repo_owner }}
          repositories: ${{ steps.dispatch-target.outputs.target_repo_name }}
          permission-administration: write

      - name: Bind authenticated mutation App identity
        id: dispatch-mutation-app
        if: ${{ vars.CLAWSWEEPER_ALLOW_MERGE == '1' }}
        env:
          GH_TOKEN: ${{ steps.dispatch-app-token.outputs.token }}
          APP_SLUG: ${{ steps.dispatch-app-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          app_id="$(gh api "apps/$APP_SLUG" --jq '.id')"
          test "$app_id" -gt 0
          echo "app_id=$app_id" >> "$GITHUB_OUTPUT"

      - name: Bind authenticated ruleset App identity
        id: dispatch-ruleset-app
        if: ${{ vars.CLAWSWEEPER_ALLOW_MERGE == '1' && steps.dispatch-ruleset-verifier-token.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ steps.dispatch-ruleset-verifier-token.outputs.token }}
          APP_SLUG: ${{ steps.dispatch-ruleset-verifier-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          app_id="$(gh api "apps/$APP_SLUG" --jq '.id')"
          test "$app_id" -gt 0
          echo "app_id=$app_id" >> "$GITHUB_OUTPUT"

      - name: Drain durable waiting commands under the serialized capacity gate
        env:
          GH_TOKEN: ${{ steps.dispatch-app-token.outputs.token }}
          CLAWSWEEPER_AUTHENTICATED_APP_ID: ${{ steps.dispatch-mutation-app.outputs.app_id }}
          CLAWSWEEPER_AUTHENTICATED_APP_SLUG: ${{ steps.dispatch-app-token.outputs.app-slug }}
          CLAWSWEEPER_AUTHENTICATED_INSTALLATION_ID: ${{ steps.dispatch-app-token.outputs.installation-id }}
          CLAWSWEEPER_RULESET_APP_ID: ${{ steps.dispatch-ruleset-app.outputs.app_id }}
          CLAWSWEEPER_RULESET_APP_SLUG: ${{ steps.dispatch-ruleset-verifier-token.outputs.app-slug }}
          CLAWSWEEPER_RULESET_INSTALLATION_ID: ${{ steps.dispatch-ruleset-verifier-token.outputs.installation-id }}
          CLAWSWEEPER_RULESET_GH_TOKEN: ${{ steps.dispatch-ruleset-verifier-token.outputs.token }}
          CLAWSWEEPER_DISPATCH_TOKEN: ${{ steps.worker-dispatch-token.outputs.token }}
          CLAWSWEEPER_MUTATION_TOKEN_SOURCE: clawsweeper-app
          CLAWSWEEPER_ALLOW_MERGE: ${{ vars.CLAWSWEEPER_ALLOW_MERGE || '0' }}
          CLAWSWEEPER_ACTION_LEDGER_INVOCATION: retry
        run: |
          set -euo pipefail
          target_repo="${{ github.event_name == 'workflow_dispatch' && inputs.target_repo || vars.CLAWSWEEPER_TARGET_REPO || 'openclaw/openclaw' }}"
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            target_repo="${{ github.event.client_payload.target_repo || 'openclaw/openclaw' }}"
          fi
          normalized_target_repo="$(printf '%s' "$target_repo" | tr '[:upper:]' '[:lower:]')"
          default_runner="${{ vars.CLAWSWEEPER_WORKER_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}"
          default_execution_runner="${{ vars.CLAWSWEEPER_EXECUTION_RUNNER || 'blacksmith-16vcpu-ubuntu-2404' }}"
          processed_queue_keys="$RUNNER_TEMP/comment-router-processed-queue-keys.json"
          printf '[]\n' > "$processed_queue_keys"

          while true; do
            queued_command="$(
              jq -c \
                --arg repo "$normalized_target_repo" \
                --arg default_runner "$default_runner" \
                --arg default_execution_runner "$default_execution_runner" \
                --slurpfile processed "$processed_queue_keys" '
                [
                  .commands[]?
                  | select(.status == "waiting" or .status == "claimed")
                  | select((.repo | strings | ascii_downcase) == $repo)
                  | select(.issue_number | type == "number" and . > 0)
                  | select(
                      .comment_id
                      | strings
                      | test(
                          "^[1-9][0-9]*$|^repair-loop-label-sweep:(autofix|automerge):[1-9][0-9]*$"
                        )
                    )
                ]
                | group_by([
                    .issue_number,
                    (.comment_version_key // .idempotency_key // .comment_id),
                    (.attempt_id // "")
                  ])
                | map(
                    sort_by(.processed_at // "")
                    | .[-1] as $latest
                    | {
                        queue_key: (
                          [
                            $latest.issue_number,
                            (
                              $latest.comment_version_key //
                              $latest.idempotency_key //
                              $latest.comment_id
                            ),
                            ($latest.attempt_id // "")
                          ]
                          | @json
                        ),
                        item_number: $latest.issue_number,
                        comment_id: $latest.comment_id,
                        attempt_id: ($latest.attempt_id // ""),
                        status_comment_id: (
                          [.[] | .status_comment_id // empty]
                          | last // ""
                        ),
                        force_reprocess: any(.[]; .forced_replay == true),
                        dispatch_context: {
                          target_branch: ($latest.dispatch_context.target_branch // ""),
                          runner: ($latest.dispatch_context.runner // $default_runner),
                          execution_runner: (
                            $latest.dispatch_context.execution_runner // $default_execution_runner
                          ),
                          since: (
                            $latest.dispatch_context.since //
                            $latest.comment_created_at //
                            $latest.comment_updated_at //
                            $latest.processed_at
                          )
                        }
                      }
                  )
                | map(select(.queue_key as $key | ($processed[0] | index($key)) == null))
                | sort_by(.item_number, .comment_id, .attempt_id)
                | .[0] // empty
              ' results/comment-router.json
            )"
            if [ -z "$queued_command" ]; then
              break
            fi

            queue_key="$(jq -er '.queue_key' <<<"$queued_command")"
            item_number="$(jq -er '.item_number' <<<"$queued_command")"
            comment_id="$(jq -er '.comment_id' <<<"$queued_command")"
            attempt_id="$(jq -r '.attempt_id // empty' <<<"$queued_command")"
            target_branch="$(jq -r '.dispatch_context.target_branch // empty' <<<"$queued_command")"
            since="$(jq -er '.dispatch_context.since | strings | select(length > 0)' <<<"$queued_command")"
            runner="$(jq -er '.dispatch_context.runner | strings | select(length > 0)' <<<"$queued_command")"
            execution_runner="$(jq -er '.dispatch_context.execution_runner | strings | select(length > 0)' <<<"$queued_command")"
            status_comment_id="$(jq -r '.status_comment_id // empty' <<<"$queued_command")"
            force_reprocess="$(jq -r '.force_reprocess' <<<"$queued_command")"
            if [[ "$comment_id" == repair-loop-label-sweep:* ]] && [ -z "$attempt_id" ]; then
              echo "Scheduled repair-loop queue row is missing an attempt identity." >&2
              exit 1
            fi

            args=(
              --write-report
              --repo "$target_repo"
              --item-numbers "$item_number"
              --comment-ids "$comment_id"
              --max-comments 1
              --since "$since"
              --runner "$runner"
              --execution-runner "$execution_runner"
              --wait-for-capacity
              --execute
            )
            if [ -n "$target_branch" ]; then
              args+=(--target-branch "$target_branch")
            fi
            if [ -n "$status_comment_id" ]; then
              args+=(--status-comment-id "$status_comment_id")
            fi
            if [ -n "$attempt_id" ]; then
              args+=(--force-reprocess)
              args+=(--attempt-id "$attempt_id")
            elif [ "$force_reprocess" = "true" ]; then
              echo "Forced replay queue row is missing an attempt identity." >&2
              exit 1
            fi

            pnpm run repair:comment-router -- "${args[@]}"
            next_processed_queue_keys="${processed_queue_keys}.next"
            jq --arg key "$queue_key" '. + [$key] | unique' \
              "$processed_queue_keys" > "$next_processed_queue_keys"
            mv "$next_processed_queue_keys" "$processed_queue_keys"
          done

      - name: Commit comment router dispatch ledger
        if: always()
        run: |
          pnpm run repair:publish-main -- \
            --message "chore: record ClawSweeper repair dispatch" \
            --path results/comment-router.json \
            --path results/comment-router-latest.json \
            --path jobs \
            --rebase-strategy merge-comment-router

      - name: Finalize command action ledger
        id: finalize-command-action-ledger
        if: ${{ always() && steps.setup-pnpm.outcome == 'success' }}
        run: |
          set -euo pipefail
          : "${CLAWSWEEPER_ACTION_LEDGER_OUTPUT_ROOT:?setup-action-ledger output root is required}"
          mkdir -p .artifacts
          allow_empty_args=()
          # Empty is valid only when this run's report proves no command lifecycle started.
          if [ "${{ steps.route-comments.outcome }}" = "success" ] &&
             jq -e '.commands_seen == 0' results/comment-router-latest.json >/dev/null 2>&1; then
            allow_empty_args+=(--allow-empty)
          fi
          manifest_file=".artifacts/comment-router-command-action-ledger-manifest.json"
          pnpm run --silent repair:action-ledger -- finalize \
            --lane comment-router \
            "${allow_empty_args[@]}" \
            > "$manifest_file"
          if [ -s "$manifest_file" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish immutable command action ledger
        if: ${{ always() && steps.setup-pnpm.outcome == 'success' && steps.finalize-command-action-ledger.outputs.publish == 'true' }}
        run: |
          set -euo pipefail
          test -n "${CLAWSWEEPER_STATE_DIR:-}"
          source_root="${CLAWSWEEPER_ACTION_LEDGER_OUTPUT_ROOT:?setup-action-ledger output root is required}"
          manifest_file=".artifacts/comment-router-command-action-ledger-manifest.json"
          test -s "$manifest_file"
          event_paths_file=".artifacts/command-action-ledger-paths.txt"
          import_result_file=".artifacts/command-action-ledger-import.json"
          pnpm run --silent repair:action-ledger -- publish \
            --lane comment-router \
            --manifest "$manifest_file" \
            --source-root "$source_root" \
            --state-root "$CLAWSWEEPER_STATE_DIR" > "$import_result_file"
          if ! jq -e --slurpfile manifest "$manifest_file" \
            '.eventPaths == $manifest[0].event_paths' \
            "$import_result_file" >/dev/null; then
            echo "Imported command action event paths do not match the finalized manifest." >&2
            exit 1
          fi
          jq -r '.paths[]?' "$import_result_file" |
            sort -u > "$event_paths_file"
          if [ ! -s "$event_paths_file" ]; then
            echo "Command action event shards existed but no paths were imported." >&2
            exit 1
          fi
          action_ledger_args=()
          while IFS= read -r event_path; do
            durable_event_path="$CLAWSWEEPER_STATE_DIR/$event_path"
            test -f "$durable_event_path"
            mkdir -p "$(dirname "$event_path")"
            cp "$durable_event_path" "$event_path"
            action_ledger_args+=(--path "$event_path")
          done < "$event_paths_file"
          pnpm run repair:publish-main -- \
            --message "chore: append command action ledger" \
            "${action_ledger_args[@]}" \
            --rebase-strategy normal
